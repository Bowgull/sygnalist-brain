<script>
  /* ═══════════════════════════════════════════════════════════════════════════
     SYGNALIST PORTAL — CLIENT SCRIPTS v3.0 (tabbed + caches)
     ═══════════════════════════════════════════════════════════════════════════ */
  /* UI regression checklist:
   * - Header: 3-column layout on desktop (left = brand, center = pulse, right = controls); no floating CTA in center.
   * - GoodFit: Trigger on every Tracker list card; opens focus mode with Job Summary / GoodFit / Notes; Back and ESC close.
   * - Ops Mode: Table view; stage pill and action icons consistent size; readable row height. */

  // BOOT and profileId are defined in the main template (client_portal.html)
  let isBusy = false;

  /** Admin script load timeout (cold start can be slow). */
  var ADMIN_SCRIPT_LOAD_TIMEOUT_MS = 65000;
  /** Shown when admin script fails to load so user can retry from bookmarked URL. */
  var ADMIN_LOAD_HINT = ' If this keeps happening, open the app from your bookmarked deployment URL and try again.';

  // ─────────────────────────────────────────────────────────────────────────────
  // STATE (tab + caches)
  // ─────────────────────────────────────────────────────────────────────────────
  var currentTab = 'inbox';
  var inboxCache = [];
  var trackerCache = [];
  var lastFetchTimeStr = '';
  /** Date or null: used for relative "X mins ago" and 60s refresh. */
  var lastFetchAt = null;
  var lastFetchIntervalId = null;
  var spotlightCard = null;
  var spotlightKey = null;
  var spotlightSlotParent = null;
  var spotlightSlotNextSibling = null;
  /** Placeholder left in list when card is in focus mode (same-card spotlight). */
  var focusedPlaceholder = null;

  // Rotating messages during fetch (keep users engaged)
  var FETCH_LOADING_PHRASES = [
    'Making the bots work for you…',
    'Separating sygnal from noise…',
    'Finding the good sygnals…',
    'No spam. Just sygnal.',
    'Teaching the algorithm some manners…',
    'Filtering out the corporate fluff…',
    'Reading the fine print so you don\'t have to…',
    'Making sure it\'s actually worth your time…',
    'Looking past the buzzwords…',
    'Hang on. Let me cook…',
    'Still cooking…',
    'Not gaslighting. Promise.',
    'Making sure it\'s not a red flag…',
    'Reading the red flags…',
    'Checking if the math is mathing…',
    'Ensuring "remote" means remote…',
    'Fast-paced ≠ chaos.',
    'Not falling for that again…',
    'No emotional damage here…',
    'Just making sure…',
    'Let\'s not romanticize this…',
    'Running it back for quality…',
    'Making sure it actually fits…',
    'Double-checking the hype…',
    'Almost there…',
    'Almost almost there…',
    'Yes, we\'re being picky on purpose…',
    'Good sygnals take a second…'
  ];
  var FETCH_LOADING_ROTATE_MS = 6000;

  // ─────────────────────────────────────────────────────────────────────────────
  // TRACKER STATUS (pipeline + display; stored values unchanged)
  // ─────────────────────────────────────────────────────────────────────────────
  var TRACKER_STATUS_OPTIONS = [
    'Prospect', 'Applied', 'Interview 1', 'Interview 2', 'Final Round',
    'Offer 🎉', 'Rejected', 'Ghosted 👻', 'Withdrawn'
  ];
  var PIPELINE_STAGES = ['Prospect', 'Applied', 'Interview', 'Final', 'Offer'];
  var CLOSED_STATUSES = ['Rejected', 'Ghosted 👻', 'Withdrawn'];
  var STORED_TO_STAGE = {
    'Prospect': 'Prospect',
    'Applied': 'Applied',
    'Interview 1': 'Interview',
    'Interview 2': 'Interview',
    'Final Round': 'Final',
    'Offer 🎉': 'Offer',
    'Rejected': 'Rejected',
    'Ghosted 👻': 'Ghosted',
    'Withdrawn': 'Withdrawn'
  };
  var STORED_TO_LABEL = {
    'Prospect': 'Prospect',
    'Applied': 'Applied',
    'Interview 1': 'Interview 1',
    'Interview 2': 'Interview 2',
    'Final Round': 'Final',
    'Offer 🎉': 'Offer',
    'Rejected': 'Rejected',
    'Ghosted 👻': 'Ghosted',
    'Withdrawn': 'Withdrawn'
  };
  /** Maps pipeline stage name to canonical CSS key (from statusConfig). Interview -> interviewed. */
  function stageToCanonicalKey(stage) {
    var map = { Prospect: 'prospect', Applied: 'applied', Interview: 'interviewed', Final: 'final', Offer: 'offer' };
    return map[stage] || (stage && String(stage).toLowerCase()) || 'prospect';
  }
  function getStageForStatus(storedStatus) {
    var s = String(storedStatus || 'Prospect').trim();
    return STORED_TO_STAGE[s] || 'Prospect';
  }
  function getDisplayLabel(storedStatus) {
    var s = String(storedStatus || 'Prospect').trim();
    return STORED_TO_LABEL[s] || s.replace(/\s*[\u{1F300}-\u{1F9FF}]/gu, '').trim() || 'Prospect';
  }
  function getStageCssClass(storedStatus) {
    var stage = getStageForStatus(storedStatus) || 'Prospect';
    return 'stage-' + stageToCanonicalKey(stage);
  }
  /** Salary display only. Never use goodFit here; salary and goodFit must stay separate. */
  /** Safe salary formatter: only shows validated salary-like strings; never dates/timestamps. Returns "Salary not listed" if invalid. O(1) per card; no description parsing. */
  function formatSalary(job) {
    if (!job) return 'Salary not listed';
    var val = job.salary != null ? job.salary : job.compensation;
    if (val == null) return 'Salary not listed';
    if (typeof val === 'object') return 'Salary not listed';
    var raw = String(val);
    var s = raw.trim().replace(/\s+/g, ' ');
    if (!s || s === '—') return 'Salary not listed';

    var lower = s.toLowerCase();
    var reject = false;
    var dayNames = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    var monthNames = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
    var i;
    for (i = 0; i < dayNames.length; i++) { if (lower.indexOf(dayNames[i]) !== -1) { reject = true; break; } }
    if (!reject) for (i = 0; i < monthNames.length; i++) { if (lower.indexOf(monthNames[i]) !== -1) { reject = true; break; } }
    if (!reject && (/gmt|utc|est|edt|pst|pdt|am|pm\b/i.test(lower) || /\d{1,2}:\d{2}(:\d{2})?/.test(s))) reject = true;
    if (!reject && /\b(19|20)\d{2}\b/.test(s) && (lower.indexOf('jan') !== -1 || lower.indexOf('feb') !== -1 || lower.indexOf('mar') !== -1 || lower.indexOf('apr') !== -1 || lower.indexOf('may') !== -1 || lower.indexOf('jun') !== -1 || lower.indexOf('jul') !== -1 || lower.indexOf('aug') !== -1 || lower.indexOf('sep') !== -1 || lower.indexOf('oct') !== -1 || lower.indexOf('nov') !== -1 || lower.indexOf('dec') !== -1 || dayNames.some(function(d) { return lower.indexOf(d) !== -1; }))) reject = true;
    if (!reject && /^\d+$/.test(s.replace(/[,.\s]/g, ''))) reject = true;
    if (!reject && s.length > 40 && !/[£$€]/.test(s) && !/\d[kK]/.test(s)) reject = true;
    if (reject) return 'Salary not listed';

    var accept = /[£$€]/.test(s) || /\d[kK]/.test(s) || /per\s*hour|\/hr|hour|year|annum|\byr\b|salary/i.test(s) || (/\d/.test(s) && /[-–]/.test(s));
    if (!accept) return 'Salary not listed';
    return s;
  }

  /** Days in current stage: from stageChangedAt or added_at. Returns "Today" or "X days". */
  function getDaysInCurrentStage(job) {
    var raw = (job && (job.stageChangedAt != null ? job.stageChangedAt : job.added_at)) || '';
    if (!raw) return '—';
    var d = typeof raw === 'string' ? new Date(raw.replace(' ', 'T')) : new Date(raw);
    if (isNaN(d.getTime())) return '—';
    var now = new Date();
    var startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var startOfThen = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    var days = Math.floor((startOfToday - startOfThen) / (24 * 60 * 60 * 1000));
    if (days === 0) return 'Today';
    if (days === 1) return '1 day';
    return days + ' days';
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // UTILITIES
  // ─────────────────────────────────────────────────────────────────────────────
  function $(id) { return document.getElementById(id); }

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, function(m) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
    });
  }

  function hash(s) {
    s = String(s || '');
    var h = 0;
    for (var i = 0; i < s.length; i++) {
      h = ((h << 5) - h) + s.charCodeAt(i) | 0;
    }
    return Math.abs(h);
  }

  function jobKey(job) {
    return (job && job.url) ? job.url : (job ? (job.company + '||' + job.title) : '');
  }

  // Stage → icon name for header pills (reuse metrics icon language)
  var STAGE_TO_ICON = { Prospect: 'openSignals', Applied: 'applied', Interview: 'interviewing', Final: 'star', Offer: 'target' };
  // Icon registry: semantic name → sprite symbol id (single source of truth)
  var ICON_REGISTRY = {
    openSignals: 'icon-open-signals',
    inTracker: 'icon-in-tracker',
    applied: 'icon-applied',
    interviewing: 'icon-interviewing',
    addedThisWeek: 'icon-added-this-week',
    fetch: 'icon-fetch',
    refresh: 'icon-refresh',
    addToTracker: 'icon-add-to-tracker',
    addManually: 'icon-plus',
    clearFilters: 'icon-clear-filters',
    view: 'icon-view',
    star: 'icon-star',
    clipboard: 'icon-clipboard',
    lightbulb: 'icon-lightbulb',
    save: 'icon-save',
    copy: 'icon-copy',
    plus: 'icon-plus',
    radar: 'icon-radar',
    target: 'icon-target',
    goodFit: 'icon-good-fit',
    calendar: 'icon-calendar',
    pencil: 'icon-pencil',
    trash: 'icon-trash'
  };

  function iconHtml(name, size) {
    size = size || 24;
    var sym = (ICON_REGISTRY && ICON_REGISTRY[name]) ? ICON_REGISTRY[name] : ('icon-' + name);
    var decorative = (name === 'view' || name === 'fetch' || name === 'addToTracker');
    var aria = decorative ? ' aria-hidden="true"' : '';
    return '<svg class="icon-inline" width="' + size + '" height="' + size + '" viewBox="0 0 24 24"' + aria + '><use href="#' + sym + '"/></svg>';
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // TAB STATE + ROUTING
  // ─────────────────────────────────────────────────────────────────────────────
  function showAdminLoadError(message, attemptedUrl) {
    if (window._adminLoadErrorShown) return;
    window._adminLoadErrorShown = true;
    var el = document.getElementById('adminLoadError');
    var msgEl = document.getElementById('adminLoadErrorMsg');
    var urlEl = document.getElementById('adminLoadErrorUrl');
    if (el) {
      if (msgEl) msgEl.textContent = message || 'Admin failed to load. Check your connection and try again.';
      if (urlEl) {
        if (attemptedUrl) {
          urlEl.textContent = 'Tried: ' + attemptedUrl;
          urlEl.style.display = '';
        } else {
          urlEl.textContent = '';
          urlEl.style.display = 'none';
        }
      }
      el.classList.add('visible');
      var retryBtn = document.getElementById('adminLoadErrorRetry');
      if (retryBtn && !retryBtn._adminRetryWired) {
        retryBtn._adminRetryWired = true;
        retryBtn.addEventListener('click', function() {
          window._adminScriptFailed = false;
          window._adminScriptInjected = false;
          window._adminLoadErrorShown = false;
          var errEl = document.getElementById('adminLoadError');
          if (errEl) errEl.classList.remove('visible');
          setTab('inbox');
          setTab('admin');
        });
      }
    }
  }

  function hideAdminLoadError() {
    window._adminLoadErrorShown = false;
    var el = document.getElementById('adminLoadError');
    var urlEl = document.getElementById('adminLoadErrorUrl');
    if (el) el.classList.remove('visible');
    if (urlEl) { urlEl.textContent = ''; urlEl.style.display = 'none'; }
  }

  /**
   * Single place that injects the admin script (asset path only). Returns: 'inline' | 'no-config' | 'injected' | 'already-injected'.
   * Does not attach readiness listener; ensureAdminLoaded() does that.
   */
  function injectAdminScriptOnce() {
    var adminScriptSrc = document.body.getAttribute('data-admin-script-src');
    if (adminScriptSrc === 'inline') return 'inline';
    if (!adminScriptSrc || !adminScriptSrc.trim()) {
      showAdminLoadError('Admin is not configured for this page.');
      return 'no-config';
    }
    if (window._adminScriptInjected) return 'already-injected';
    var resolvedSrc;
    if (adminScriptSrc.charAt(0) === '?' || adminScriptSrc.indexOf('http') !== 0) {
      // Prefer current page URL so admin script always loads from the same deployment that served the page (avoids stale CONFIG.WEB_APP_URL).
      var base = (typeof window !== 'undefined' && window.location && window.location.href)
        ? String(window.location.href).split('?')[0]
        : ((typeof ADMIN_URL !== 'undefined' && ADMIN_URL) ? String(ADMIN_URL).split('?')[0] : '');
      resolvedSrc = base + (adminScriptSrc.charAt(0) === '?' ? adminScriptSrc : '?' + adminScriptSrc);
    } else {
      resolvedSrc = adminScriptSrc;
    }
    if (window.SYGNALIST_TIMING) console.log('[AdminLoader] resolvedSrc=', resolvedSrc);
    window._adminScriptAttemptedUrl = resolvedSrc;
    window._adminScriptInjected = true;
    window._adminLoadErrorShown = false;
    var script = document.createElement('script');
    script.src = resolvedSrc;
    script.async = true;
    script.setAttribute('data-sygnalist-admin-script', '1');
    document.body.appendChild(script);
    return 'injected';
  }

  /** Post-ready: check server error then bind + load. Single code path. */
  function runAdminPostReady() {
    hideAdminLoadError();
    if (window.__ADMIN_SCRIPT_SERVER_ERROR || window.__ADMIN_INLINE_SCRIPT_ERROR) {
      showAdminLoadError('Admin couldn\'t load. Try again later.');
      return;
    }
    if (typeof window.bindAdminUIOnce === 'function') window.bindAdminUIOnce();
    function doLoad() {
      if (typeof window._adminLoadProfiles === 'function') {
        window._adminLoadProfiles();
        return;
      }
      if (typeof window.loadAdminProfiles === 'function') window.loadAdminProfiles();
    }
    doLoad();
    if (typeof window._adminLoadProfiles !== 'function') {
      setTimeout(function() { doLoad(); }, 50);
    }
  }

  /**
   * Single entry point for admin tab: ensure script, wait for ready, then bind + load.
   * One readiness listener; all failure paths go through showAdminLoadError.
   */
  function ensureAdminLoaded() {
    var injectStatus = injectAdminScriptOnce();
    if (injectStatus === 'no-config') return;

    if (window._adminScriptLoaded) {
      runAdminPostReady();
      return;
    }

    var timeoutId = null;
    var didSucceed = false;
    function onAdminFailed(msg) {
      if (didSucceed) return;
      if (timeoutId) clearTimeout(timeoutId);
      timeoutId = null;
      window._adminScriptFailed = true;
      showAdminLoadError(msg || 'Admin failed to load. Check your connection and try again.' + ADMIN_LOAD_HINT, window._adminScriptAttemptedUrl);
    }

    function onReady() {
      didSucceed = true;
      if (timeoutId) clearTimeout(timeoutId);
      timeoutId = null;
      document.removeEventListener('sygnalist-admin-ready', onReady);
      runAdminPostReady();
    }

    document.addEventListener('sygnalist-admin-ready', onReady);

    if (injectStatus === 'inline') {
      setTimeout(function() { runAdminPostReady(); }, 0);
      return;
    }
    if (injectStatus === 'injected') {
      var script = document.querySelector('script[data-sygnalist-admin-script="1"]');
      if (script) {
        script.onerror = function() { onAdminFailed('Admin script failed to load. Try again.' + ADMIN_LOAD_HINT); };
      }
      timeoutId = setTimeout(function() {
        if (didSucceed) return;
        onAdminFailed('Admin took too long to load. Try again.' + ADMIN_LOAD_HINT);
      }, ADMIN_SCRIPT_LOAD_TIMEOUT_MS);
    }
  }

  function setTab(tab) {
    var t_switch_start = Date.now();
    if (tab === 'tracker') timingLog('tab_switch', { t_switch_start, profileId: typeof profileId !== 'undefined' ? profileId : null, cacheHadData: trackerCache.length > 0 });
    currentTab = tab;
    var tabs = ['inbox', 'tracker', 'admin'];
    for (var i = 0; i < tabs.length; i++) {
      var t = tabs[i];
      var el = $('tab' + t.charAt(0).toUpperCase() + t.slice(1));
      if (el) el.classList.toggle('hidden', t !== tab);
      var btn = $('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1));
      if (btn) btn.classList.toggle('active', t === tab);
    }
    var fetchBtn = $('fetchBtn');
    var addBtn = $('addManuallyBtn');
    if (fetchBtn) fetchBtn.style.display = (tab === 'inbox') ? '' : 'none';
    if (addBtn) addBtn.style.display = (tab === 'admin') ? 'none' : '';
    if (tab === 'admin') {
      var lo = document.getElementById('loadingOverlay');
      if (lo) lo.classList.remove('visible');
      if (window._adminScriptFailed) {
        showAdminLoadError('Admin failed to load. Check your connection and try again.' + ADMIN_LOAD_HINT);
      } else {
        ensureAdminLoaded();
        // Run bind + load in same click stack so google.script.run has user gesture (fixes dead admin UI).
        if (typeof window.bindAdminUIOnce === 'function') window.bindAdminUIOnce();
        if (typeof window._adminLoadProfiles === 'function') window._adminLoadProfiles();
      }
    }
    updateCommandBarCounts();
    if (tab === 'inbox') {
      if (inboxCache.length > 0) {
        var displayList = prepareRadarRenderList(inboxCache.slice());
        renderInboxFilters();
        renderInbox(displayList);
        loadInbox(true);
      } else {
        loadInbox();
      }
    } else if (tab === 'tracker') {
      if (trackerCache.length > 0) {
        renderTrackerPipeline();
        renderTracker(getFilteredTrackerList());
        timingLog('tab_switch', { t_first_render_tracker: Date.now(), t_data_ready: Date.now(), fromCache: true, profileId: typeof profileId !== 'undefined' ? profileId : null });
        loadTracker(true);
      } else {
        loadTracker();
      }
    }
  }

  function updateCommandBarCounts() {
    var el = $('lastFetchTime');
    if (el) el.textContent = lastFetchTimeStr || '—';
  }

  /** Relative or absolute last-fetch label. < 1 min = "just now", 1-59 min = "X mins ago", 1-23 hr = "X hours ago", 1-3 days = "X days ago", > 3 days = "Feb 7, 6:26 PM". */
  function formatLastFetchRelative(lastFetchDate, nowMs) {
    nowMs = nowMs == null ? Date.now() : nowMs;
    var d = lastFetchDate instanceof Date ? lastFetchDate : new Date(lastFetchDate);
    var t = d.getTime();
    if (isNaN(t)) return '—';
    var diff = nowMs - t;
    if (diff < 0) return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    var minMs = 60 * 1000, hrMs = 60 * minMs, dayMs = 24 * hrMs, threeDaysMs = 3 * dayMs;
    if (diff < minMs) return 'just now';
    if (diff < 60 * minMs) {
      var mins = Math.floor(diff / minMs);
      return mins === 1 ? '1 min ago' : mins + ' mins ago';
    }
    if (diff < 24 * hrMs) {
      var hrs = Math.floor(diff / hrMs);
      return hrs === 1 ? '1 hour ago' : hrs + ' hours ago';
    }
    if (diff < threeDaysMs) {
      var days = Math.floor(diff / dayMs);
      return days === 1 ? '1 day ago' : days + ' days ago';
    }
    return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // INITIALIZE
  // ─────────────────────────────────────────────────────────────────────────────
  function init() {
    var h = document.querySelector('.app-header');
    if (h) h.setAttribute('data-header-init', '20260207');
    /* View as: opens in new tab; no banner or back/exit (user closes tab when done) */
    if (typeof VIEW_AS !== 'undefined' && VIEW_AS && BOOT.profile) {
      /* Leave viewAsBanner hidden; no exit link or history/popstate */
    }
    var name = BOOT.profile.displayName || BOOT.profile.profileId;
    var statusDisplay = BOOT.profile.status === 'active' ? 'Active' : 'Inactive';
    var prefixEl = $('headerPrimaryMetaPrefix');
    var dotEl = $('headerPrimaryMetaDot');
    var statusEl = $('headerPrimaryMetaStatus');
    if (prefixEl) prefixEl.textContent = name;
    if (dotEl) { dotEl.textContent = '● '; dotEl.className = 'header-meta-dot ' + (BOOT.profile.status === 'active' ? 'active' : 'locked'); }
    if (statusEl) statusEl.textContent = statusDisplay;
    if (BOOT.profile.last_fetch_at) {
      try {
        var d = new Date(BOOT.profile.last_fetch_at);
        if (!isNaN(d.getTime())) {
          lastFetchAt = d;
          lastFetchTimeStr = formatLastFetchRelative(lastFetchAt);
        }
      } catch (e) { lastFetchTimeStr = ''; }
    } else {
      lastFetchTimeStr = '';
    }
    if (lastFetchIntervalId != null) clearInterval(lastFetchIntervalId);
    lastFetchIntervalId = setInterval(function() {
      if (lastFetchAt != null) {
        lastFetchTimeStr = formatLastFetchRelative(lastFetchAt);
        updateCommandBarCounts();
      }
    }, 60000);
    window.addEventListener('pagehide', function() { if (lastFetchIntervalId != null) { clearInterval(lastFetchIntervalId); lastFetchIntervalId = null; } });
    var adminLink = $('navAdminLink');
    var baseUrl = window.location.href.split('?')[0];
    var showAdminUI = BOOT.profile.isAdmin;
    if (BOOT.profile.isAdmin && typeof VIEW_AS !== 'undefined' && !VIEW_AS) {
      try { sessionStorage.setItem('sygnalist_admin_return', baseUrl + '?profile=' + profileId); } catch (e) {}
    }
    if (!showAdminUI) {
      if (adminLink) adminLink.style.display = 'none';
      var tabBtnAdmin = $('tabBtnAdmin');
      if (tabBtnAdmin) tabBtnAdmin.style.display = 'none';
    }
    var actionsEl = $('contentBayActions');
    if (actionsEl) actionsEl.innerHTML = '<button class="btn btn-action" id="fetchBtn" onclick="fetchJobs()">' + iconHtml('fetch', 18) + ' Scan</button><button class="btn btn-ghost btn-icon-only" id="refreshBtn" onclick="refreshCurrentTab()" aria-label="Refresh">' + iconHtml('refresh', 18) + '</button><button class="btn" id="addManuallyBtn" onclick="showManualAdd()">' + iconHtml('addManually', 18) + ' Add Manually</button>';
    if (BOOT.profile.status !== 'active') {
      var fetchBtn = $('fetchBtn');
      if (fetchBtn) { fetchBtn.disabled = true; fetchBtn.setAttribute('title', 'Scan is disabled (profile inactive)'); }
    }
    setTab('inbox');
    loadInbox();
    loadDashboard();
    var tabIds = ['tabBtnInbox', 'tabBtnTracker', 'tabBtnAdmin'];
    var tabValues = ['inbox', 'tracker', 'admin'];
    for (var i = 0; i < tabIds.length; i++) {
      var btn = $(tabIds[i]);
      if (btn) btn.addEventListener('click', (function(t) { return function() { setTab(t); }; })(tabValues[i]));
    }
    document.addEventListener('click', function(e) {
      var panel = $('closedPanel');
      var trigger = $('closedTrigger');
      if (panel && panel.classList.contains('open') && trigger !== e.target && !panel.contains(e.target)) panel.classList.remove('open');
    });
    document.addEventListener('click', function(e) {
      if (focusedPlaceholder) return;
      if (spotlightCard) return;
      if (e.target.closest('.tracker-goodfit-btn')) return;
      if (e.target.closest('.tracker-card-back')) return;
      var listEl = $('trackerList');
      if (listEl) {
        listEl.querySelectorAll('.tracker-card.flipped').forEach(function(c) { c.classList.remove('flipped'); c.style.height = ''; c.style.minHeight = ''; });
        listEl.classList.remove('has-flipped-card');
      }
    });
    var overlay = $('spotlightOverlay');
    if (overlay) overlay.addEventListener('click', function(e) {
      if (e.target !== overlay) return;
      if (focusedPlaceholder) closeGoodFitFocusMode();
      else if (spotlightCard) closeSpotlight();
    });
    var slot = $('spotlightSlot');
    if (slot) slot.addEventListener('click', function(e) {
      if (e.target !== slot) return;
      if (focusedPlaceholder) closeGoodFitFocusMode();
      else if (spotlightCard) closeSpotlight();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Escape') return;
      if (focusedPlaceholder) { closeGoodFitFocusMode(); return; }
      if (spotlightCard) { closeSpotlight(); return; }
      var listEl = $('trackerList');
      if (listEl) {

  function timingLog(label, data) {

  // ─────────────────────────────────────────────────────────────────────────────
  // API (with retry and structured error mapping)
  // ─────────────────────────────────────────────────────────────────────────────
  var API_RETRIES = 2;
  var API_RETRY_DELAY_MS = 800;

  function api(op, data) {
    return new Promise(function(resolve) {
      function run(attempt) {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res && res.ok) {
              resolve(res);
              return;
            }
            var msg = (res && res.message) ? res.message : 'Request failed';
            if (res && res.message && res.message.indexOf('locked') !== -1) {
              msg = 'Profile is locked. Try again later or contact support.';
            }
            if (res && res.message && res.message.indexOf('throttl') !== -1) {
              msg = 'Please wait a moment before trying again.';
            }
            resolve({ ok: false, message: msg, code: (res && res.message) ? 'SERVER' : null });
          })
          .withFailureHandler(function(err) {
            var errStr = (err && err.message) ? err.message : String(err);
            if (attempt < API_RETRIES) {
              setTimeout(function() { run(attempt + 1); }, API_RETRY_DELAY_MS * Math.pow(1.5, attempt));
              return;
            }
            var msg = 'Connection issue. Check your network and try again.';
            if (errStr.indexOf('Authorization') !== -1 || errStr.indexOf('script') !== -1) msg = 'Session issue. Refresh the page and try again.';
            resolve({ ok: false, message: msg, code: 'NETWORK' });
          })
          .portal_api(profileId, (function() {
            var req = { op: op, data: data || {} };
            if (typeof VIEW_AS !== 'undefined' && VIEW_AS && typeof ADMIN_PROFILE_ID !== 'undefined' && ADMIN_PROFILE_ID && (op === 'getProfileList' || op === 'logAdminSwitch')) req.actingAdminId = ADMIN_PROFILE_ID;
            return req;
          })());
      }
      run(0);
    });
  }

  function setLoading(loading, message) {
    isBusy = loading;
    var fetchBtn = $('fetchBtn');
    var refreshBtn = $('refreshBtn');
    if (fetchBtn) {
      fetchBtn.disabled = loading;
      if (!loading) {
        fetchBtn.classList.remove('btn-loading');
        fetchBtn.innerHTML = iconHtml('fetch', 18) + ' Scan';
      }
    }
    if (refreshBtn) refreshBtn.disabled = loading;
    $('loadingOverlay').classList.toggle('visible', loading);
    var textEl = $('loadingText');
    if (textEl) textEl.textContent = message || 'Loading...';

  function showToast(msg, type) {
    var toast = $('toast');
    toast.textContent = msg;
    toast.className = 'toast visible ' + (type || '');
    setTimeout(function() {
      toast.classList.remove('visible');

  // ─────────────────────────────────────────────────────────────────────────────
  // ACTIONS
  // ─────────────────────────────────────────────────────────────────────────────
  async function fetchJobs() {
    if (isBusy) return;
    var phrases = FETCH_LOADING_PHRASES;
    var idx = Math.floor(Math.random() * phrases.length);
    var firstMsg = phrases[idx];
    setLoading(true, firstMsg);
    var fetchBtn = $('fetchBtn');
    if (fetchBtn) {
      fetchBtn.classList.add('btn-loading');
      fetchBtn.textContent = 'Fetch …';
    }
    var loadingRotateId = setInterval(function() {
      if (!isBusy) return;
      var textEl = $('loadingText');
      if (!textEl) return;
      idx = (idx + 1) % phrases.length;
      textEl.textContent = phrases[idx];
    }, FETCH_LOADING_ROTATE_MS);
    try {
      var res = await api('fetch');
      if (!res || !res.ok) {
        showToast('Fetch failed: ' + (res && res.message ? res.message : 'Unknown error'), 'error');
        return;
      }
      var count = res.count || 0;
      showToast(count + ' new role' + (count !== 1 ? 's' : '') + ' fetched.', 'success');
      lastFetchAt = new Date();
      lastFetchTimeStr = 'just now';
      updateCommandBarCounts();
      await loadInbox();
    } finally {
      clearInterval(loadingRotateId);
      setLoading(false);
    }
  }

    if (currentTab === 'inbox') await loadInbox();

    loadDashboard();
    setLoading(false);

  async function loadInbox(backgroundRefresh) {
    if (!backgroundRefresh) showInboxSkeleton();
    var timeoutMs = 18000;
    function runInboxRequest() {
      var timeoutPromise = new Promise(function(resolve) {
        setTimeout(function() { resolve({ res: null, timedOut: true }); }, timeoutMs);
      });
      var apiPromise = api('getInbox').then(function(res) { return { res: res, timedOut: false }; });
      return Promise.race([apiPromise, timeoutPromise]);
    }
    var result = await runInboxRequest();
    var res = result.res;
    var timedOut = result.timedOut === true;
    if (timedOut && !res) res = null;
    if (res && res.ok) {
      inboxCache = (res.inbox || []).slice();
      var displayList = prepareRadarRenderList(inboxCache.slice());
      renderInboxFilters();
      renderInbox(displayList);
    } else if (!backgroundRefresh && timedOut) {
      var retryResult = await runInboxRequest();
      if (retryResult.res && retryResult.res.ok) {
        inboxCache = (retryResult.res.inbox || []).slice();
        var displayList = prepareRadarRenderList(inboxCache.slice());
        renderInboxFilters();
        renderInbox(displayList);
        updateCommandBarCounts();
        return;
      }
      console.error('Inbox load failed (timed out after retry)');
      var container = $('inboxList');
      if (container) {
        container.innerHTML = '<div class="empty-state"><div class="empty-title">Could not load Radar</div><div class="empty-desc">Request timed out.</div><button type="button" class="btn btn-action" id="inboxRetryBtn">Retry</button></div>';
        var retryBtn = document.getElementById('inboxRetryBtn');
        if (retryBtn) retryBtn.addEventListener('click', function() { loadInbox(); });
      }
      showToast('Request timed out', 'error');
    } else if (!backgroundRefresh) {
      console.error('Inbox load failed:', res, timedOut ? '(timed out)' : '');
      var container = $('inboxList');
      if (container) {
        container.innerHTML = '<div class="empty-state"><div class="empty-title">Could not load Radar</div><div class="empty-desc">' + (timedOut ? 'Request timed out.' : (res && res.message ? esc(res.message) : 'Load failed.')) + '</div><button type="button" class="btn btn-action" id="inboxRetryBtn">Retry</button></div>';
        var retryBtn = document.getElementById('inboxRetryBtn');
        if (retryBtn) retryBtn.addEventListener('click', function() { loadInbox(); });
      }
      if (timedOut) showToast('Request timed out', 'error');
    }
    updateCommandBarCounts();
  }

  async function loadTracker(backgroundRefresh) {
    if (!backgroundRefresh) {
      showTrackerSkeleton();
      timingLog('tracker_load', { t_switch_start: Date.now(), t_first_render_tracker: Date.now(), phase: 'skeleton', profileId: typeof profileId !== 'undefined' ? profileId : null });
    }
    var timeoutMs = 28000;
    function runTrackerRequest() {
      var timeoutPromise = new Promise(function(resolve) {
        setTimeout(function() { resolve({ res: null, timedOut: true }); }, timeoutMs);
      });
      var apiPromise = api('getTracker').then(function(res) { return { res: res, timedOut: false }; });
      return Promise.race([apiPromise, timeoutPromise]);
    }
    var result = await runTrackerRequest();
    var res = result.res;
    var timedOut = result.timedOut === true;
    if (timedOut && !res) res = null;
    if (res && res.ok) {
      trackerCache = res.tracker || [];
      renderTrackerPipeline();
      renderTracker(getFilteredTrackerList());
      timingLog('tracker_load', { t_first_render_tracker: Date.now(), t_data_ready: Date.now(), phase: 'data', background: !!backgroundRefresh, profileId: typeof profileId !== 'undefined' ? profileId : null });
      if (res.dashboard) {
        var isAdminUser = (typeof SHOW_ADMIN_UI !== 'undefined' && SHOW_ADMIN_UI);
        if (isAdminUser) {
          dashboardCache = Object.assign({}, dashboardCache, {
            inboxCount: res.dashboard.inboxCount,
            trackerCount: res.dashboard.trackerCount,
            byStatus: res.dashboard.byStatus || {},
            inboxAddedLast7: res.dashboard.inboxAddedLast7,
            trackerAddedLast7: res.dashboard.trackerAddedLast7
          });
        } else {
          dashboardCache = Object.assign({}, res.dashboard);
        }
        renderMetrics(dashboardCache);
      }
      loadDashboard();
    } else if (!backgroundRefresh && timedOut) {
      var retryResult = await runTrackerRequest();
      if (retryResult.res && retryResult.res.ok) {
        res = retryResult.res;
        trackerCache = res.tracker || [];
        renderTrackerPipeline();
        renderTracker(getFilteredTrackerList());
        if (res.dashboard) {
          var isAdminUser = (typeof SHOW_ADMIN_UI !== 'undefined' && SHOW_ADMIN_UI);
          if (isAdminUser) {
            dashboardCache = Object.assign({}, dashboardCache, {
              inboxCount: res.dashboard.inboxCount,
              trackerCount: res.dashboard.trackerCount,
              byStatus: res.dashboard.byStatus || {},
              inboxAddedLast7: res.dashboard.inboxAddedLast7,
              trackerAddedLast7: res.dashboard.trackerAddedLast7
            });
          } else {
            dashboardCache = Object.assign({}, res.dashboard);
          }
          renderMetrics(dashboardCache);
        }
        loadDashboard();
        updateCommandBarCounts();
        return;
      }
      console.error('Tracker load timed out (after retry)');
      var container = $('trackerList');
      if (container) {
        container.innerHTML = '<div class="empty-state"><div class="empty-title">Could not load tracker</div><div class="empty-desc">Request timed out.</div><button type="button" class="btn btn-action" id="trackerRetryBtn">Retry</button></div>';
        var retryBtn = document.getElementById('trackerRetryBtn');
        if (retryBtn) retryBtn.addEventListener('click', function() { loadTracker(); });
      }
      showToast('Request timed out', 'error');
    } else if (!backgroundRefresh) {
      if (!timedOut) console.error('Tracker load failed:', res);
      var container = $('trackerList');
      if (container) {
        container.innerHTML = '<div class="empty-state"><div class="empty-title">Could not load tracker</div><div class="empty-desc">' + (timedOut ? 'Request timed out.' : (res && res.message ? esc(res.message) : 'Load failed.')) + '</div><button type="button" class="btn btn-action" id="trackerRetryBtn">Retry</button></div>';
        var retryBtn = document.getElementById('trackerRetryBtn');
        if (retryBtn) retryBtn.addEventListener('click', function() { loadTracker(); });
      }
      showToast(timedOut ? 'Request timed out' : (res && res.message ? res.message : 'Could not load tracker'), 'error');
    }
    updateCommandBarCounts();
  }

  /** Display role/title only; strip " Lane" so clients never see that word. */
  function roleDisplayLabel(laneLabel) {
    var s = String(laneLabel || '').trim();
    return s.replace(/\s+Lane\s*$/i, '').trim() || s;
  }

  /** Humanize snake_case lane key for display (e.g. client_success_manager → Client Success Manager). */
  function humanizeLaneKey(key) {
    if (key == null || key === '') return '';
    return String(key).replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  /** Humanized display text for inbox role filter: strip " Lane" then title-case (e.g. "client_success_manager Lane" → "Client Success Manager"). */
  function humanizeForDisplay(laneLabel) {
    var base = roleDisplayLabel(laneLabel);
    if (base.toLowerCase() === 'review jd') return 'Review JD';
    return humanizeLaneKey(base);
  }

  /** Build inbox role filter from bootstrap assignedLaneLabels (single source of truth) plus unique laneLabel from inboxCache.
   *  After changing job lanes in admin (Save lane toggles or Apply Approved Lanes), a full page refresh refetches bootstrap and updates this dropdown. */
  function renderInboxFilters() {
    var row = $('inboxFiltersRow');
    if (!row) return;
    var roles = [];
    var assigned = (typeof BOOT !== 'undefined' && BOOT.profile && Array.isArray(BOOT.profile.assignedLaneLabels)) ? BOOT.profile.assignedLaneLabels : [];
    for (var a = 0; a < assigned.length; a++) {
      var lb = String(assigned[a] || '').trim();
      if (lb && roles.indexOf(lb) === -1) roles.push(lb);
    }
    for (var i = 0; i < inboxCache.length; i++) {
      var lb = String(inboxCache[i].laneLabel || '').trim();
      if (lb && roles.indexOf(lb) === -1) roles.push(lb);
    }
    roles.sort();
    var roleOpts = '<option value="">All roles</option>';
    for (var r = 0; r < roles.length; r++) roleOpts += '<option value="' + esc(roles[r]) + '">' + esc(humanizeForDisplay(roles[r])) + '</option>';
    row.innerHTML =
      '<select class="form-select inbox-role" id="inboxLane" style="max-width:160px" aria-label="Role">' + roleOpts + '</select>';
    var laneEl = $('inboxLane');
    if (laneEl) laneEl.addEventListener('change', applyInboxFilters);
  }

  var INBOX_TIER_ORDER = { S: 0, A: 1, B: 2, C: 3, D: 4, F: 5 };

  function prepareRadarRenderList(list) {
    if (!list || !list.length) return list;
    var hasUpper = list.some(function(j) {
      var t = String(j.tier || '').toUpperCase();
      return t === 'S' || t === 'A' || t === 'B' || t === 'C' || t === 'D';
    });
    if (hasUpper) list = list.filter(function(j) { return String(j.tier || '').toUpperCase() !== 'F'; });
    list.sort(function(a, b) {
      var ta = INBOX_TIER_ORDER[String(a.tier || 'C').toUpperCase()] ?? 6;
      var tb = INBOX_TIER_ORDER[String(b.tier || 'C').toUpperCase()] ?? 6;
      if (ta !== tb) return ta - tb;
      var tsA = (a.added_at != null && !isNaN(a.added_at)) ? Number(a.added_at) : 0;
      var tsB = (b.added_at != null && !isNaN(b.added_at)) ? Number(b.added_at) : 0;
      if (tsA !== tsB) return tsB - tsA;
      return (b.score || 0) - (a.score || 0);
    });
    return list;
  }

  function getInboxFilterState() {
    var lane = ($('inboxLane') && $('inboxLane').value) ? $('inboxLane').value.trim() : '';
    return { lane: lane };
  }

  function applyInboxFilters() {
    var state = getInboxFilterState();
    var list = inboxCache.slice();
    if (state.lane) {
      list = list.filter(function(j) { return String(j.laneLabel || '').trim() === state.lane; });
    }
    list = prepareRadarRenderList(list);
    renderInbox(list);
  }

  // Ops Mode = table view of the same filtered list (rapid-fire); not a separate filter or sort.
  var trackerViewMode = 'list'; // 'list' | 'table'
  var trackerFilter = { type: 'all' }; // { type: 'all' } | { type: 'stage', stage } | { type: 'closed', status }
  var trackerSearchQuery = '';
  var trackerSortOrder = 'newest'; // 'newest' | 'oldest'

  function getFilteredTrackerList() {
    var list;
    if (trackerFilter.type === 'all') {
      list = trackerCache.slice();
      if (trackerSearchQuery) {
        var q = trackerSearchQuery.trim().toLowerCase();
        list = list.filter(function(j) {
          var t = (j.title || '').toLowerCase();
          var c = (j.company || '').toLowerCase();
          return t.indexOf(q) !== -1 || c.indexOf(q) !== -1;
        });
      }
      list.sort(function(a, b) {
        var ta = String(a.added_at || '').trim();
        var tb = String(b.added_at || '').trim();
        if (!ta && !tb) return 0;
        if (!ta) return 1;
        if (!tb) return -1;
        if (trackerSortOrder === 'oldest') return ta < tb ? -1 : ta > tb ? 1 : 0;
        return tb < ta ? -1 : tb > ta ? 1 : 0;
      });
      return list;
    }
    if (trackerFilter.type === 'stage') {
      var stage = trackerFilter.stage;
      return trackerCache.filter(function(j) { return getStageForStatus(j.status) === stage; });
    }
    if (trackerFilter.type === 'closed') {
      return trackerCache.filter(function(j) { return (j.status || 'Prospect') === trackerFilter.status; });
    }
    return trackerCache.slice();
  }

  function setTrackerViewMode(mode) {
    trackerViewMode = mode;
    renderTracker(getFilteredTrackerList());
    var listBtn = $('trackerViewList');
    var tableBtn = $('trackerViewTable');
    if (listBtn) listBtn.classList.toggle('active', mode === 'list');
    if (tableBtn) tableBtn.classList.toggle('active', mode === 'table');
  }

  function renderTrackerPipeline() {
    var header = $('trackerHeader');
    if (!header) return;
    var countsByStage = {};
    var countsByClosed = {};
    for (var i = 0; i < PIPELINE_STAGES.length; i++) countsByStage[PIPELINE_STAGES[i]] = 0;
    for (var c = 0; c < CLOSED_STATUSES.length; c++) countsByClosed[CLOSED_STATUSES[c]] = 0;
    for (var k = 0; k < trackerCache.length; k++) {
      var st = getStageForStatus(trackerCache[k].status);
      if (PIPELINE_STAGES.indexOf(st) !== -1) countsByStage[st] = (countsByStage[st] || 0) + 1;
      else if (CLOSED_STATUSES.indexOf(trackerCache[k].status) !== -1) countsByClosed[trackerCache[k].status] = (countsByClosed[trackerCache[k].status] || 0) + 1;
    }
    var closedTotal = 0;
    for (var cs in countsByClosed) closedTotal += countsByClosed[cs];
    var isAll = trackerFilter.type === 'all';
    var activeStage = trackerFilter.type === 'stage' ? trackerFilter.stage : null;
    var activeClosed = trackerFilter.type === 'closed' ? trackerFilter.status : null;
    var html = '<div class="pipeline-row">';
    html += '<button type="button" class="pipeline-chip pipeline-all' + (isAll ? ' active' : '') + '" data-filter="all">All (' + trackerCache.length + ')</button>';
    html += '<div class="pipeline-bar">';
    for (var p = 0; p < PIPELINE_STAGES.length; p++) {
      var stage = PIPELINE_STAGES[p];
      var count = countsByStage[stage] || 0;
      var active = activeStage === stage;
      var iconName = STAGE_TO_ICON[stage] || 'openSignals';
      html += '<span class="pipeline-segment-wrap"><button type="button" class="pipeline-segment pipeline-segment-' + stageToCanonicalKey(stage) + (active ? ' active' : '') + '" data-stage="' + esc(stage) + '">' + iconHtml(iconName, 16) + esc(stage) + ' <span class="pipeline-count">' + count + '</span></button></span>';
    }
    html += '</div>';
    html += '<div class="pipeline-closed-wrap">';
    html += '<button type="button" class="pipeline-closed-trigger' + (activeClosed ? ' active' : '') + '" id="closedTrigger" aria-haspopup="true">Closed (' + closedTotal + ')</button>';
    html += '<div class="pipeline-closed-panel" id="closedPanel" role="menu">';
    for (var cl = 0; cl < CLOSED_STATUSES.length; cl++) {
      var cStatus = CLOSED_STATUSES[cl];
      var cCount = countsByClosed[cStatus] || 0;
      var label = getDisplayLabel(cStatus);
      var closedClass = cStatus === 'Rejected' ? ' closed-rejected' : (cStatus === 'Ghosted 👻' ? ' closed-ghosted' : ' closed-withdrawn');
      html += '<button type="button" class="pipeline-closed-item' + closedClass + (activeClosed === cStatus ? ' active' : '') + '" data-closed-status="' + esc(cStatus) + '" role="menuitem">' + esc(label) + ' (' + cCount + ')</button>';
    }
    html += '<button type="button" class="pipeline-closed-clear" role="menuitem">All</button>';
    html += '</div></div>';
    html += '<span class="pipeline-view-toggle">';
    html += '<button type="button" class="filter-pill' + (trackerViewMode === 'list' ? ' active' : '') + '" id="trackerViewList">List</button>';
    html += '<button type="button" class="filter-pill' + (trackerViewMode === 'table' ? ' active' : '') + '" id="trackerViewTable">Ops Mode</button>';
    html += '</span></div>';
    header.innerHTML = html;
    header.querySelector('.pipeline-all').addEventListener('click', function() { filterTrackerByStatus('All'); });
    header.querySelectorAll('.pipeline-segment').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var stage = btn.getAttribute('data-stage');
        if (stage) filterTrackerByStage(stage);
      });
    });
    header.querySelectorAll('.pipeline-closed-item').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var status = btn.getAttribute('data-closed-status');
        if (status) filterTrackerByStatus(status);
        var panel = $('closedPanel');
        if (panel) panel.classList.remove('open');
      });
    });
    var clearBtn = header.querySelector('.pipeline-closed-clear');
    if (clearBtn) clearBtn.addEventListener('click', function() { filterTrackerByStatus('All'); var p = $('closedPanel'); if (p) p.classList.remove('open'); });
    var trigger = $('closedTrigger');
    var panel = $('closedPanel');
    if (trigger && panel) {
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        panel.classList.toggle('open');
      });
    }
    var listBtn = $('trackerViewList');
    var tableBtn = $('trackerViewTable');
    if (listBtn) listBtn.addEventListener('click', function() { setTrackerViewMode('list'); });
    if (tableBtn) tableBtn.addEventListener('click', function() { setTrackerViewMode('table'); });

    var filtersRow = $('trackerFiltersRow');
    if (filtersRow) {
      if (trackerFilter.type === 'all') {
        filtersRow.style.display = '';
        filtersRow.innerHTML = '<input type="text" class="form-input tracker-search" id="trackerSearch" placeholder="Search title or company..." style="max-width:240px" aria-label="Search" />' +
          '<select class="form-select tracker-sort" id="trackerSort" style="max-width:160px" aria-label="Sort"><option value="newest">Newest added</option><option value="oldest">Oldest added</option></select>';
        var searchEl = $('trackerSearch');
        var sortEl = $('trackerSort');
        if (searchEl) { searchEl.value = trackerSearchQuery; searchEl.addEventListener('input', function() { trackerSearchQuery = searchEl.value; renderTracker(getFilteredTrackerList()); }); }
        if (sortEl) { sortEl.value = trackerSortOrder; sortEl.addEventListener('change', function() { trackerSortOrder = sortEl.value; renderTracker(getFilteredTrackerList()); }); }
      } else {
        filtersRow.style.display = 'none';
        filtersRow.innerHTML = '';
      }
    }
  }

  function filterTrackerByStage(stage) {
    var wasStage = trackerFilter.type === 'stage' && trackerFilter.stage === stage;
    trackerFilter = wasStage ? { type: 'all' } : { type: 'stage', stage: stage };
    renderTrackerPipeline();
    renderTracker(getFilteredTrackerList());
  }

  function filterTrackerByStatus(status) {
    if (status === 'All') {
      trackerFilter = { type: 'all' };
    } else if (CLOSED_STATUSES.indexOf(status) !== -1) {
      trackerFilter = { type: 'closed', status: status };
    } else {
      var stage = getStageForStatus(status);
      trackerFilter = { type: 'stage', stage: stage };
    }
    renderTrackerPipeline();
    renderTracker(getFilteredTrackerList());
  }

  var dashboardCache = { inboxCount: 0, trackerCount: 0, byStatus: {}, inboxAddedLast7: 0, trackerAddedLast7: 0 };

  function renderMetrics(dash) {

    var byStatus = isAdmin ? (dash.byStatusAll || {}) : (dash.byStatus || {});
    var interviewing = (byStatus['Interview 1'] || 0) + (byStatus['Interview 2'] || 0);
    var v1 = isAdmin ? (dash.inboxCountAll != null ? dash.inboxCountAll : 0) : (dash.inboxCount || 0);
    var v2 = isAdmin ? (dash.trackerCountAll != null ? dash.trackerCountAll : 0) : (dash.trackerCount || 0);
    var v3 = byStatus['Applied'] || 0;
    var v4 = interviewing;
    var v5 = isAdmin ? (dash.addedLast7All != null ? dash.addedLast7All : 0) : ((dash.inboxAddedLast7 || 0) + (dash.trackerAddedLast7 || 0));

      var activeP = dash.activeProfiles != null ? dash.activeProfiles : 0;
      var lockedP = dash.lockedProfiles != null ? dash.lockedProfiles : 0;
      var profilesVal = lockedP > 0 ? (activeP + ' / ' + lockedP) : (activeP + ' active');
      html += '<button type="button" class="metric-card metric-profiles" data-metric="admin" aria-label="Profiles"><div class="metric-card-icon">' + iconHtml('target') + '</div><div class="metric-card-label">Profiles</div><div class="metric-card-value">' + profilesVal + '</div></button>';

    html += '<button type="button" class="metric-card metric-in-tracker" data-stage="Prospect" aria-label="' + labelTracker + '"><div class="metric-card-icon">' + iconHtml('target') + '</div><div class="metric-card-label">' + labelTracker + '</div><div class="metric-card-value">' + v2 + '</div></button>';
    html += '<button type="button" class="metric-card metric-applied" data-stage="Applied" aria-label="Filter by Applied"><div class="metric-card-icon">' + iconHtml('applied') + '</div><div class="metric-card-label">Applied</div><div class="metric-card-value">' + v3 + '</div></button>';

  async function updateTracker(url, company, title) {
    var key = url || (company + '||' + title);
    var h = hash(key);

    var statusEl = $('st_' + h);
    var notesEl = $('no_' + h);
    var dateEl = $('da_' + h);
    var titleEl = $('ti_' + h);
    var locationEl = $('loc_' + h);
    var salaryEl = $('sal_' + h);
    var status = statusEl ? statusEl.value : '';
    var notes = notesEl ? notesEl.value : '';
    var dateApplied = dateEl ? dateEl.value : '';
    var newTitle = titleEl ? titleEl.value.trim() : title;
    var location = locationEl ? locationEl.value.trim() : '';
    var salary = salaryEl ? salaryEl.value.trim() : '';

    var rowWrap = document.querySelector('.tracker-card[data-tracker-key="' + h + '"]') || document.querySelector('.tracker-table-row[data-tracker-key="' + h + '"]');
    var saveBtn = rowWrap ? rowWrap.querySelector('.tracker-save-btn') : null;
    var originalSaveHtml = saveBtn ? saveBtn.innerHTML : (iconHtml('save', 18) + ' Save');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }

    var res;
    var errMsg;
    try {
      var payload = {
        url: url,
        company: company,
        title: title,
        status: status,
        notes: notes,
        dateApplied: dateApplied,
        location: location,
        title: newTitle,
        salary: salary || undefined
      };
      if (!url || !String(url).trim()) {
        payload.matchCompany = company;
        payload.matchTitle = title;
      }
      res = await api('updateTracker', payload);
    } catch (e) {
      res = null;
      errMsg = e && e.message ? e.message : 'Unknown error';
    }

    if (saveBtn) {
      saveBtn.disabled = false;
      if (res && res.ok) {
        saveBtn.innerHTML = '✓ Saved';
        setTimeout(function() { saveBtn.innerHTML = originalSaveHtml; }, 1500);
      } else {
        saveBtn.innerHTML = originalSaveHtml;
      }
    }
    if (res && res.ok) {
      showToast('Saved.', 'success');
      var idx = trackerCache.findIndex(function(j) { return (j.url || (j.company + '||' + j.title)) === key; });
      if (idx !== -1) {
        trackerCache[idx].status = status;
        trackerCache[idx].notes = notes;
        trackerCache[idx].dateApplied = dateApplied;
        trackerCache[idx].location = location;
        trackerCache[idx].title = newTitle;
        trackerCache[idx].salary = salary || trackerCache[idx].salary;
      }
    } else {
      showToast('Save failed: ' + (res && res.message ? res.message : errMsg), 'error');
    }
  }

  function hideManualAdd() {
    $('manualAddModal').classList.remove('visible');
    if ($('manualUrl')) $('manualUrl').value = '';
    if ($('manualTitle')) $('manualTitle').value = '';
    if ($('manualCompany')) $('manualCompany').value = '';

    if ($('manualNotes')) $('manualNotes').value = '';
  }

  async function submitManualAdd() {
    var url = ($('manualUrl') && $('manualUrl').value) ? $('manualUrl').value.trim() : '';
    var title = ($('manualTitle') && $('manualTitle').value) ? $('manualTitle').value.trim() : '';
    var company = ($('manualCompany') && $('manualCompany').value) ? $('manualCompany').value.trim() : '';
    var location = ($('manualLocation') && $('manualLocation').value) ? $('manualLocation').value.trim() : '';
    var notes = ($('manualNotes') && $('manualNotes').value) ? $('manualNotes').value.trim() : '';

    if (!title || !company) {
      showToast('Title and Company are required', 'error');
      return;
    }

    hideManualAdd();
    setLoading(true, 'Adding to Tracker...');

    var res = await api('manualAdd', { title: title, company: company, url: url, location: location, notes: notes });

    if (res && res.ok) {
      showToast('Added to Tracker.', 'success');
      await loadTracker();
    } else {
      showToast('❌ ' + (res && res.message ? res.message : 'Failed to add'), 'error');
    }

    setLoading(false);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER INBOX
  // ─────────────────────────────────────────────────────────────────────────────
  function renderInbox(list) {
    var container = $('inboxList');
    if (!container) return;
    if (!list.length) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">' + iconHtml('openSignals', 48) + '</div>' +
          '<div class="empty-title">No fresh sygnals yet</div>' +
          '<div class="empty-subtitle">Run Scan or check back after the next run.</div>' +
        '</div>';
      return;
    }
    var frag = document.createDocumentFragment();
    for (var i = 0; i < list.length; i++) {
      var job = list[i];
      var key = jobKey(job);
      var tier = String(job.tier || 'C').toUpperCase();
      var tierSlug = tier.toLowerCase();
      var cardClass = 'job-card tier-' + tierSlug;
      var card = document.createElement('div');
      card.className = cardClass;
      card.dataset.jobKey = key;
      var summary = (job.jobSummary || '').trim();
      var summaryEsc = summary ? esc(summary) : '';
      var salarySource = (job.salary_source && String(job.salary_source).trim()) || 'missing';
      var salaryText = formatSalary(job);
      var salaryChipClass = 'chip job-salary';
      var salaryChipContent = salaryText;
      var salaryChipTitle = '';
      if (salarySource === 'inferred') {
        salaryChipClass += ' job-salary-inferred';
        salaryChipContent = salaryText;
      } else if (salarySource === 'missing' || salaryText === 'Salary not listed') {
        salaryChipClass += ' job-salary-missing';
        salaryChipContent = 'Salary not listed';
      }
      var salaryChipHtml = '<span class="' + salaryChipClass + '"' + salaryChipTitle + '>' + esc(salaryChipContent) + '</span>';
      card.innerHTML =
        '<div class="job-card-front">' +
          '<div class="job-header">' +
            '<div class="job-title">' + esc(job.title) + '</div>' +
            '<div class="job-company">' + esc(job.company) + '</div>' +
          '</div>' +
          '<div class="job-meta">' +
            '<span class="chip chip-tier chip-tier-' + tier.toLowerCase() + '">Tier ' + tier + ' · ' + esc(job.score) + '</span>' +
            (job.laneLabel ? '<span class="chip chip-role">' + esc(humanizeForDisplay(job.laneLabel)) + '</span>' : '') +
            salaryChipHtml +
            '<span class="chip">' + esc(job.location || 'Remote') + '</span>' +
            '<span class="chip">' + esc(job.source) + '</span>' +
          '</div>' +
          (summaryEsc ? '<div class="job-summary-preview">' + summaryEsc + '</div>' : '') +
          '<div class="job-actions">' +
            '<a class="btn btn-card" href="' + esc(job.url) + '" target="_blank" rel="noopener">' + iconHtml('view', 18) + ' View job</a>' +
            '<button type="button" class="btn btn-primary btn-card" data-promote="' + esc(key) + '">' + iconHtml('addToTracker', 18) + ' Add to Tracker</button>' +
          '</div>' +
        '</div>';
      frag.appendChild(card);
    }
    container.innerHTML = '';
    container.appendChild(frag);
    container.querySelectorAll('[data-promote]').forEach(function(btn) {
      var k = btn.getAttribute('data-promote');
      var j = list.find(function(x) { return jobKey(x) === k; });
      if (j) btn.addEventListener('click', function() { promote(j, btn); });
    });
  }

  function promote(job, optButton) {
    var t_click = Date.now();
    var key = jobKey(job);
    var btn = optButton || (key ? document.querySelector('[data-promote="' + String(key).replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"]') : null);
    if (btn && btn.disabled) return;
    if (isBusy) return;
    var reqId = 'r_' + t_click + '_' + Math.random().toString(36).slice(2, 6);
    timingLog('add_to_tracker', { t_click, reqId, profileId: typeof profileId !== 'undefined' ? profileId : null });
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = iconHtml('inTracker', 18) + ' In Tracker';
    }
    var t_optimistic_ui = Date.now();
    timingLog('add_to_tracker', { t_optimistic_ui, reqId, phase: 'optimistic_ui' });
    var t_request_start = Date.now();
    api('promote', job).then(function(res) {
      var t_response = Date.now();
      var deduped = !!(res && !res.ok && (res.message || '').indexOf('Already in Tracker') !== -1);
      timingLog('add_to_tracker', { t_response, reqId, profileId: typeof profileId !== 'undefined' ? profileId : null, ok: !!(res && res.ok), deduped: deduped });
      if (res && res.ok) {
        showToast('Added to Tracker.', 'success');
        trackerCache.push(job);
        updateCommandBarCounts();
        if (currentTab === 'tracker') { renderTrackerPipeline(); renderTracker(getFilteredTrackerList()); }
      } else {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = iconHtml('addToTracker', 18) + ' Add to Tracker';
        }
        showToast(res && res.message ? res.message : 'Already in Tracker.', 'error');
      }
      var t_final_ui_settled = Date.now();
      timingLog('add_to_tracker', { t_final_ui_settled, reqId, phase: 'settled' });
    });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER TRACKER (list or table mode)
  // ─────────────────────────────────────────────────────────────────────────────
  function renderTracker(list) {
    var container = $('trackerList');
    if (!container) return;
    if (!list.length) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">' + iconHtml('star', 48) + '</div>' +
          '<div class="empty-title">Nothing in your Tracker yet. Add roles you like from Radar.</div>' +
        '</div>';
      return;
    }

    if (trackerViewMode === 'table') {
      var tableHtml = '<table class="tracker-table"><thead><tr><th>Title</th><th>Company</th><th>Salary</th><th>Current Stage</th><th>Days in Stage</th><th>Change Status</th><th>Actions</th></tr></thead><tbody>';
      for (var t = 0; t < list.length; t++) {
        var job = list[t];
        var key = job.url || (job.company + '||' + job.title);
        var h = hash(key);
        var statusOpts = TRACKER_STATUS_OPTIONS.map(function(opt) {
          return '<option' + (opt === job.status ? ' selected' : '') + '>' + esc(opt) + '</option>';
        }).join('');
        var tableSalary = formatSalary(job);
        var daysInStage = getDaysInCurrentStage(job);
        var statusLabel = job.status || 'Prospect';
        var stageClass = getStageCssClass(statusLabel);
        var eyeHref = (job.url && String(job.url).trim()) ? esc(job.url) : '#';
        var eyeDisabled = !(job.url && String(job.url).trim());
        var eyeHtml = eyeDisabled
          ? '<span class="icon-btn tracker-eye-btn tracker-eye-btn-disabled" aria-label="View job posting" title="No URL">' + iconHtml('view', 18) + '</span>'
          : '<a href="' + eyeHref + '" target="_blank" rel="noreferrer" class="icon-btn tracker-eye-btn" aria-label="View job posting" title="View job posting">' + iconHtml('view', 18) + '</a>';
        var saveHtml = '<button type="button" class="btn btn-action tracker-save-btn" onclick=\'updateTracker(' + JSON.stringify(job.url || '') + ',' + JSON.stringify(job.company) + ',' + JSON.stringify(job.title) + ')\'>' + iconHtml('save', 18) + ' Save</button>';
        tableHtml += '<tr class="tracker-table-row ' + stageClass + '" data-tracker-key="' + h + '">' +
          '<td class="tracker-table-title">' + esc(job.title) + '</td>' +
          '<td>' + esc(job.company) + '</td>' +
          '<td class="tracker-table-salary">' + esc(tableSalary) + '</td>' +
          '<td><span class="status-pill ' + stageClass + '">' + esc(statusLabel) + '</span></td>' +
          '<td class="tracker-table-days">' + esc(daysInStage) + '</td>' +
          '<td><select class="form-select form-select-sm" id="st_' + h + '">' + statusOpts + '</select></td>' +
          '<td><div class="tracker-table-row-actions">' + eyeHtml + saveHtml + '</div></td>' +
          '</tr>';
      }
      tableHtml += '</tbody></table>';
      container.innerHTML = tableHtml;
      return;
    }

    container.classList.remove('tracker-list-context-all', 'tracker-list-context-stage');
    container.classList.add(trackerFilter.type === 'all' ? 'tracker-list-context-all' : 'tracker-list-context-stage');
    var html = '';
    for (var i = 0; i < list.length; i++) {
      var job = list[i];
      var key = job.url || (job.company + '||' + job.title);
      var h = hash(key);
      var statusLabel = job.status || 'Prospect';
      var jobSum = (job.jobSummary && String(job.jobSummary).trim()) ? String(job.jobSummary).trim() : '';
      var goodFit = (job.goodFit && String(job.goodFit).trim()) ? String(job.goodFit).trim() : '';
      var goodFitBackHtml = '';
      if (goodFit) {
        var statements = goodFit.split(/\n\s*\n/).map(function(s) { return s.trim(); }).filter(Boolean);
        goodFitBackHtml = '<div class="good-fit-statements">';
        statements.slice(0, 5).forEach(function(s) { goodFitBackHtml += '<p class="good-fit-statement">' + esc(s) + '</p>'; });
        goodFitBackHtml += '</div>';
      } else {
        goodFitBackHtml = '<p class="color-text-dim good-fit-placeholder">Click GoodFit to generate.</p>';
      }

      var stageClass = getStageCssClass(statusLabel);
      var companyLine = job.location ? esc(job.company) + ' • ' + esc(job.location) : esc(job.company);
      var salaryDisplay = formatSalary(job);

      html += '<div class="tracker-card ' + stageClass + '" data-tracker-key="' + h + '" data-tracker-key-full="' + esc(key) + '" data-expanded="false">';
      html += '<div class="tracker-card-inner">';
      html += '<div class="tracker-card-front">';
      html += '<div class="tracker-card-header">';
      html += '<div class="tracker-card-main">';
      html += '<div class="job-title">' + esc(job.title) + '</div>';
      html += '<div class="job-company">' + companyLine + '</div>';
      html += '<div class="tracker-meta-pill-row">';
      html += '<span class="tracker-salary-pill meta-pill meta-pill--salary">' + esc(salaryDisplay) + '</span>';
      html += '<span class="status-pill meta-pill meta-pill--status ' + stageClass + '" data-status="' + esc(statusLabel) + '">' + esc(statusLabel) + '</span>';
      html += '</div>';
      html += '</div>';
      html += '<div class="tracker-card-actions-top">';
      html += '<button type="button" class="btn btn-sm btn-icon tracker-expand-btn" data-tracker-key="' + h + '" title="Edit" aria-label="Edit">' + iconHtml('pencil', 18) + '</button>';
      html += '</div></div>';
      if (jobSum) html += '<div class="tracker-card-summary">' + esc(jobSum) + '</div>';
      html += '<div class="tracker-card-cta">';
      if (job.url) html += '<a href="' + esc(job.url) + '" target="_blank" rel="noopener" class="btn btn-primary tracker-view-job-btn">' + iconHtml('view', 18) + ' View job</a>';
      else html += '<span class="tracker-view-job-btn tracker-view-job-btn-disabled">View job</span>';
      html += '</div>';
      html += '<div class="tracker-card-footer">';
      html += '<button type="button" class="btn btn-sm tracker-goodfit-btn" data-tracker-key-full="' + esc(key) + '" title="GoodFit">' + iconHtml('goodFit', 18) + ' GoodFit</button>';
      html += '</div>';
      html += '<div class="tracker-card-details">';
      html += '<div class="form-group"><label class="form-label">Status</label>';
      html += '<select class="form-select" id="st_' + h + '">';
      for (var s = 0; s < TRACKER_STATUS_OPTIONS.length; s++) {
        var opt = TRACKER_STATUS_OPTIONS[s];
        html += '<option' + (opt === statusLabel ? ' selected' : '') + '>' + opt + '</option>';
      }
      html += '</select></div>';
      html += '<div class="form-group"><label class="form-label">Date Applied</label>';
      html += '<input class="form-input" type="date" id="da_' + h + '" value="' + esc(job.dateApplied || '') + '" /></div>';
      html += '<div class="form-group"><label class="form-label">Title</label>';
      html += '<input class="form-input tracker-edit-title" type="text" id="ti_' + h + '" value="' + esc(job.title || '') + '" placeholder="Job title" /></div>';
      html += '<div class="form-group"><label class="form-label">Location</label>';
      html += '<input class="form-input tracker-edit-location" type="text" id="loc_' + h + '" value="' + esc(job.location || '') + '" placeholder="Location" /></div>';
      html += '<div class="form-group"><label class="form-label">Salary</label>';
      html += '<input class="form-input tracker-edit-salary" type="text" id="sal_' + h + '" value="' + esc((job.salary != null && job.salary !== '') ? String(job.salary) : '') + '" placeholder="e.g. 80k" /></div>';
      html += '<div class="form-group"><label class="form-label">Notes</label>';
      html += '<textarea class="form-textarea" id="no_' + h + '" placeholder="Add notes...">' + esc(job.notes || '') + '</textarea></div>';
      html += '<div class="tracker-card-details-actions">';
      html += '<button type="button" class="btn btn-action tracker-save-btn" onclick=\'updateTracker(' + JSON.stringify(job.url || '') + ',' + JSON.stringify(job.company) + ',' + JSON.stringify(job.title) + ')\'>' + iconHtml('save', 18) + ' Save</button>';
      html += '<button type="button" class="btn btn-icon btn-sm tracker-remove-btn" data-tracker-key-full="' + esc(key) + '" title="Remove from Tracker" aria-label="Remove from Tracker">' + iconHtml('trash', 18) + '</button>';
      html += '</div></div>';
      html += '</div>';
      html += '<div class="tracker-card-back">';
      html += '<div class="tracker-card-back-header">';
      html += '<button type="button" class="card-close" aria-label="Close" title="Close">×</button>';
      html += '</div>';
      html += '<div class="tracker-card-back-pipeline" data-tracker-key-full="' + esc(key) + '">';
      html += '<h3 class="tracker-card-back-section-heading">Pipeline status</h3>';
      html += '<div class="form-group"><label class="form-label">Status</label>';
      html += '<select class="form-select tracker-card-back-status">';
      for (var s = 0; s < TRACKER_STATUS_OPTIONS.length; s++) {
        var opt = TRACKER_STATUS_OPTIONS[s];
        html += '<option' + (opt === statusLabel ? ' selected' : '') + '>' + opt + '</option>';
      }
      html += '</select></div>';
      html += '<div class="form-group"><label class="form-label">Date Applied</label>';
      html += '<input class="form-input tracker-card-back-date-applied" type="date" value="' + esc(job.dateApplied || '') + '" />';
      html += '</div>';
      html += '<button type="button" class="btn btn-action tracker-save-btn tracker-card-back-pipeline-save" data-tracker-key-full="' + esc(key) + '">' + iconHtml('save', 18) + ' Save</button>';
      html += '</div>';
      html += '<div class="tracker-card-back-job-details" data-tracker-key-full="' + esc(key) + '">';
      html += '<h3 class="tracker-card-back-section-heading">Job details</h3>';
      html += '<div class="form-group"><label class="form-label">Title</label><input class="form-input tracker-card-back-edit-title" type="text" value="' + esc(job.title || '') + '" placeholder="Job title" /></div>';
      html += '<div class="form-group"><label class="form-label">Location</label><input class="form-input tracker-card-back-edit-location" type="text" value="' + esc(job.location || '') + '" placeholder="Location" /></div>';
      html += '<div class="form-group"><label class="form-label">Salary</label><input class="form-input tracker-card-back-edit-salary" type="text" value="' + esc((job.salary != null && job.salary !== '') ? String(job.salary) : '') + '" placeholder="e.g. 80k" /></div>';
      html += '</div>';
      html += '<div class="tracker-card-back-job-summary">';
      html += '<h3 class="tracker-card-back-section-heading">Job Summary</h3>';
      html += '<div class="tracker-card-back-job-meta">';
      html += '<div class="tracker-card-back-company">' + companyLine + '</div>';
      html += '<div class="tracker-card-back-pill-row"><span class="tracker-salary-pill meta-pill">' + esc(salaryDisplay) + '</span><span class="status-pill meta-pill ' + stageClass + '">' + esc(statusLabel) + '</span></div>';
      if (jobSum) html += '<div class="tracker-card-back-summary">' + esc(jobSum) + '</div>';
      if (job.url) html += '<a href="' + esc(job.url) + '" target="_blank" rel="noopener" class="btn btn-primary btn-sm tracker-card-back-view-job">' + iconHtml('view', 18) + ' View job</a>';
      html += '</div></div>';
      html += '<h3 class="good-fit-heading">GoodFit</h3>';
      html += '<div class="good-fit-back-content">' + goodFitBackHtml + '</div>';
      html += '<div class="tracker-card-back-notes">';
      html += '<h4 class="tracker-card-back-saved-notes-heading">Saved Notes</h4>';
      html += '<div class="tracker-card-back-saved-notes" data-tracker-key-full="' + esc(key) + '">' + (job.notes && String(job.notes).trim() ? esc(job.notes) : '<span class="color-text-dim">No notes yet.</span>') + '</div>';
      html += '<label class="form-label">Notes</label>';
      html += '<textarea class="form-textarea tracker-card-back-notes-input" data-tracker-key-full="' + esc(key) + '" placeholder="Add notes..."></textarea>';
      html += '<button type="button" class="btn btn-action tracker-save-btn tracker-card-back-notes-save" data-tracker-key-full="' + esc(key) + '">' + iconHtml('save', 18) + ' Save</button>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
    }

    container.innerHTML = html;
    container.querySelectorAll('.tracker-expand-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var card = btn.closest('.tracker-card');
        if (!card) return;
        if (card.closest('#spotlightSlot')) {
          closeGoodFitFocusMode();
          return;
        }
        openEditFocusMode(card);
      });
    });
    container.querySelectorAll('.card-close').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var card = btn.closest('.tracker-card');
        if (!card) return;
        if (card.closest('#spotlightSlot')) {
          if (card.classList.contains('is-focus-mode')) closeGoodFitFocusMode();
          else closeSpotlight();
          return;
        }
        card.classList.remove('flipped');
        card.style.height = '';
        card.style.minHeight = '';
        var listEl = $('trackerList');
        if (listEl) listEl.classList.remove('has-flipped-card');
      });
    });
    container.querySelectorAll('.tracker-card-back-pipeline-save').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var key = btn.getAttribute('data-tracker-key-full');
        if (!key) return;
        var card = btn.closest('.tracker-card');
        var pipelineBlock = card ? card.querySelector('.tracker-card-back-pipeline') : null;
        if (!pipelineBlock) return;
        var statusSelect = pipelineBlock.querySelector('.tracker-card-back-status');
        var dateInput = pipelineBlock.querySelector('.tracker-card-back-date-applied');
        var job = trackerCache.find(function(j) { return (j.url || (j.company + '||' + j.title)) === key; });
        if (!job) return;
        var newStatus = statusSelect ? statusSelect.value : job.status;
        var newDate = dateInput ? dateInput.value : (job.dateApplied || '');
        var detailsBlock = card ? card.querySelector('.tracker-card-back-job-details') : null;
        var newTitle = job.title;
        var newLocation = job.location || '';
        var newSalary = (job.salary != null && job.salary !== '') ? String(job.salary) : '';
        if (detailsBlock) {
          var te = detailsBlock.querySelector('.tracker-card-back-edit-title');
          var le = detailsBlock.querySelector('.tracker-card-back-edit-location');
          var se = detailsBlock.querySelector('.tracker-card-back-edit-salary');
          if (te) newTitle = te.value.trim();
          if (le) newLocation = le.value.trim();
          if (se) newSalary = se.value.trim();
        }
        if (btn.disabled) return;
        btn.disabled = true;
        var origHtml = btn.innerHTML;
        btn.innerHTML = 'Saving…';
        var payload = {
          url: job.url || '',
          company: job.company,
          title: job.title,
          status: newStatus,
          dateApplied: newDate || '',
          notes: job.notes || '',
          location: newLocation || undefined,
          title: newTitle,
          salary: newSalary || undefined
        };
        if (!payload.url || !String(payload.url).trim()) {
          payload.matchCompany = job.company;
          payload.matchTitle = job.title;
        }
        api('updateTracker', payload).then(function(res) {
          btn.disabled = false;
          btn.innerHTML = res && res.ok ? iconHtml('save', 18) + ' Saved' : origHtml;
          if (res && res.ok) {
            var idx = trackerCache.findIndex(function(j) { return (j.url || (j.company + '||' + j.title)) === key; });
            if (idx !== -1) {
              trackerCache[idx].status = newStatus;
              trackerCache[idx].dateApplied = newDate;
              trackerCache[idx].title = newTitle;
              trackerCache[idx].location = newLocation;
              trackerCache[idx].salary = newSalary || trackerCache[idx].salary;
            }
            var pill = card ? card.querySelector('.tracker-card-back-pill-row .status-pill') : null;
            if (pill) pill.textContent = newStatus;
            showToast('Status saved.', 'success');
          } else {
            showToast(res && res.message ? res.message : 'Save failed', 'error');
          }
        }).catch(function(err) {
          btn.disabled = false;
          btn.innerHTML = origHtml;
          showToast('Save failed' + (err && err.message ? ': ' + err.message : ''), 'error');
        });
      });
    });
    container.querySelectorAll('.tracker-remove-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var key = btn.getAttribute('data-tracker-key-full');
        if (!key) return;
        if (!confirm('Remove this job from your tracker? It may appear in Inbox again after the next fetch.')) return;
        if (isBusy) return;
        setLoading(true, 'Removing…');
        api('removeFromTracker', { trackerKey: key }).then(function(r) {
          setLoading(false);
          if (r && r.ok && r.deleted) {
            for (var i = trackerCache.length - 1; i >= 0; i--) {
              var j = trackerCache[i];
              var jKey = (j.url && j.url.trim()) ? j.url : (j.company + '||' + j.title);
              if (jKey === key) { trackerCache.splice(i, 1); break; }
            }
            updateCommandBarCounts();
            renderTrackerPipeline();
            renderTracker(getFilteredTrackerList());
            loadDashboard();
            showToast('Removed from Tracker.', 'success');
          } else {
            showToast(r && r.message ? r.message : 'Could not remove', 'error');
          }
        }).catch(function() { setLoading(false); showToast('Could not remove', 'error'); });
      });
    });
    container.querySelectorAll('.tracker-goodfit-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var card = btn.closest('.tracker-card');
        if (!card) return;
        openGoodFitFocusMode(card);
      });
    });
    container.querySelectorAll('.tracker-card-back-notes-save').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var key = btn.getAttribute('data-tracker-key-full');
        if (!key) return;
        var card = btn.closest('.tracker-card');
        var notesEl = card ? card.querySelector('.tracker-card-back-notes-input') : null;
        var newInput = (notesEl && notesEl.value) ? notesEl.value.trim() : '';
        var job = trackerCache.find(function(j) { return (j.url || (j.company + '||' + j.title)) === key; });
        if (!job) return;
        var existingNotes = (job.notes && String(job.notes).trim()) ? String(job.notes).trim() : '';
        var notes = newInput ? (existingNotes ? existingNotes + '\n\n' + newInput : newInput) : existingNotes;
        if (btn.disabled) return;
        btn.disabled = true;
        btn.innerHTML = 'Saving…';
        api('updateTracker', {
          url: job.url || '',
          company: job.company,
          title: job.title,
          status: job.status || 'Prospect',
          notes: notes,
          dateApplied: job.dateApplied || ''
        }).then(function(res) {
          btn.disabled = false;
          btn.innerHTML = res && res.ok ? iconHtml('save', 18) + ' Saved' : iconHtml('save', 18) + ' Save';
          if (res && res.ok) {
            var idx = trackerCache.findIndex(function(j) { return (j.url || (j.company + '||' + j.title)) === key; });
            if (idx !== -1) trackerCache[idx].notes = notes;
            var savedBlock = card ? card.querySelector('.tracker-card-back-saved-notes') : null;
            if (savedBlock) savedBlock.innerHTML = notes ? esc(notes) : '<span class="color-text-dim">No notes yet.</span>';
            if (notesEl) notesEl.value = '';
            showToast('Saved.', 'success');
          } else {
            showToast(res && res.message ? res.message : 'Save failed', 'error');
          }
        }).catch(function(err) {
          btn.disabled = false;
          btn.innerHTML = iconHtml('save', 18) + ' Save';
          showToast('Save failed' + (err && err.message ? ': ' + err.message : ''), 'error');
        });
      });
    });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // START
  // ─────────────────────────────────────────────────────────────────────────────
  init();
</script>

<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><script>
(function() {
  // Inlined into client_portal; do not add literal closing-script tag or ?> — use string concat if needed.
  if (typeof console !== 'undefined' && console.log) console.log('[ADMIN_BOOT] admin script executed');
  // Define immediately so portal_scripts always finds a function; delegates to real impl when ready
  window.loadAdminProfiles = function() {
    if (typeof window._adminLoadProfiles === 'function') {
      window._adminLoadProfiles();
    } else {
      var t = document.getElementById('toastAdmin');
      if (t) {
        t.textContent = 'Admin tab not ready. Refresh the page.';
        t.className = 'toast-admin visible error';
        setTimeout(function() { t.className = 'toast-admin'; }, 4000);
      }
    }
  };

  function showRootNullError() {
    var tabAdmin = document.getElementById('tabAdmin');
    if (tabAdmin) {
      var err = document.createElement('p');
      err.className = 'admin-sub';
      err.style.cssText = 'color:var(--color-tier-x);padding:2rem;margin:0;';
      err.textContent = 'Admin tab could not initialize. Refresh the page.';
      tabAdmin.insertBefore(err, tabAdmin.firstChild);
    }
  }

  function validateAdminDOM() {
    var required = ['adminTabContent', 'profileList', 'toastAdmin'];
    for (var i = 0; i < required.length; i++) {
      if (!document.getElementById(required[i])) {
        if (typeof console !== 'undefined' && console.error) console.error('[ADMIN_BOOT] Missing required node: ' + required[i]);
        return false;
      }
    }
    return true;
  }

  var root = document.getElementById('adminTabContent');
  function signalAdminReady() {
    window._adminScriptLoaded = true;
    try {
      if (typeof document.dispatchEvent === 'function') {
        var ev = document.createEvent('Event');
        ev.initEvent('sygnalist-admin-ready', true, true);
        document.dispatchEvent(ev);
      }
    } catch (e) {}
  }
  try {
  if (!root) {
    showRootNullError();
    signalAdminReady();
  } else {
    if (!validateAdminDOM()) {
      var tabAdmin = document.getElementById('tabAdmin');
      if (tabAdmin) {
        var err = document.createElement('p');
        err.className = 'admin-sub';
        err.style.cssText = 'color:var(--color-tier-x);padding:2rem;margin:0;';
        err.textContent = 'Admin tab is missing required elements. Refresh the page.';
        tabAdmin.insertBefore(err, tabAdmin.firstChild);
      }
    }
    try {
  var boot = window.ADMIN_BOOT || {};
  var BASE_URL = boot.BASE_URL || '';
  var CURRENT_PROFILE_ID = boot.CURRENT_PROFILE_ID || '';
  var profilesCache = [];
  var jobLanesProfileId = '';
  var jobLanesProfileName = '';

  function updateJobLanesContext() {
    var label = document.getElementById('jobLanesProfileLabel');
    var hint = document.getElementById('jobLanesHint');
    var toolbar = document.getElementById('jobLanesToolbar');
    var verify = document.getElementById('jobLanesVerifyBlock');
    var toggles = document.getElementById('jobLanesSectionEffective');
    if (jobLanesProfileId) {
      var nameEl = document.getElementById('jobLanesProfileNameEl');
      if (nameEl) nameEl.textContent = jobLanesProfileName || jobLanesProfileId;
      if (label) label.style.display = '';
      if (hint) hint.style.display = 'none';
      if (toolbar) toolbar.style.display = '';
      if (verify) verify.style.display = 'block';
      if (toggles) toggles.style.display = 'block';
    } else {
      if (label) label.style.display = 'none';
      if (hint) hint.style.display = '';
      if (toolbar) toolbar.style.display = 'none';
      if (verify) verify.style.display = 'none';
      if (toggles) toggles.style.display = 'none';
    }
  }

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, function(m) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
    });
  }
  function humanizeLaneKey(key) {
    if (key == null || key === '') return '';
    return String(key).replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  function showToast(msg, isError) {
    var el = document.getElementById('toastAdmin');
    if (!el) return;
    el.textContent = msg;
    el.className = 'toast-admin visible ' + (isError ? 'error' : 'success');
    setTimeout(function() { el.className = 'toast-admin'; }, 3500);
  }
  function adminErrorMessage(err, fallback) {
    var msg = (err && err.message) ? err.message : String(err || '');
    if (/getUi|from this context|Authorization/i.test(msg)) return 'Something went wrong. Try refreshing the page.';
    return msg || fallback || 'Error';
  }

  function showAdminLoad(msg) {
    var overlay = document.getElementById('loadingOverlay');
    var textEl = document.getElementById('loadingText');
    if (overlay) overlay.classList.add('visible');
    if (textEl) textEl.textContent = msg || 'Loading...';
  }
  function hideAdminLoad() {
    var overlay = document.getElementById('loadingOverlay');
    var textEl = document.getElementById('loadingText');
    if (overlay) overlay.classList.remove('visible');
    if (textEl) textEl.textContent = 'Loading...';
  }

  function showSection(tab) {
    root.querySelectorAll('.admin-section').forEach(function(s) { s.classList.remove('active'); });
    root.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    var section = document.getElementById('section' + tab.charAt(0).toUpperCase() + tab.slice(1));
    if (section) section.classList.add('active');
    var btn = root.querySelector('.tab-btn[data-tab="' + tab + '"]');
    if (btn) btn.classList.add('active');
  }
  /** Expose for portal: open Admin tab and show a sub-section (e.g. jobsIntake, logs). */
  window.showAdminSection = function(tab) {
    showSection(tab);
    if (tab === 'profiles') renderProfileList(profilesCache);
    else if (tab === 'jobLanes') { updateJobLanesContext(); loadJobLanes(); }
    else if (tab === 'jobBank') loadJobBank();
    else if (tab === 'analytics') loadAnalytics();
    else if (tab === 'jobsIntake') loadJobsInbox();
  };

  function bindAdminUIOnce() {
    if (window._adminBound) return;
    var r = root || document.getElementById('adminTabContent');
    if (!r || !r.querySelectorAll('.tab-btn').length) return;
    window._adminBound = true;
    root = r;
    root.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var tab = this.getAttribute('data-tab');
        window.showAdminSection(tab);
      });
    });
    updateJobLanesContext();
  }
  bindAdminUIOnce();
  window.bindAdminUIOnce = bindAdminUIOnce;

  function renderProfileList(profiles) {
    var list = document.getElementById('profileList');
    if (!list) return;
    var q = (document.getElementById('profileSearch') || {}).value || '';
    q = q.trim().toLowerCase();
    var filtered = (profiles || []).filter(function(p) {
      if (!q) return true;
      return (p.displayName || '').toLowerCase().indexOf(q) !== -1 ||
             (p.profileId || '').toLowerCase().indexOf(q) !== -1 ||
             (p.email || '').toLowerCase().indexOf(q) !== -1;
    });
    if (!filtered.length) {
      list.innerHTML = '<p class="admin-sub">No profiles match.</p>';
      return;
    }
    var html = '';
    filtered.forEach(function(p) {
      var statusClass = (p.status === 'active') ? 'active' : 'inactive';
      var openUrl = BASE_URL ? (BASE_URL + '?profile=' + encodeURIComponent(p.profileId)) : '#';
      var viewAsUrl = BASE_URL ? (BASE_URL + '?profile=' + encodeURIComponent(p.profileId) + '&viewAs=1' + (CURRENT_PROFILE_ID ? '&admin=' + encodeURIComponent(CURRENT_PROFILE_ID) : '')) : '#';
      var lastFetch = p.last_fetch_at ? ('Last scan: ' + p.last_fetch_at) : 'Never scanned';
      html += '<div class="admin-card" data-profile-id="' + esc(p.profileId) + '">';
      html += '<div class="admin-card-info">';
      html += '<div class="admin-card-name">' + esc(p.displayName) + '</div>';
      html += '<div class="admin-card-id">' + esc(p.profileId) + '</div>';
      html += '<div class="admin-card-meta">' + esc(lastFetch) + '</div>';
      var statusLabel = p.status === 'active' ? 'Active' : 'Inactive';
      html += '<span class="admin-card-status ' + statusClass + '">' + esc(statusLabel) + '</span>';
      html += '</div>';
      html += '<div class="admin-card-actions">';
      html += '<a href="' + esc(viewAsUrl) + '" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-with-icon"><span class="btn-icon"><svg class="icon-inline" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-view"/></svg></span> View as</a>';
      html += '<button type="button" class="btn btn-ghost btn-get-link btn-with-icon" data-id="' + esc(p.profileId) + '"><span class="btn-icon"><svg class="icon-inline" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-link"/></svg></span> Get link</button>';
      html += '<button type="button" class="btn btn-ghost btn-lanes btn-with-icon" data-id="' + esc(p.profileId) + '"><span class="btn-icon"><svg class="icon-inline" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-lanes"/></svg></span> Lanes</button>';
      html += '<button type="button" class="btn btn-ghost btn-edit btn-with-icon" data-id="' + esc(p.profileId) + '"><span class="btn-icon"><svg class="icon-inline" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-pencil"/></svg></span> Edit</button>';
      html += '<button type="button" class="btn btn-ghost btn-fetch btn-with-icon" data-id="' + esc(p.profileId) + '"><span class="btn-icon"><svg class="icon-inline" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-fetch"/></svg></span> Fetch</button>';
      html += '<button type="button" class="btn btn-ghost btn-lock btn-with-icon" data-id="' + esc(p.profileId) + '" data-status="' + esc(p.status) + '"><span class="btn-icon"><svg class="icon-inline" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><use href="#' + (p.status === 'active' ? 'icon-lock' : 'icon-unlock') + '"/></svg></span> ' + (p.status === 'active' ? 'Lock' : 'Unlock') + '</button>';
      html += '</div></div>';
    });
    list.innerHTML = html;

    list.querySelectorAll('.btn-get-link').forEach(function(b) {
      b.addEventListener('click', function() {
        if (!canCallServer()) { showToast('Open this page from the deployed app link.', true); return; }
        var id = this.getAttribute('data-id');
        google.script.run.withSuccessHandler(function(r) {
          if (!r.ok) { showToast(r.error || 'Failed', true); return; }
          var url = r.webAppUrl || '';
          if (!url) { showToast('No URL returned', true); return; }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(function() { showToast('Link copied'); }).catch(function() { showToast('URL: ' + url); });
          } else {
            showToast('URL: ' + url);
          }
        }).withFailureHandler(function(err) { showToast(adminErrorMessage(err, 'Error'), true); }).adminGetProfileWebAppUrl(id);
      });
    });
    list.querySelectorAll('.btn-edit').forEach(function(b) {
      b.addEventListener('click', function() { openEditModal(this.getAttribute('data-id')); });
    });
    list.querySelectorAll('.btn-lanes').forEach(function(b) {
      b.addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        var p = profilesCache.find(function(x) { return x.profileId === id; });
        jobLanesProfileId = id || '';
        jobLanesProfileName = (p && (p.displayName || p.profileId)) ? (p.displayName || p.profileId) : id || '';
        updateJobLanesContext();
        showSection('jobLanes');
        if (typeof loadJobLanes === 'function') loadJobLanes();
      });
    });
    list.querySelectorAll('.btn-fetch').forEach(function(b) {
      b.addEventListener('click', function() {
        if (!canCallServer()) { showToast('Open this page from the deployed app link.', true); return; }
        var id = this.getAttribute('data-id');
        var force = window.confirm('Force fetch (skip cooldown)?');
        if (!force && !id) return;
        showAdminLoad('Fetching...');
        google.script.run.withSuccessHandler(function(r) {
          hideAdminLoad();
          if (r.ok) showToast(r.message || 'Fetched ' + (r.written || 0) + ' jobs'); else showToast(r.error || 'Fetch failed', true);
          loadProfiles();
        }).withFailureHandler(function(err) { hideAdminLoad(); showToast(adminErrorMessage(err, 'Error'), true); }).adminFetch(id, force);
      });
    });
    list.querySelectorAll('.btn-lock').forEach(function(b) {
      b.addEventListener('click', function() {
        if (!canCallServer()) { showToast('Open this page from the deployed app link.', true); return; }
        var id = this.getAttribute('data-id');
        var status = this.getAttribute('data-status');
        if (status === 'active') {
          var reason = window.prompt('Lock reason:', 'Locked from admin');
          if (reason === null) return;
          showAdminLoad('Locking...');
          google.script.run.withSuccessHandler(function(r) {
            hideAdminLoad();
            if (r.ok) showToast('Profile locked'); else showToast(r.error || 'Failed', true);
            loadProfiles();
          }).withFailureHandler(function(err) { hideAdminLoad(); showToast(adminErrorMessage(err, 'Error'), true); }).adminSoftLock(id, reason || 'Locked from admin');
        } else {
          showAdminLoad('Unlocking...');
          google.script.run.withSuccessHandler(function(r) {
            hideAdminLoad();
            if (r.ok) showToast('Profile unlocked'); else showToast(r.error || 'Failed', true);
            loadProfiles();
          }).withFailureHandler(function(err) { hideAdminLoad(); showToast(adminErrorMessage(err, 'Error'), true); }).adminUnlock(id);
        }
      });
    });
  }

  function canCallServer() {
    return typeof google !== 'undefined' && google.script && google.script.run;
  }

  var loadProfiles = function() {
    var listEl = document.getElementById('profileList');
    if (!listEl) return;
    if (!canCallServer()) {
      listEl.innerHTML = '<p class="admin-sub" style="color:var(--color-tier-x);">Open this page from the deployed app link. Then try Refresh.</p>';
      return;
    }
    listEl.innerHTML = '<p class="admin-sub">Loading...</p>';
    google.script.run.withSuccessHandler(function(r) {
      var errBanner = document.getElementById('adminTabError');
      if (errBanner) errBanner.remove();
      if (r && r.ok && r.profiles) {
        profilesCache = r.profiles;
        var html = '';
        for (var i = 0; i < profilesCache.length; i++) {
          var p = profilesCache[i];
          html += '<div class="admin-card"><div class="admin-card-name">' + esc(p.displayName || p.profileId) + '</div><div class="admin-card-id">' + esc(p.profileId) + '</div></div>';
        }
        listEl.innerHTML = html || '<p class="admin-sub">No profiles.</p>';
      } else {
        showToast(r && r.error ? r.error : 'Load failed', true);
        profilesCache = [];
        listEl.innerHTML = '<p class="admin-sub">Load failed.</p>';
      }
    }).withFailureHandler(function(err) {
      showToast(adminErrorMessage(err, 'Load failed'), true);
      var list = document.getElementById('profileList');
      if (list) list.innerHTML = '<p class="admin-sub" style="color:var(--color-tier-x);">Could not load profiles. Check that you\'re using the app link and try Refresh.</p>';
    }).adminGetProfiles();
  };
  window._adminLoadProfiles = loadProfiles;
  window.loadAdminProfiles = loadProfiles;

  function loadProfilesFull() {
    var listEl = document.getElementById('profileList');
    var canCall = canCallServer();
    if (!canCall) {
      if (listEl) listEl.innerHTML = '<p class="admin-sub" style="color:var(--color-tier-x);">Open this page from the deployed app link. Then try Refresh.</p>';
      return;
    }
    if (listEl) listEl.innerHTML = '<p class="admin-sub">Loading...</p>';
    google.script.run.withSuccessHandler(function(r) {
      var errBanner = document.getElementById('adminTabError');
      if (errBanner) errBanner.remove();
      if (r.ok) {
        profilesCache = r.profiles || [];
        renderProfileList(profilesCache);
        var enrichSel = document.getElementById('enrichPromoteProfileSelect');
        if (enrichSel) {
          enrichSel.innerHTML = '<option value="">Select profile</option>';
          profilesCache.forEach(function(p) {
            enrichSel.innerHTML += '<option value="' + esc(p.profileId) + '">' + esc(p.displayName || p.profileId) + '</option>';
          });
        }
      } else {
        showToast(r.error || 'Load failed', true);
        profilesCache = [];
        renderProfileList(profilesCache);
      }
    }).withFailureHandler(function(err) {
      showToast(adminErrorMessage(err, 'Load failed'), true);
      var list = document.getElementById('profileList');
      if (list) list.innerHTML = '<p class="admin-sub" style="color:var(--color-tier-x);">Could not load profiles. Check that you\'re using the app link and try Refresh.</p>';
    }).adminGetProfiles();
  }
  loadProfiles = loadProfilesFull;
  window._adminLoadProfiles = loadProfilesFull;
  window.loadAdminProfiles = loadProfilesFull;

  var profileSearchEl = document.getElementById('profileSearch');
  if (profileSearchEl) profileSearchEl.addEventListener('input', function() { renderProfileList(profilesCache); });
  var btnRefresh = document.getElementById('btnRefreshProfiles');
  if (btnRefresh) btnRefresh.addEventListener('click', loadProfiles);

  function openResumeParseModal() {
    var sel = document.getElementById('resumeParseProfileSelect');
    if (sel) {
      sel.innerHTML = '<option value="">Select profile</option>';
      profilesCache.forEach(function(p) {
        sel.innerHTML += '<option value="' + esc(p.profileId) + '">' + esc(p.displayName || p.profileId) + '</option>';
      });
    }
    var ta = document.getElementById('resumeParseText');
    if (ta) ta.value = '';
    var formEl = document.getElementById('resumeParseForm');
    var reviewEl = document.getElementById('resumeParseReview');
    if (formEl) formEl.style.display = '';
    if (reviewEl) reviewEl.style.display = 'none';
    window.resumeParseLastParsed = null;
    window.resumeParseProfileId = '';
    var modal = document.getElementById('modalResumeParse');
    if (modal) modal.classList.add('visible');
  }
  function closeResumeParseModal() {
    var modal = document.getElementById('modalResumeParse');
    if (modal) modal.classList.remove('visible');
  }
  var btnResumeParse = document.getElementById('btnResumeParse');
  if (btnResumeParse) btnResumeParse.addEventListener('click', openResumeParseModal);
  var modalResumeParseClose = document.getElementById('modalResumeParseClose');
  if (modalResumeParseClose) modalResumeParseClose.addEventListener('click', closeResumeParseModal);
  var resumeParseCancel = document.getElementById('resumeParseCancel');
  if (resumeParseCancel) resumeParseCancel.addEventListener('click', closeResumeParseModal);
  var resumeParseOk = document.getElementById('resumeParseOk');
  if (resumeParseOk) resumeParseOk.addEventListener('click', function() {
    var sel = document.getElementById('resumeParseProfileSelect');
    var profileId = sel ? sel.value : '';
    var ta = document.getElementById('resumeParseText');
    var text = ta ? ta.value : '';
    if (!profileId) { showToast('Select a profile', true); return; }
    if (String(text).trim().length < 100) { showToast('Resume text too short (min 100 chars)', true); return; }
    showAdminLoad('Parsing resume...');
    resumeParseOk.disabled = true;
    google.script.run.withSuccessHandler(function(r) {
      hideAdminLoad();
      resumeParseOk.disabled = false;
      if (!r.ok) { showToast(r.error || 'Failed', true); return; }
      window.resumeParseLastParsed = r.parsed;
      window.resumeParseProfileId = profileId;
      var formEl = document.getElementById('resumeParseForm');
      var reviewEl = document.getElementById('resumeParseReview');
      if (formEl) formEl.style.display = 'none';
      if (reviewEl) reviewEl.style.display = 'block';
      var p = r.parsed || {};
      var lanesBtn = document.getElementById('resumeParseApplyLanesBtn');
      if (lanesBtn) lanesBtn.style.display = ((p.suggestedRoles || []).length > 0) ? 'inline-flex' : 'none';
      document.getElementById('resumeParseParsedSummary').textContent = (p.skillProfileText || '').substring(0, 600) || '—';
      document.getElementById('resumeParseParsedPrefs').textContent = [
        (p.topSkills || []).join(', '),
        (p.preferredLocations || []).join(', ') || (p.preferredCountries || []).join(', '),
        p.remotePreference || '',
        p.currentCity ? ('Current city: ' + p.currentCity) : ''
      ].filter(Boolean).join(' · ') || '—';
      document.getElementById('resumeParseCurrentSummary').textContent = 'Loading...';
      document.getElementById('resumeParseCurrentPrefs').textContent = '';
      google.script.run.withSuccessHandler(function(rev) {
        if (rev && rev.ok && rev.profile) {
          var cur = rev.profile;
          document.getElementById('resumeParseCurrentSummary').textContent = (cur.skillProfileText || '').substring(0, 600) || '—';
          document.getElementById('resumeParseCurrentPrefs').textContent = [
            Array.isArray(cur.topSkills) ? cur.topSkills.join(', ') : cur.topSkills,
            Array.isArray(cur.preferredLocations) ? cur.preferredLocations.join(', ') : cur.preferredLocations,
            cur.remotePreference || '',
            cur.currentCity ? ('Current city: ' + cur.currentCity) : ''
          ].filter(Boolean).join(' · ') || '—';
        } else {
          document.getElementById('resumeParseCurrentSummary').textContent = '—';
          document.getElementById('resumeParseCurrentPrefs').textContent = '—';
        }
      }).withFailureHandler(function() {
        document.getElementById('resumeParseCurrentSummary').textContent = '—';
        document.getElementById('resumeParseCurrentPrefs').textContent = '—';
      }).adminGetProfileForReview(profileId);
    }).withFailureHandler(function(err) {
      hideAdminLoad();
      resumeParseOk.disabled = false;
      showToast(adminErrorMessage(err, 'Error'), true);
    }).adminResumeParseOnly(profileId, text);
  });
  var resumeParseBackBtn = document.getElementById('resumeParseBackBtn');
  if (resumeParseBackBtn) resumeParseBackBtn.addEventListener('click', function() {
    document.getElementById('resumeParseReview').style.display = 'none';
    document.getElementById('resumeParseForm').style.display = '';
  });
  var resumeParseApplyBtn = document.getElementById('resumeParseApplyBtn');
  if (resumeParseApplyBtn) resumeParseApplyBtn.addEventListener('click', function() {
    if (!window.resumeParseProfileId || !window.resumeParseLastParsed) { showToast('Parse a resume first', true); return; }
    var applySkills = document.getElementById('resumeParseApplySkillsCb').checked;
    var applyPrefs = document.getElementById('resumeParseApplyPrefsCb').checked;
    if (!applySkills && !applyPrefs) { showToast('Check at least one option to apply', true); return; }
    var statusEl = document.getElementById('resumeParseApplyStatus');
    statusEl.textContent = 'Applying...';
    resumeParseApplyBtn.disabled = true;
    showAdminLoad('Applying...');
    google.script.run.withSuccessHandler(function(r) {
      hideAdminLoad();
      resumeParseApplyBtn.disabled = false;
      if (r.ok) {
        showToast('Applied to profile');
        closeResumeParseModal();
        loadProfiles();
      } else {
        statusEl.textContent = r.error || 'Apply failed';
      }
    }).withFailureHandler(function(err) {
      hideAdminLoad();
      resumeParseApplyBtn.disabled = false;
      statusEl.textContent = adminErrorMessage(err, 'Error');
    }).adminResumeApplyApproved(window.resumeParseProfileId, window.resumeParseLastParsed, { applySkills: applySkills, applyPreferences: applyPrefs });
  });
  var resumeParseApplyLanesBtn = document.getElementById('resumeParseApplyLanesBtn');
  if (resumeParseApplyLanesBtn) resumeParseApplyLanesBtn.addEventListener('click', function() {
    var profileId = window.resumeParseProfileId;
    var parsed = window.resumeParseLastParsed;
    if (!profileId || !parsed) { showToast('Parse a resume first', true); return; }
    var titles = (parsed.suggestedRoles || []).map(function(r) { return (r && r.title) ? String(r.title).trim() : ''; }).filter(Boolean);
    if (titles.length === 0) { showToast('No suggested roles to apply', true); return; }
    resumeParseApplyLanesBtn.disabled = true;
    var statusEl = document.getElementById('resumeParseApplyStatus');
    statusEl.textContent = 'Applying lanes...';
    google.script.run.withSuccessHandler(function(setRes) {
      if (!setRes || !setRes.ok) {
        resumeParseApplyLanesBtn.disabled = false;
        statusEl.textContent = (setRes && setRes.error) ? setRes.error : 'Set approved failed';
        return;
      }
      google.script.run.withSuccessHandler(function(applyRes) {
        resumeParseApplyLanesBtn.disabled = false;
        statusEl.textContent = '';
        if (applyRes && applyRes.ok) {
          showToast('Applied ' + (applyRes.count || 0) + ' lane(s).');
          closeResumeParseModal();
          loadProfiles();
        } else {
          statusEl.textContent = (applyRes && applyRes.message) ? applyRes.message : 'Apply lanes failed';
        }
      }).withFailureHandler(function(err) {
        resumeParseApplyLanesBtn.disabled = false;

  function getLogStyleForRow(row) {

  function buildPipelineStagesFromMeta(meta) {
    var html = '';

    var eligible = m.eligible !== undefined ? m.eligible : '\u2014';
    var candidates = m.candidates !== undefined ? m.candidates : '\u2014';
    var enriched = m.enriched !== undefined ? m.enriched : '\u2014';
    var written = m.written !== undefined ? m.written : '\u2014';
    var rapidErr = m.rapidStatus === 'HTTP_ERROR' || m.rapidStatus === 'QUOTA_EXCEEDED';
    var rowClass = 'logs-run-detail-row';
    html += '<div class="' + rowClass + '"><strong>Main Fetch</strong> ' + main + '</div>';
    html += '<div class="' + rowClass + '"><strong>Merge & Dedupe</strong> ' + main + ' \u2192 ' + dedupe + '</div>';
    html += '<div class="' + rowClass + '"><strong>Hard Filters</strong> ' + dedupe + ' \u2192 ' + eligible + '</div>';
    html += '<div class="' + rowClass + '"><strong>Candidates</strong> ' + eligible + ' \u2192 ' + candidates + '</div>';
    html += '<div class="' + rowClass + '"><strong>Enrich & Validate</strong> ' + (candidates === 0 ? '(skipped)' : candidates + ' \u2192 ' + enriched) + '</div>';
    html += '<div class="' + rowClass + '"><strong>Write Inbox</strong> ' + written + ' new rows</div>';
    html += '<div class="' + rowClass + (rapidErr ? ' logs-run-detail-row--error' : '') + '"><strong>RapidAPI</strong> ' + esc((m.rapidDecision || '\u2014') + (m.rapidStatus ? ' ' + m.rapidStatus : '') + (m.rapidAdded !== undefined ? ' +' + m.rapidAdded : '')) + '</div>';
    return html;
  }
  function appendReceiptCard(container, rec) {
    if (!container) return;

    card.setAttribute('data-batch-id', rec.batchId || '');

      '<span class="font-mono text-xs px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700">' + esc(rec.batchId || '—') + '</span>' +
      '<span class="text-xs px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700">' + esc(rec.profileId || '—') + '</span>' +
      '<span class="text-xs font-medium px-2 py-0.5 rounded ' + statusClass + '">' + status + '</span>' +
      (meta.durationMs !== undefined ? '<span class="text-xs text-gray-500">' + meta.durationMs + 'ms</span>' : '') +
      '</div>' +
      '<div class="text-xs text-gray-600 dark:text-gray-400 mb-1">' + esc(rec.time) + '</div>' +
      '<div class="text-xs mb-1 font-medium">' + esc(pipeline) + '</div>' +
      '<div class="text-xs text-gray-500 mb-1">Rapid: ' + esc(rapidLine) + '</div>' +
      (dropChips ? '<div class="mb-2">' + dropChips + '</div>' : '') +
      '<button type="button" class="btn btn-ghost btn-sm receipt-view-details">View run details</button>' +
      '<div class="logs-receipt-expanded" style="display:none;" data-expanded-details></div>';
    container.appendChild(card);
    var btn = card.querySelector('.receipt-view-details');
    var expandedBlock = card.querySelector('[data-expanded-details]');
    if (btn) btn.addEventListener('click', function() {
      var batchId = rec.batchId || '';
      var isExpanded = expandedBlock && expandedBlock.style.display !== 'none';
      document.querySelectorAll('#logsReceiptCards [data-expanded-details]').forEach(function(el) { el.style.display = 'none'; el.innerHTML = ''; });
      if (isExpanded) return;
      if (!expandedBlock) return;
      expandedBlock.style.display = 'block';
      expandedBlock.innerHTML = '<div class="logs-run-details-inner">' +
        '<div class="admin-heading logs-run-detail-heading">Pipeline stages</div>' +
        '<div class="logs-pipeline-stages">' + buildPipelineStagesFromMeta(rec.meta) + '</div>' +
        '<div class="admin-heading logs-run-detail-heading">Stage timeline</div>' +
        '<ul class="logs-timeline-list space-y-1 mb-3"></ul>' +
        '<details class="logs-run-details-meta"><summary class="logs-run-detail-summary">Receipt meta (JSON)</summary><pre class="logs-receipt-meta-pre mt-1"></pre></details></div>';
      var metaPre = expandedBlock.querySelector('.logs-receipt-meta-pre');
      if (metaPre) metaPre.textContent = JSON.stringify(rec.meta || {}, null, 2);
      var timelineList = expandedBlock.querySelector('.logs-timeline-list');
      if (timelineList && batchId && typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(function(r2) {
          if (!r2.ok || !r2.rows || !timelineList.parentNode) return;
          var hideAdmin = document.getElementById('logsHideAdmin') ? document.getElementById('logsHideAdmin').checked : true;
          var showDebug = document.getElementById('logsShowDebug') ? document.getElementById('logsShowDebug').checked : false;
          var list = r2.rows.filter(function(row) {
            if (hideAdmin && String(row.source || '').toLowerCase() === 'admin') return false;
            if (!showDebug && String(row.source || '').toLowerCase() === 'debug') return false;
            return true;
          });
          list.forEach(function(row) {
            var li = document.createElement('li');

  function loadAnalytics() {
    if (!canCallServer()) { showToast('Open this page from the deployed app link.', true); return; }
    var dash = document.getElementById('analyticsDashboard');

        kpiRow.innerHTML = '';

        ['Active profiles', k.activeProfiles],

        ['Enrich events', k.enrichEventsRecent]

      function formatCompactDateTime(ms) {
        var d = new Date(ms);

        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      }
      kpiRow.innerHTML = '';
      cards.forEach(function(item) {
        var label = item[0];

          ? (raw != null ? formatCompactDateTime(raw) : '-')

        kpiRow.appendChild(div);
      });
      var tierDist = r.tierDistribution || {};
      var tierOrder = ['S', 'A', 'B', 'C', 'F'];
      var tierMax = Math.max(1, tierOrder.reduce(function(m, t) { return Math.max(m, tierDist[t] || 0); }, 0));
      tierChart.innerHTML = '';

        tierChart.appendChild(row);
      });
      var byStatus = r.byStatus || {};
      var statusKeys = Object.keys(byStatus).sort();
      var statusMax = Math.max(1, statusKeys.reduce(function(m, k) { return Math.max(m, byStatus[k]); }, 0));
      statusChart.innerHTML = '';
      statusKeys.forEach(function(s) {
        var count = byStatus[s];

        statusChart.appendChild(row);

<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="color-scheme" content="dark only">
    <meta name="supported-color-schemes" content="dark only">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Prevent system dark mode from inverting our already-dark theme */
      :root {
        color-scheme: dark only;
        --bg-main: #05060A;
        --bg-elevated: #0D1117;
        --border: #1F2933;
        --text-main: #F9FAFB;
        --text-muted: #9CA3AF;
        --radar-light: #A9F2C4;
        --radar-mid: #6AD7A3;
        --radar-dark: #2F8A63;
        --gold: #FAD76A;
        --error: #DC2626;
      }
      
      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      html {
        background: #05060A !important;
        color-scheme: dark only !important;
      }
      
      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: #05060A !important;
        background-color: #05060A !important;
        color: #F9FAFB !important;
        padding: 20px;
        font-size: 13px;
        line-height: 1.5;
      }
      
      h3 {
        font-size: 18px;
        font-weight: 700;
        color: var(--radar-mid);
        margin-bottom: 4px;
      }
      
      .subtitle {
        color: var(--text-muted);
        font-size: 12px;
        margin-bottom: 20px;
      }
      
      .version {
        font-size: 11px;
        opacity: 0.6;
        margin-top: 4px;
      }
      
      .field {
        margin-bottom: 16px;
      }
      
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-main);
        margin-bottom: 6px;
      }
      
      .hint {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 4px;
      }
      
      select, textarea {
        width: 100%;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-main);
        font-family: inherit;
        font-size: 13px;
        padding: 10px 12px;
        outline: none;
      }
      
      select:focus, textarea:focus {
        border-color: var(--radar-mid);
      }
      
      textarea {
        height: 200px;
        resize: vertical;
      }
      
      .btn {
        width: 100%;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--radar-mid) 0%, var(--radar-dark) 100%);
        color: #000;
      }
      
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      
      .status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 12px;
        display: none;
        white-space: pre-wrap;
      }
      
      .status.visible { display: block; }
      .status.error {
        background: rgba(220, 38, 38, 0.15);
        border: 1px solid rgba(220, 38, 38, 0.3);
        color: #FCA5A5;
      }
      .status.success {
        background: rgba(106, 215, 163, 0.15);
        border: 1px solid rgba(106, 215, 163, 0.3);
        color: var(--radar-mid);
      }
      .status.loading {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: var(--text-muted);
      }
      
      .results {
        display: none;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
      
      .results.visible { display: block; }
      
      .result-group {
        margin-bottom: 16px;
      }
      
      .result-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      
      .result-value {
        font-size: 12px;
        color: var(--text-main);
        background: var(--bg-elevated);
        padding: 10px 12px;
        border-radius: 6px;
        white-space: pre-wrap;
        max-height: 120px;
        overflow-y: auto;
      }
      
      .role-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      
      .role-chip {
        padding: 6px 12px;
        background: rgba(106, 215, 163, 0.1);
        border: 1px solid rgba(106, 215, 163, 0.3);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        color: var(--radar-mid);
      }
    </style>
  </head>
  
  <body>
    <h3>🧬 Skill Profile Builder</h3>
    <div class="subtitle">
      Paste resume text → AI extracts skills, stories, and target roles.
      <div class="version">Engine v<?= version ?></div>
    </div>
    
    <div class="field">
      <label>Profile</label>
      <select id="profileSelect">
        <? for (var i = 0; i < (profiles || []).length; i++) { 
             var p = profiles[i]; ?>
          <option value="<?= p.profileId ?>">
            <?= (p.displayName || p.profileId) ?> (<?= p.profileId ?>)
          </option>
        <? } ?>
      </select>
      <? if (!profiles || profiles.length === 0) { ?>
        <div class="hint">No profiles found. Create one first.</div>
      <? } ?>
    </div>
    
    <div class="field">
      <label>Resume Text</label>
      <textarea id="resumeText" placeholder="Paste the full resume text here..."></textarea>
      <div class="hint">Plain text works best.</div>
    </div>
    
    <button class="btn" id="runBtn" onclick="run()">🧬 Build + Save</button>
    
    <div class="status" id="status"></div>
    
    <div class="results" id="results">
      <div class="result-group">
        <div class="result-label">Target Roles</div>
        <div class="role-chips" id="rolesOutput"></div>
      </div>
      
      <div class="result-group">
        <div class="result-label">Skills</div>
        <div class="result-value" id="skillsOutput"></div>
      </div>
      
      <div class="result-group">
        <div class="result-label">Summary</div>
        <div class="result-value" id="summaryOutput"></div>
      </div>
    </div>
    
    <script>
      function $(id) { return document.getElementById(id); }
      
      function showStatus(msg, type) {
        var el = $('status');
        el.textContent = msg;
        el.className = 'status visible ' + (type || '');
      }
      
      function run() {
        var profileId = $('profileSelect').value;
        var text = $('resumeText').value;
        
        if (!profileId) {
          return showStatus('Select a profile first.', 'error');
        }
        if (!text || text.trim().length < 100) {
          return showStatus('Paste more resume text (at least 100 characters).', 'error');
        }
        
        $('runBtn').disabled = true;
        showStatus('🔄 Analyzing resume with AI... This may take 15-30 seconds.', 'loading');
        $('results').classList.remove('visible');
        
        google.script.run
          .withSuccessHandler(function(res) {
            $('runBtn').disabled = false;
            if (res && res.ok === false) {
              showStatus('❌ ' + (res.error || 'Unknown error'), 'error');
              return;
            }
            
            showStatus('✅ Saved to Admin_Profiles!', 'success');
            
            if (res && res.parsed) {
              var roles = res.parsed.suggestedRoles || [];
              var rolesHtml = '';
              for (var i = 0; i < roles.length; i++) {
                rolesHtml += '<span class="role-chip">' + roles[i].title + '</span>';
              }
              $('rolesOutput').innerHTML = rolesHtml || 'None';
              $('skillsOutput').textContent = (res.parsed.topSkills || []).join(', ') || 'None';
              $('summaryOutput').textContent = res.parsed.skillProfileText || 'None';
              $('results').classList.add('visible');
            }
          })
          .withFailureHandler(function(err) {
            $('runBtn').disabled = false;
            showStatus('❌ ' + (err && err.message ? err.message : String(err)), 'error');
          })
          .skillProfile_buildAndSave_(profileId, text);
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Backgrounds */
        --bg-main: #05060A;
        --bg-elevated: #0D1117;
        --bg-card: #0F1419;
        --bg-glass: rgba(13, 17, 23, 0.85);
        
        /* Borders */
        --border: #21262D;
        --border-light: #30363D;
        
        /* Text */
        --text: #F0F6FC;
        --text-secondary: #C9D1D9;
        --text-muted: #8B949E;
        --text-dim: #484F58;
        
        /* Brand - Radar Green */
        --green-light: #A9F2C4;
        --green: #6AD7A3;
        --green-dark: #2F8A63;
        --green-darker: #1B4D3E;
        
        /* Signal Gold */
        --gold: #FAD76A;
        --gold-dark: #B8860B;
        
        /* Tiers */
        --tier-s: #FAD76A;
        --tier-a: #6AD7A3;
        --tier-b: #58A6FF;
        --tier-c: #8B949E;
        --tier-f: #484F58;
        --tier-x: #F85149;
        
        /* Effects */
        --glow-green: 0 0 40px rgba(106, 215, 163, 0.15);
        --glow-gold: 0 0 40px rgba(250, 215, 106, 0.2);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        
        --radius: 16px;
        --radius-sm: 12px;
        --radius-xs: 8px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-main);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
        overflow-x: hidden;
      }

      /* Animated radar grid background */
      body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: 
          radial-gradient(ellipse at 50% 0%, rgba(106, 215, 163, 0.03) 0%, transparent 50%),
          linear-gradient(rgba(106, 215, 163, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(106, 215, 163, 0.015) 1px, transparent 1px);
        background-size: 100% 100%, 60px 60px, 60px 60px;
        pointer-events: none;
        z-index: 0;
      }

      .app {
        position: relative;
        z-index: 1;
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 24px;
      }

      /* ═══════════════════════════════════════════════════ */
      /* NAVBAR */
      /* ═══════════════════════════════════════════════════ */
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .logo-mark {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--glow-green);
      }

      .logo-mark svg {
        width: 28px;
        height: 28px;
        fill: var(--bg-main);
      }

      .brand-text h1 {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 2px;
        background: linear-gradient(135deg, var(--green-light) 0%, var(--green) 50%, var(--green-dark) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .brand-text .tagline {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 3px;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-top: 2px;
      }

      .profile-badge {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }

      .profile-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-pill.active {
        background: rgba(106, 215, 163, 0.15);
        color: var(--green);
        border: 1px solid rgba(106, 215, 163, 0.3);
      }

      .status-pill.locked {
        background: rgba(248, 81, 73, 0.15);
        color: var(--tier-x);
        border: 1px solid rgba(248, 81, 73, 0.3);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      /* ═══════════════════════════════════════════════════ */
      /* CTA ROW */
      /* ═══════════════════════════════════════════════════ */
      .cta-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px 24px;
        border: 1px solid var(--border);
        background: var(--bg-elevated);
        color: var(--text);
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        border-radius: 999px;
        cursor: pointer;
        transition: all 200ms ease;
        white-space: nowrap;
      }

      .btn:hover {
        border-color: var(--green-dark);
        transform: translateY(-2px);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .btn.primary {
        border: none;
        background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 60%, var(--green-darker) 100%);
        color: #fff;
        font-weight: 700;
        box-shadow: var(--glow-green), 0 4px 12px rgba(0,0,0,0.3);
      }

      .btn.primary:hover {
        box-shadow: 0 0 60px rgba(106, 215, 163, 0.25), 0 8px 24px rgba(0,0,0,0.4);
      }

      .last-fetch {
        margin-left: auto;
        font-size: 12px;
        color: var(--text-dim);
      }

      /* ═══════════════════════════════════════════════════ */
      /* MAIN GRID */
      /* ═══════════════════════════════════════════════════ */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 400px;
        gap: 24px;
        align-items: start;
      }

      .panel {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        background: rgba(0,0,0,0.2);
      }

      .panel-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 16px;
        font-weight: 700;
      }

      .panel-title .icon {
        font-size: 20px;
      }

      .panel-count {
        background: rgba(255,255,255,0.08);
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
      }

      .panel-body {
        padding: 16px;
        max-height: 70vh;
        overflow-y: auto;
      }

      /* Custom scrollbar */
      .panel-body::-webkit-scrollbar {
        width: 6px;
      }
      .panel-body::-webkit-scrollbar-track {
        background: transparent;
      }
      .panel-body::-webkit-scrollbar-thumb {
        background: var(--border-light);
        border-radius: 3px;
      }

      /* ═══════════════════════════════════════════════════ */
      /* JOB CARDS */
      /* ═══════════════════════════════════════════════════ */
      .job-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 20px;
        margin-bottom: 12px;
        transition: all 250ms ease;
      }

      .job-card:hover {
        border-color: var(--green-dark);
        box-shadow: var(--glow-green);
        transform: translateY(-2px);
      }

      .job-card.tier-s {
        border-color: rgba(250, 215, 106, 0.4);
        background: linear-gradient(135deg, var(--bg-card) 0%, rgba(250, 215, 106, 0.03) 100%);
      }

      .job-card.tier-s:hover {
        box-shadow: var(--glow-gold);
      }

      .job-header {
        margin-bottom: 12px;
      }

      .job-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
        margin-bottom: 4px;
      }

      .job-company {
        font-size: 14px;
        color: var(--text-muted);
      }

      .job-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        font-size: 11px;
        font-weight: 600;
        border-radius: 6px;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        color: var(--text-muted);
      }

      .chip.tier {
        font-weight: 800;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .chip.tier-s { background: rgba(250,215,106,0.12); border-color: rgba(250,215,106,0.4); color: var(--tier-s); }
      .chip.tier-a { background: rgba(106,215,163,0.12); border-color: rgba(106,215,163,0.4); color: var(--tier-a); }
      .chip.tier-b { background: rgba(88,166,255,0.12); border-color: rgba(88,166,255,0.4); color: var(--tier-b); }
      .chip.tier-c { background: rgba(139,148,158,0.12); border-color: rgba(139,148,158,0.3); color: var(--tier-c); }
      .chip.tier-f { background: rgba(72,79,88,0.2); border-color: rgba(72,79,88,0.4); color: var(--tier-f); }
      .chip.tier-x { background: rgba(248,81,73,0.12); border-color: rgba(248,81,73,0.4); color: var(--tier-x); }

      .chip.lane {
        border-color: var(--green-dark);
        color: var(--green);
      }

      /* Summary */
      .job-summary {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.6;
        padding: 12px 14px;
        background: rgba(0,0,0,0.25);
        border-radius: var(--radius-xs);
        border-left: 3px solid var(--green-dark);
        margin-bottom: 14px;
      }

      /* Why Fit Section */
      .why-fit-section {
        margin-bottom: 16px;
      }

      .why-fit-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: rgba(106, 215, 163, 0.08);
        border: 1px solid rgba(106, 215, 163, 0.2);
        border-radius: var(--radius-xs);
        color: var(--green);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 150ms ease;
      }

      .why-fit-toggle:hover {
        background: rgba(106, 215, 163, 0.12);
        border-color: rgba(106, 215, 163, 0.4);
      }

      .why-fit-toggle .arrow {
        transition: transform 200ms ease;
        font-size: 10px;
      }

      .why-fit-toggle.open .arrow {
        transform: rotate(90deg);
      }

      .why-fit-content {
        display: none;
        margin-top: 12px;
        padding: 16px;
        background: linear-gradient(135deg, rgba(106,215,163,0.06) 0%, rgba(47,138,99,0.03) 100%);
        border: 1px solid rgba(106,215,163,0.15);
        border-radius: var(--radius-xs);
        font-size: 13px;
        color: var(--text);
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .why-fit-content.open {
        display: block;
      }

      .why-fit-label {
        font-size: 11px;
        font-weight: 700;
        color: var(--green);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      /* Card Actions */
      .job-actions {
        display: flex;
        gap: 10px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .job-actions .btn {
        padding: 10px 16px;
        font-size: 12px;
        flex: 1;
      }

      /* ═══════════════════════════════════════════════════ */
      /* TRACKER CARDS */
      /* ═══════════════════════════════════════════════════ */
      .tracker-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 16px;
        margin-bottom: 10px;
      }

      .tracker-card .job-title {
        font-size: 14px;
      }

      .tracker-card .job-company {
        font-size: 12px;
      }

      .form-row {
        margin-top: 12px;
      }

      .form-row label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      select, input[type="date"], textarea {
        width: 100%;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-xs);
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 150ms ease;
      }

      select:focus, input:focus, textarea:focus {
        border-color: var(--green-dark);
      }

      textarea {
        min-height: 60px;
        resize: vertical;
      }

      .tracker-card .btn {
        margin-top: 12px;
      }

      /* ═══════════════════════════════════════════════════ */
      /* EMPTY STATES */
      /* ═══════════════════════════════════════════════════ */
      .empty-state {
        text-align: center;
        padding: 48px 24px;
      }

      .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.4;
      }

      .empty-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .empty-subtitle {
        font-size: 13px;
        color: var(--text-dim);
      }

      /* ═══════════════════════════════════════════════════ */
      /* TOAST / STATUS */
      /* ═══════════════════════════════════════════════════ */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        padding: 14px 28px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 500;
        box-shadow: var(--shadow);
        z-index: 1000;
        opacity: 0;
        transition: all 300ms ease;
      }

      .toast.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast.success {
        border-color: var(--green-dark);
        color: var(--green);
      }

      .toast.error {
        border-color: var(--tier-x);
        color: var(--tier-x);
      }

      /* Links */
      a {
        color: var(--green);
        text-decoration: none;
        transition: color 150ms ease;
      }

      a:hover {
        color: var(--green-light);
      }

      /* Loading overlay */
      .loading-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(5, 6, 10, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 200ms ease;
      }

      .loading-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }

      .loader {
        width: 48px;
        height: 48px;
        border: 3px solid var(--border);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loader"></div>
    </div>

    <div class="app">
      <!-- NAVBAR -->
      <nav class="navbar">
        <div class="brand">
          <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" opacity="0.3"/>
              <path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z" opacity="0.6"/>
            </svg>
          </div>
          <div class="brand-text">
            <h1>SYGNALIST</h1>
            <div class="tagline">Find the Signal</div>
          </div>
        </div>
        <div class="profile-badge">
          <div class="profile-name" id="profileName"></div>
          <div class="status-pill" id="statusPill">
            <span class="status-dot"></span>
            <span id="statusText"></span>
          </div>
        </div>
      </nav>

      <!-- CTA ROW -->
      <div class="cta-row">
        <button class="btn primary" id="fetchBtn" onclick="fetchJobs()">
          📡 Fetch New Roles
        </button>
        <button class="btn" id="refreshBtn" onclick="refreshAll()">
          ↻ Refresh
        </button>
        <div class="last-fetch" id="lastFetch"></div>
      </div>

      <!-- MAIN GRID -->
      <div class="main-grid">
        <!-- INBOX -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">
              <span class="icon">📥</span>
              <span>Inbox</span>
            </div>
            <div class="panel-count" id="inboxCount">0 roles</div>
          </div>
          <div class="panel-body" id="inbox"></div>
        </div>

        <!-- TRACKER -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">
              <span class="icon">⭐</span>
              <span>Tracker</span>
            </div>
            <div class="panel-count" id="trackerCount">0 roles</div>
          </div>
          <div class="panel-body" id="tracker"></div>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
      const BOOT = JSON.parse(<?= BOOTSTRAP_JSON ?>);
      const profileId = BOOT.profile.profileId;
      let isBusy = false;

      function $(id) { return document.getElementById(id); }
      
      function esc(s) { 
        return String(s || "").replace(/[&<>"']/g, function(m) {
          return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
        }); 
      }

      // Initialize
      $("profileName").textContent = BOOT.profile.displayName || BOOT.profile.profileId;
      $("statusText").textContent = BOOT.profile.status;
      $("statusPill").classList.add(BOOT.profile.status === "active" ? "active" : "locked");

      // ═══════════════════════════════════════════════════
      // API
      // ═══════════════════════════════════════════════════
      function api(op, data) {
        return new Promise(function(resolve) {
          google.script.run
            .withSuccessHandler(function(res) {
              resolve(res || { ok: false, message: "Empty response" });
            })
            .withFailureHandler(function(err) {
              resolve({ ok: false, message: (err && err.message) || String(err) });
            })
            .portal_api(profileId, { op: op, data: data || {} });
        });
      }

      // ═══════════════════════════════════════════════════
      // UI STATE
      // ═══════════════════════════════════════════════════
      function showToast(msg, type) {
        var t = $("toast");
        t.textContent = msg;
        t.className = "toast visible " + (type || "");
        setTimeout(function() { t.classList.remove("visible"); }, 4000);
      }

      function setLoading(loading) {
        isBusy = loading;
        $("fetchBtn").disabled = loading;
        $("refreshBtn").disabled = loading;
        $("loadingOverlay").classList.toggle("visible", loading);
      }

      // ═══════════════════════════════════════════════════
      // ACTIONS
      // ═══════════════════════════════════════════════════
      async function fetchJobs() {
        if (isBusy) return;
        setLoading(true);

        var res = await api("fetch");

        if (!res || !res.ok) {
          showToast("❌ " + (res && res.message ? res.message : "Fetch failed"), "error");
          setLoading(false);
          return;
        }

        showToast("✅ Found " + (res.count || 0) + " new roles", "success");
        $("lastFetch").textContent = "Last fetch: just now";
        
        await loadData();
        setLoading(false);
      }

      async function refreshAll() {
        if (isBusy) return;
        setLoading(true);
        await loadData();
        setLoading(false);
      }

      async function loadData() {
        var results = await Promise.all([api("getInbox"), api("getTracker")]);
        var inboxRes = results[0];
        var trackerRes = results[1];

        if (inboxRes && inboxRes.ok) {
          renderInbox(inboxRes.inbox || []);
        }
        if (trackerRes && trackerRes.ok) {
          renderTracker(trackerRes.tracker || []);
        }
      }

      async function promote(job) {
        if (isBusy) return;
        setLoading(true);

        var res = await api("promote", job);

        if (res && res.ok) {
          showToast("⭐ Added to Tracker!", "success");
          await loadData();
        } else {
          showToast("⚠️ " + (res && res.message ? res.message : "Already in Tracker"), "error");
        }

        setLoading(false);
      }

      async function updateTracker(url, company, title) {
        var key = url || (company + "||" + title);
        var h = hash(key);

        var status = $("st_" + h).value;
        var notes = $("no_" + h).value;
        var dateApplied = $("da_" + h).value;

        setLoading(true);

        var res = await api("updateTracker", { 
          url: url, 
          company: company, 
          title: title, 
          status: status, 
          notes: notes, 
          dateApplied: dateApplied 
        });

        if (res && res.ok) {
          showToast("✅ Saved", "success");
        } else {
          showToast("❌ " + (res && res.message ? res.message : "Save failed"), "error");
        }

        await loadData();
        setLoading(false);
      }

      // ═══════════════════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════════════════
      function renderInbox(list) {
        $("inboxCount").textContent = list.length + " role" + (list.length !== 1 ? "s" : "");

        if (!list.length) {
          $("inbox").innerHTML = 
            '<div class="empty-state">' +
              '<div class="empty-icon">📡</div>' +
              '<div class="empty-title">No roles in your inbox yet</div>' +
              '<div class="empty-subtitle">Click "Fetch New Roles" to start the hunt</div>' +
            '</div>';
          return;
        }

        var html = "";
        for (var i = 0; i < list.length; i++) {
          var j = list[i];
          var tier = String(j.tier || "C").toUpperCase();
          var cardClass = tier === "S" ? "job-card tier-s" : "job-card";
          var whyFitId = "whyfit_" + i;

          html += '<div class="' + cardClass + '">';
          html += '<div class="job-header">';
          html += '<div class="job-title">' + esc(j.title) + '</div>';
          html += '<div class="job-company">' + esc(j.company) + '</div>';
          html += '</div>';
          
          html += '<div class="job-chips">';
          html += '<span class="chip tier tier-' + tier.toLowerCase() + '">Tier ' + esc(tier) + ' · ' + esc(j.score) + '</span>';
          if (j.laneLabel) html += '<span class="chip lane">' + esc(j.laneLabel) + '</span>';
          html += '<span class="chip">' + esc(j.location || 'Remote') + '</span>';
          html += '<span class="chip">' + esc(j.source) + '</span>';
          html += '</div>';

          if (j.jobSummary) {
            html += '<div class="job-summary">' + esc(j.jobSummary) + '</div>';
          }

          if (j.whyFit) {
            html += '<div class="why-fit-section">';
            html += '<div class="why-fit-toggle" onclick="toggleWhyFit(\'' + whyFitId + '\', this)">';
            html += '<span class="arrow">▶</span>';
            html += '<span>Why You\'re a Fit</span>';
            html += '</div>';
            html += '<div class="why-fit-content" id="' + whyFitId + '">';
            html += '<div class="why-fit-label">Why You\'re a Fit</div>';
            html += esc(j.whyFit);
            html += '</div>';
            html += '</div>';
          }

          html += '<div class="job-actions">';
          html += '<a class="btn" href="' + esc(j.url) + '" target="_blank">Open Job →</a>';
          html += '<button class="btn primary" onclick=\'promote(' + JSON.stringify(j) + ')\'>⭐ Add to Tracker</button>';
          html += '</div>';
          html += '</div>';
        }

        $("inbox").innerHTML = html;
      }

      function toggleWhyFit(id, toggle) {
        $(id).classList.toggle("open");
        toggle.classList.toggle("open");
      }

      function renderTracker(list) {
        $("trackerCount").textContent = list.length + " role" + (list.length !== 1 ? "s" : "");

        if (!list.length) {
          $("tracker").innerHTML = 
            '<div class="empty-state">' +
              '<div class="empty-icon">⭐</div>' +
              '<div class="empty-title">Nothing in your Tracker yet</div>' +
              '<div class="empty-subtitle">Add roles from your Inbox to start tracking</div>' +
            '</div>';
          return;
        }

        var statusOptions = ["Prospect","Applied","Interview 1","Interview 2","Final Interview","Offer 🤝🔥","Rejected 💀","Ghosted 👻"];
        var html = "";

        for (var i = 0; i < list.length; i++) {
          var j = list[i];
          var key = j.url || (j.company + "||" + j.title);
          var h = hash(key);

          html += '<div class="tracker-card">';
          html += '<div class="job-title">' + esc(j.title) + '</div>';
          html += '<div class="job-company">' + esc(j.company) + ' · ' + esc(j.source) + '</div>';
          html += '<div style="margin-top:8px"><a href="' + esc(j.url) + '" target="_blank">Open job →</a></div>';

          html += '<div class="form-row"><label>Status</label>';
          html += '<select id="st_' + h + '">';
          for (var s = 0; s < statusOptions.length; s++) {
            var opt = statusOptions[s];
            html += '<option' + (opt === j.status ? ' selected' : '') + '>' + opt + '</option>';
          }
          html += '</select></div>';

          html += '<div class="form-row"><label>Date Applied</label>';
          html += '<input id="da_' + h + '" type="date" value="' + esc(j.dateApplied) + '"/></div>';

          html += '<div class="form-row"><label>Notes</label>';
          html += '<textarea id="no_' + h + '">' + esc(j.notes) + '</textarea></div>';

          html += '<button class="btn primary" onclick=\'updateTracker(' + JSON.stringify(j.url) + ',' + JSON.stringify(j.company) + ',' + JSON.stringify(j.title) + ')\'>';
          html += '💾 Save</button>';
          html += '</div>';
        }

        $("tracker").innerHTML = html;
      }

      function hash(s) {
        s = String(s || "");
        var h = 0;
        for (var i = 0; i < s.length; i++) {
          h = ((h << 5) - h) + s.charCodeAt(i) | 0;
        }
        return Math.abs(h);
      }

      // Init
      loadData();
    </script>
  </body>
</html>

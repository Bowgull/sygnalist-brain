<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Background */
        --color-bg: #05060A;
        --color-bg-elevated: #0D1117;
        --color-bg-card: #0B1220;
        --color-divider: #1F2933;
        
        /* Text */
        --color-text-main: #F9FAFB;
        --color-text-muted: #9CA3AF;
        --color-text-dim: #6B7280;
        
        /* Brand - Radar Green Gradient */
        --color-radar-light: #A9F2C4;
        --color-radar-mid: #6AD7A3;
        --color-radar-dark: #2F8A63;
        
        /* Signal Gold (for S-tier / promoted) */
        --color-signal-gold: #FAD76A;
        
        /* Tier Colors */
        --color-tier-s: #FAD76A;
        --color-tier-a: #6AD7A3;
        --color-tier-b: #38BDF8;
        --color-tier-c: #9CA3AF;
        --color-tier-f: #4B5563;
        --color-tier-x: #DC2626;
        
        /* Shadows & Effects */
        --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
        --shadow-glow-green: 0 0 20px rgba(106,215,163,0.15);
        --shadow-glow-gold: 0 0 20px rgba(250,215,106,0.2);
        --radius: 16px;
        --radius-sm: 12px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--color-bg);
        color: var(--color-text-main);
        min-height: 100vh;
        line-height: 1.5;
      }

      /* Subtle grid background */
      body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: 
          linear-gradient(rgba(106,215,163,0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(106,215,163,0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .wrap {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 60px;
      }

      /* ═══════════════════════════════════════════════════ */
      /* TOP BAR */
      /* ═══════════════════════════════════════════════════ */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        background: var(--color-bg-elevated);
        border: 1px solid var(--color-divider);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        margin-bottom: 20px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand h1 {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 1px;
        background: linear-gradient(135deg, var(--color-radar-mid) 0%, var(--color-radar-light) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .tagline {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        color: var(--color-text-muted);
        text-transform: uppercase;
      }

      .profile-info {
        text-align: right;
      }

      .profile-name {
        font-weight: 600;
        font-size: 14px;
      }

      .profile-status {
        font-size: 12px;
        color: var(--color-text-muted);
      }

      .profile-status.active { color: var(--color-radar-mid); }
      .profile-status.locked { color: var(--color-tier-x); }

      /* ═══════════════════════════════════════════════════ */
      /* CTA ROW */
      /* ═══════════════════════════════════════════════════ */
      .cta-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        border: 1px solid var(--color-divider);
        background: var(--color-bg-elevated);
        color: var(--color-text-main);
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        border-radius: 999px;
        cursor: pointer;
        transition: all 180ms ease;
      }

      .btn:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn.primary {
        border: none;
        background: linear-gradient(135deg, var(--color-radar-mid) 0%, var(--color-radar-dark) 50%, var(--color-radar-light) 100%);
        color: #07110A;
        box-shadow: var(--shadow-glow-green);
      }

      .btn.primary:hover {
        box-shadow: 0 0 30px rgba(106,215,163,0.3);
      }

      .btn.secondary {
        border: 1px solid var(--color-radar-dark);
        background: transparent;
        color: var(--color-radar-light);
      }

      .last-fetch {
        margin-left: auto;
        font-size: 12px;
        color: var(--color-text-dim);
      }

      /* ═══════════════════════════════════════════════════ */
      /* GRID LAYOUT */
      /* ═══════════════════════════════════════════════════ */
      .grid {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 20px;
      }

      .panel {
        background: var(--color-bg-elevated);
        border: 1px solid var(--color-divider);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        padding: 20px;
      }

      .panel h2 {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel h2 .count {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-muted);
        background: rgba(255,255,255,0.05);
        padding: 2px 10px;
        border-radius: 999px;
      }

      /* ═══════════════════════════════════════════════════ */
      /* JOB CARDS */
      /* ═══════════════════════════════════════════════════ */
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--color-divider);
        border-radius: var(--radius-sm);
        padding: 16px;
        margin-bottom: 12px;
        transition: all 200ms ease;
      }

      .card:hover {
        border-color: rgba(106,215,163,0.3);
        box-shadow: var(--shadow-glow-green);
      }

      .card.tier-s {
        border-color: rgba(250,215,106,0.3);
      }

      .card.tier-s:hover {
        box-shadow: var(--shadow-glow-gold);
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.3;
      }

      .card-company {
        font-size: 13px;
        color: var(--color-text-muted);
        margin-top: 4px;
      }

      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }

      /* Chips */
      .chip {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 600;
        border-radius: 999px;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--color-divider);
        color: var(--color-text-muted);
      }

      .chip.tier {
        font-weight: 800;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .chip.tier-s { background: rgba(250,215,106,0.12); border-color: rgba(250,215,106,0.35); color: var(--color-tier-s); }
      .chip.tier-a { background: rgba(106,215,163,0.12); border-color: rgba(106,215,163,0.35); color: var(--color-tier-a); }
      .chip.tier-b { background: rgba(56,189,248,0.12); border-color: rgba(56,189,248,0.35); color: var(--color-tier-b); }
      .chip.tier-c { background: rgba(156,163,175,0.12); border-color: rgba(156,163,175,0.30); color: var(--color-tier-c); }
      .chip.tier-f { background: rgba(75,85,99,0.12); border-color: rgba(75,85,99,0.35); color: var(--color-tier-f); }
      .chip.tier-x { background: rgba(220,38,38,0.12); border-color: rgba(220,38,38,0.35); color: var(--color-tier-x); }

      .chip.lane {
        border-color: var(--color-radar-dark);
        color: var(--color-radar-light);
      }

      /* Summary Section */
      .card-summary {
        font-size: 13px;
        color: var(--color-text-muted);
        line-height: 1.5;
        margin-bottom: 12px;
        padding: 10px 12px;
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
        border-left: 3px solid var(--color-radar-dark);
      }

      /* Why Fit Section */
      .why-fit-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        color: var(--color-radar-light);
        cursor: pointer;
        margin-bottom: 10px;
        transition: all 150ms ease;
      }

      .why-fit-toggle:hover {
        color: var(--color-radar-mid);
      }

      .why-fit-toggle .arrow {
        transition: transform 200ms ease;
      }

      .why-fit-toggle.open .arrow {
        transform: rotate(90deg);
      }

      .why-fit-content {
        display: none;
        font-size: 13px;
        color: var(--color-text-main);
        line-height: 1.6;
        padding: 12px 14px;
        background: linear-gradient(135deg, rgba(106,215,163,0.08) 0%, rgba(47,138,99,0.05) 100%);
        border-radius: 8px;
        border: 1px solid rgba(106,215,163,0.15);
        margin-bottom: 12px;
        white-space: pre-wrap;
      }

      .why-fit-content.open {
        display: block;
      }

      .card-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .card-actions .btn {
        padding: 8px 14px;
        font-size: 12px;
      }

      /* ═══════════════════════════════════════════════════ */
      /* TRACKER CARDS */
      /* ═══════════════════════════════════════════════════ */
      .tracker-card {
        background: var(--color-bg-card);
        border: 1px solid var(--color-divider);
        border-radius: var(--radius-sm);
        padding: 14px;
        margin-bottom: 10px;
      }

      .tracker-card .card-title {
        font-size: 14px;
      }

      .tracker-card .card-company {
        font-size: 12px;
      }

      .form-row {
        margin-top: 10px;
      }

      .form-row label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--color-text-dim);
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      select, input[type="date"], textarea {
        width: 100%;
        background: var(--color-bg);
        border: 1px solid var(--color-divider);
        border-radius: 8px;
        color: var(--color-text-main);
        font-family: inherit;
        font-size: 13px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 150ms ease;
      }

      select:focus, input:focus, textarea:focus {
        border-color: var(--color-radar-dark);
      }

      textarea {
        min-height: 60px;
        resize: vertical;
      }

      /* ═══════════════════════════════════════════════════ */
      /* EMPTY & STATUS STATES */
      /* ═══════════════════════════════════════════════════ */
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--color-text-dim);
        font-size: 14px;
      }

      .empty-icon {
        font-size: 32px;
        margin-bottom: 12px;
        opacity: 0.5;
      }

      .status-bar {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--color-bg-elevated);
        border: 1px solid var(--color-divider);
        padding: 12px 24px;
        border-radius: 999px;
        font-size: 13px;
        box-shadow: var(--shadow-card);
        z-index: 100;
        display: none;
      }

      .status-bar.visible {
        display: block;
      }

      .status-bar.error {
        border-color: var(--color-tier-x);
        color: var(--color-tier-x);
      }

      .status-bar.success {
        border-color: var(--color-radar-mid);
        color: var(--color-radar-mid);
      }

      /* Link styling */
      a {
        color: var(--color-radar-light);
        text-decoration: none;
        transition: color 150ms ease;
      }

      a:hover {
        color: var(--color-radar-mid);
        text-decoration: underline;
      }

      /* Loading state */
      .loading {
        opacity: 0.6;
        pointer-events: none;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .loading-text {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <!-- TOP BAR -->
      <div class="topbar">
        <div class="brand">
          <h1>SYGNALIST</h1>
          <div class="tagline">Find the Signal</div>
        </div>
        <div class="profile-info">
          <div class="profile-name" id="profileName"></div>
          <div class="profile-status" id="profileStatus"></div>
        </div>
      </div>

      <!-- CTA ROW -->
      <div class="cta-row">
        <button class="btn primary" id="fetchBtn" onclick="fetchJobs()">
          📡 Fetch New Roles
        </button>
        <button class="btn" id="refreshBtn" onclick="refreshAll()">
          🔄 Refresh
        </button>
        <div class="last-fetch" id="lastFetch"></div>
      </div>

      <!-- MAIN GRID -->
      <div class="grid">
        <!-- INBOX PANEL -->
        <div class="panel">
          <h2>
            📥 Inbox
            <span class="count" id="inboxCount">0</span>
          </h2>
          <div id="inbox"></div>
        </div>

        <!-- TRACKER PANEL -->
        <div class="panel">
          <h2>
            ⭐ Tracker
            <span class="count" id="trackerCount">0</span>
          </h2>
          <div id="tracker"></div>
        </div>
      </div>
    </div>

    <!-- STATUS BAR (toast) -->
    <div class="status-bar" id="statusBar"></div>

    <script>
      const BOOT = JSON.parse(<?= BOOTSTRAP_JSON ?>);
      const profileId = BOOT.profile.profileId;
      let isBusy = false;

      function $(id) { return document.getElementById(id); }
      
      function esc(s) { 
        return String(s || "").replace(/[&<>"']/g, m => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[m])); 
      }

      // Initialize profile info
      $("profileName").textContent = BOOT.profile.displayName || BOOT.profile.profileId;
      const statusEl = $("profileStatus");
      statusEl.textContent = BOOT.profile.status;
      statusEl.classList.add(BOOT.profile.status === "active" ? "active" : "locked");

      // ═══════════════════════════════════════════════════
      // API WRAPPER
      // ═══════════════════════════════════════════════════
      function api(op, data) {
        return new Promise((resolve) => {
          google.script.run
            .withSuccessHandler(res => {
              resolve(res || { ok: false, message: "Empty response from server" });
            })
            .withFailureHandler(err => {
              const msg = (err && err.message) ? err.message : String(err);
              resolve({ ok: false, message: msg || "Unknown server error" });
            })
            .portal_api(profileId, { op, data: data || {} });
        });
      }

      // ═══════════════════════════════════════════════════
      // STATUS / TOAST
      // ═══════════════════════════════════════════════════
      function showStatus(msg, type) {
        const bar = $("statusBar");
        bar.textContent = msg;
        bar.className = "status-bar visible " + (type || "");
        
        if (type !== "loading") {
          setTimeout(() => { bar.classList.remove("visible"); }, 3500);
        }
      }

      function hideStatus() {
        $("statusBar").classList.remove("visible");
      }

      function setBusy(busy) {
        isBusy = busy;
        $("fetchBtn").disabled = busy;
        $("refreshBtn").disabled = busy;
        if (busy) {
          document.body.classList.add("loading");
        } else {
          document.body.classList.remove("loading");
        }
      }

      // ═══════════════════════════════════════════════════
      // FETCH NEW JOBS
      // ═══════════════════════════════════════════════════
      async function fetchJobs() {
        if (isBusy) return;
        setBusy(true);
        showStatus("📡 Fetching new roles...", "loading");

        const res = await api("fetch");

        if (!res || !res.ok) {
          showStatus("❌ Fetch failed: " + (res && res.message ? res.message : "Unknown error"), "error");
          setBusy(false);
          return;
        }

        const count = res.count || 0;
        showStatus("✅ Found " + count + " new roles", "success");
        $("lastFetch").textContent = "Last fetch: just now";
        
        // Refresh to show new jobs
        await loadData();
        setBusy(false);
      }

      // ═══════════════════════════════════════════════════
      // REFRESH / LOAD DATA
      // ═══════════════════════════════════════════════════
      async function refreshAll() {
        if (isBusy) return;
        setBusy(true);
        showStatus("Loading...", "loading");
        await loadData();
        hideStatus();
        setBusy(false);
      }

      async function loadData() {
        const [inboxRes, trackerRes] = await Promise.all([
          api("getInbox"),
          api("getTracker"),
        ]);

        if (!inboxRes || !inboxRes.ok) {
          showStatus("❌ Inbox failed: " + (inboxRes && inboxRes.message ? inboxRes.message : "Unknown"), "error");
          return;
        }

        if (!trackerRes || !trackerRes.ok) {
          showStatus("❌ Tracker failed: " + (trackerRes && trackerRes.message ? trackerRes.message : "Unknown"), "error");
          return;
        }

        renderInbox(inboxRes.inbox || []);
        renderTracker(trackerRes.tracker || []);
      }

      // ═══════════════════════════════════════════════════
      // PROMOTE TO TRACKER
      // ═══════════════════════════════════════════════════
      async function promote(job) {
        if (isBusy) return;
        setBusy(true);
        showStatus("⭐ Adding to Tracker...", "loading");

        const res = await api("promote", job);

        if (res && res.ok) {
          showStatus("⭐ Added to Tracker!", "success");
          await loadData();
        } else {
          showStatus("⚠️ " + (res && res.message ? res.message : "Already in Tracker"), "error");
        }

        setBusy(false);
      }

      // ═══════════════════════════════════════════════════
      // UPDATE TRACKER ENTRY
      // ═══════════════════════════════════════════════════
      async function updateTracker(url, company, title) {
        const key = url || (company + "||" + title);
        const h = hash(key);

        const status = $("st_" + h).value;
        const notes = $("no_" + h).value;
        const dateApplied = $("da_" + h).value;

        setBusy(true);
        showStatus("💾 Saving...", "loading");

        const res = await api("updateTracker", { url, company, title, status, notes, dateApplied });

        if (!res || !res.ok) {
          showStatus("❌ Save failed: " + (res && res.message ? res.message : "Unknown"), "error");
          setBusy(false);
          return;
        }

        showStatus("✅ Saved", "success");
        await loadData();
        setBusy(false);
      }

      // ═══════════════════════════════════════════════════
      // RENDER INBOX
      // ═══════════════════════════════════════════════════
      function renderInbox(list) {
        const wrap = $("inbox");
        $("inboxCount").textContent = list.length;

        if (!list.length) {
          wrap.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📡</div>
              <div>No roles in your inbox yet.</div>
              <div style="margin-top:8px;color:var(--color-text-dim)">Click "Fetch New Roles" to start the hunt.</div>
            </div>
          `;
          return;
        }

        wrap.innerHTML = list.map((j, i) => {
          const tier = String(j.tier || "C").toUpperCase();
          const tierClass = "tier-" + tier.toLowerCase();
          const cardClass = tier === "S" ? "card tier-s" : "card";
          const whyFitId = "whyfit_" + i;

          return `
            <div class="${cardClass}">
              <div class="card-header">
                <div>
                  <div class="card-title">${esc(j.title)}</div>
                  <div class="card-company">${esc(j.company)}</div>
                </div>
              </div>
              
              <div class="card-meta">
                <span class="chip tier ${tierClass}">Tier ${esc(tier)} · ${esc(j.score)}</span>
                ${j.laneLabel ? `<span class="chip lane">${esc(j.laneLabel)}</span>` : ''}
                <span class="chip">${esc(j.location || 'Remote')}</span>
                <span class="chip">${esc(j.source)}</span>
              </div>

              ${j.jobSummary ? `
                <div class="card-summary">${esc(j.jobSummary)}</div>
              ` : ''}

              ${j.whyFit ? `
                <div class="why-fit-toggle" onclick="toggleWhyFit('${whyFitId}', this)">
                  <span class="arrow">▶</span>
                  <span>Why You're a Fit</span>
                </div>
                <div class="why-fit-content" id="${whyFitId}">${esc(j.whyFit)}</div>
              ` : ''}

              <div class="card-actions">
                <a class="btn" href="${esc(j.url)}" target="_blank" rel="noopener">Open Job →</a>
                <button class="btn primary" onclick='promote(${JSON.stringify(j)})'>⭐ Add to Tracker</button>
              </div>
            </div>
          `;
        }).join("");
      }

      function toggleWhyFit(id, toggle) {
        const content = $(id);
        const isOpen = content.classList.contains("open");
        
        content.classList.toggle("open");
        toggle.classList.toggle("open");
      }

      // ═══════════════════════════════════════════════════
      // RENDER TRACKER
      // ═══════════════════════════════════════════════════
      function renderTracker(list) {
        const wrap = $("tracker");
        $("trackerCount").textContent = list.length;

        if (!list.length) {
          wrap.innerHTML = `
            <div class="empty">
              <div class="empty-icon">⭐</div>
              <div>Nothing in your Tracker yet.</div>
              <div style="margin-top:8px;color:var(--color-text-dim)">Add roles from your Inbox to start tracking.</div>
            </div>
          `;
          return;
        }

        const statusOptions = [
          "Prospect",
          "Applied",
          "Interview 1",
          "Interview 2",
          "Final Interview",
          "Offer 🤝🔥",
          "Rejected 💀",
          "Ghosted 👻"
        ];

        wrap.innerHTML = list.map(j => {
          const key = j.url || (j.company + "||" + j.title);
          const h = hash(key);

          return `
            <div class="tracker-card">
              <div class="card-title">${esc(j.title)}</div>
              <div class="card-company">${esc(j.company)} · ${esc(j.source)}</div>

              <div style="margin-top:8px">
                <a href="${esc(j.url)}" target="_blank" rel="noopener">Open job →</a>
              </div>

              <div class="form-row">
                <label>Status</label>
                <select id="st_${h}">
                  ${statusOptions.map(s => `<option ${s === j.status ? "selected" : ""}>${s}</option>`).join("")}
                </select>
              </div>

              <div class="form-row">
                <label>Date Applied</label>
                <input id="da_${h}" type="date" value="${esc(j.dateApplied)}"/>
              </div>

              <div class="form-row">
                <label>Notes</label>
                <textarea id="no_${h}">${esc(j.notes)}</textarea>
              </div>

              <div class="form-row">
                <button class="btn primary" onclick='updateTracker(${JSON.stringify(j.url)}, ${JSON.stringify(j.company)}, ${JSON.stringify(j.title)})'>
                  💾 Save
                </button>
              </div>
            </div>
          `;
        }).join("");
      }

      function hash(s) {
        s = String(s || "");
        let h = 0;
        for (let i = 0; i < s.length; i++) {
          h = ((h << 5) - h) + s.charCodeAt(i) | 0;
        }
        return Math.abs(h);
      }

      // ═══════════════════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════════════════
      loadData();
    </script>
  </body>
</html>

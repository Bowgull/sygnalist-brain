<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <?!= HtmlService.createHtmlOutputFromFile('portal_styles').getContent() ?>
    <style>
      .admin-page { max-width: 640px; margin: 0 auto; padding: var(--space-8); }
      .admin-heading { font-size: 1.5rem; font-weight: 700; margin-bottom: var(--space-2); }
      .admin-sub { color: var(--color-text-muted); font-size: 0.875rem; margin-bottom: var(--space-6); }
      .admin-list { display: flex; flex-direction: column; gap: var(--space-3); }
      .admin-card {
        display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
        padding: var(--space-4); background: var(--color-bg-card); border: 1px solid var(--color-border);
        border-radius: var(--radius-lg); transition: border-color 0.15s ease;
      }
      .admin-card:hover { border-color: rgba(106, 215, 163, 0.3); }
      .admin-card-info { flex: 1; min-width: 0; }
      .admin-card-name { font-weight: 600; font-size: 1rem; margin-bottom: var(--space-1); }
      .admin-card-id { font-size: 0.75rem; color: var(--color-text-dim); }
      .admin-card-status {
        font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; padding: 2px 8px;
        border-radius: var(--radius-pill); margin-top: var(--space-1);
        display: inline-block;
      }
      .admin-card-status.active { background: rgba(106, 215, 163, 0.2); color: var(--color-radar-mid); }
      .admin-card-status.inactive { background: rgba(156, 163, 175, 0.2); color: var(--color-text-muted); }
      .admin-card .btn { flex-shrink: 0; }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.35"/>
            <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
            <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
            <path d="M12 5.5 L12 10.5" stroke="#FAD76A" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="12" cy="11" r="1.4" fill="#FAD76A"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">SYGNALIST</div>
          <div class="brand-tagline">FIND THE SIGNAL</div>
        </div>
      </div>
      <div class="profile-section">
        <span class="nav-version">Admin</span>
      </div>
    </nav>

    <div class="admin-page">
      <h1 class="admin-heading">Master Portal</h1>
      <p class="admin-sub">Switch to a client account to view their portal.</p>

      <div class="admin-list" id="profileList">
        <!-- Rendered by script -->
      </div>
    </div>

    <script>
      (function() {
        var profiles = <?!= PROFILES_JSON ?>;
        var baseUrl = <?!= BASE_URL_JSON ?>;
        var list = document.getElementById('profileList');
        if (!profiles || profiles.length === 0) {
          list.innerHTML = '<p class="color-text-muted">No profiles yet. Add profiles in the Sheet.</p>';
          return;
        }
        function esc(s) {
          return String(s || '').replace(/[&<>"']/g, function(m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
          });
        }
        var html = '';
        for (var i = 0; i < profiles.length; i++) {
          var p = profiles[i];
          var statusClass = (p.status === 'active') ? 'active' : 'inactive';
          var openUrl = baseUrl ? (baseUrl + '?profile=' + encodeURIComponent(p.profileId)) : '#';
          html += '<div class="admin-card">';
          html += '<div class="admin-card-info">';
          html += '<div class="admin-card-name">' + esc(p.displayName) + '</div>';
          html += '<div class="admin-card-id">' + esc(p.profileId) + '</div>';
          html += '<span class="admin-card-status ' + statusClass + '">' + esc(p.status) + '</span>';
          html += '</div>';
          html += '<a href="' + esc(openUrl) + '" class="btn btn-primary">Open</a>';
          html += '</div>';
        }
        list.innerHTML = html;
      })();
    </script>
  </body>
</html>

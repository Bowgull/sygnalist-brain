<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1016"/>
      <stop offset="100%" style="stop-color:#141D28"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A9FFB5"/>
      <stop offset="50%" style="stop-color:#5EF2C7"/>
      <stop offset="100%" style="stop-color:#39D6FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Radar circle outer -->
  <circle cx="256" cy="246" r="120" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.2"/>
  <!-- Radar circle mid -->
  <circle cx="256" cy="246" r="80" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.35"/>
  <!-- Radar circle inner -->
  <circle cx="256" cy="246" r="40" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="256" cy="246" r="10" fill="url(#glow)"/>
  <!-- Radar sweep line -->
  <line x1="256" y1="246" x2="340" y2="170" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <!-- Signal dot 1 -->
  <circle cx="340" cy="170" r="8" fill="#6AD7A3" opacity="0.9"/>
  <!-- Signal dot 2 -->
  <circle cx="200" cy="190" r="6" fill="#39D6FF" opacity="0.7"/>
  <!-- Signal dot 3 -->
  <circle cx="310" cy="290" r="5" fill="#A9FFB5" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="48" fill="url(#glow)" letter-spacing="-1">SYGNALIST</text>
</svg>

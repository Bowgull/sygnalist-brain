<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1016"/>
      <stop offset="100%" style="stop-color:#141D28"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A9FFB5"/>
      <stop offset="50%" style="stop-color:#5EF2C7"/>
      <stop offset="100%" style="stop-color:#39D6FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring — max brightness, thick -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glow)" stroke-width="20" opacity="0.6"/>
  <!-- Inner ring — bright -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="url(#glow)" stroke-width="16" opacity="0.8"/>
  <!-- Center dot — large, solid, glowing -->
  <circle cx="256" cy="256" r="30" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="44" fill="none" stroke="#A9FFB5" stroke-width="3" opacity="0.3"/>
  <!-- Radar sweep line — bold and bright -->
  <line x1="256" y1="256" x2="410" y2="130" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" opacity="1"/>
  <!-- Signal dot — big, full brightness -->
  <circle cx="410" cy="130" r="22" fill="#A9FFB5"/>
  <!-- Signal glow halo -->
  <circle cx="410" cy="130" r="32" fill="none" stroke="#A9FFB5" stroke-width="3" opacity="0.3"/>
  <!-- Star sparkle — bigger -->
  <path d="M436 100 l4 8 8 4-8 4-4 8-4-8-8-4 8-4z" fill="#FFD77A" opacity="0.95"/>
</svg>

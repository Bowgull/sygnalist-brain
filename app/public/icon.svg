<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1016"/>
      <stop offset="100%" style="stop-color:#141D28"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A9FFB5"/>
      <stop offset="50%" style="stop-color:#5EF2C7"/>
      <stop offset="100%" style="stop-color:#39D6FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Radar circle outer -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#glow)" stroke-width="14.5" opacity="0.25"/>
  <!-- Radar circle inner -->
  <circle cx="256" cy="256" r="55" fill="none" stroke="url(#glow)" stroke-width="11.5" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="16" fill="url(#glow)"/>
  <!-- Radar sweep line -->
  <line x1="256" y1="256" x2="355" y2="175" stroke="url(#glow)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- Signal dot (sweep tip) -->
  <circle cx="355" cy="175" r="12" fill="#A9FFB5" opacity="0.95"/>
  <!-- Star sparkle -->
  <path d="M370 152 l2.5 5 5 2.5-5 2.5-2.5 5-2.5-5-5-2.5 5-2.5z" fill="#FFD77A" opacity="0.9"/>
</svg>

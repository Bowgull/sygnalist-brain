<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="color-scheme" content="dark only">
    <meta name="supported-color-schemes" content="dark only">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Prevent system dark mode from inverting our already-dark theme */
      :root {
        color-scheme: dark only;
        --bg-main: #05060A;
        --bg-elevated: #0D1117;
        --border: #1F2933;
        --text-main: #F9FAFB;
        --text-muted: #9CA3AF;
        --radar-light: #A9F2C4;
        --radar-mid: #6AD7A3;
        --radar-dark: #2F8A63;
        --gold: #FAD76A;
        --error: #DC2626;
      }
      
      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      html {
        background: #05060A !important;
        color-scheme: dark only !important;
      }
      
      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: #05060A !important;
        background-color: #05060A !important;
        color: #F9FAFB !important;
        padding: 20px;
        font-size: 13px;
        line-height: 1.5;
      }
      
      h3 {
        font-size: 18px;
        font-weight: 700;
        color: var(--radar-mid);
        margin-bottom: 4px;
      }
      
      .subtitle {
        color: var(--text-muted);
        font-size: 12px;
        margin-bottom: 20px;
      }
      
      .section {
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }
      
      .section-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }
      
      .field {
        margin-bottom: 14px;
      }
      
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-main);
        margin-bottom: 6px;
      }
      
      .hint {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 4px;
      }
      
      input, select {
        width: 100%;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-main);
        font-family: inherit;
        font-size: 13px;
        padding: 10px 12px;
        outline: none;
      }
      
      input:focus, select:focus {
        border-color: var(--radar-mid);
      }
      
      input::placeholder {
        color: var(--text-muted);
      }
      
      .btn {
        width: 100%;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--radar-mid) 0%, var(--radar-dark) 100%);
        color: #000;
      }
      
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      
      .status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 12px;
        display: none;
      }
      
      .status.visible { display: block; }
      .status.error {
        background: rgba(220, 38, 38, 0.15);
        border: 1px solid rgba(220, 38, 38, 0.3);
        color: #FCA5A5;
      }
      .status.success {
        background: rgba(106, 215, 163, 0.15);
        border: 1px solid rgba(106, 215, 163, 0.3);
        color: var(--radar-mid);
      }
      
      .url-section {
        display: none;
        margin-top: 16px;
        padding: 16px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      
      .url-section.visible { display: block; }
      
      .url-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin-bottom: 8px;
      }
      
      .url-box {
        padding: 10px 12px;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: monospace;
        font-size: 11px;
        word-break: break-all;
        color: var(--radar-mid);
        margin-bottom: 10px;
      }
      
      .copy-btn {
        padding: 8px 16px;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-main);
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      
      .next-step {
        margin-top: 12px;
        padding: 12px;
        background: rgba(250, 215, 106, 0.1);
        border: 1px solid rgba(250, 215, 106, 0.2);
        border-radius: 8px;
        font-size: 12px;
        color: var(--gold);
      }
    </style>
  </head>
  
  <body>
    <h3>➕ Create Profile</h3>
    <div class="subtitle">Set up a new client profile.</div>
    
    <div class="section">
      <div class="section-title">Basic Info</div>
      
      <div class="field">
        <label>Profile ID *</label>
        <input type="text" id="profileId" placeholder="e.g. sarah, client1">
        <div class="hint">Lowercase, no spaces.</div>
      </div>
      
      <div class="field">
        <label>Display Name *</label>
        <input type="text" id="displayName" placeholder="e.g. Sarah Chen">
      </div>
      
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="e.g. sarah@email.com">
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">Preferences</div>
      
      <div class="field">
        <label>Remote Preference</label>
        <select id="remotePreference">
          <option value="remote_only">Remote Only</option>
          <option value="remote_or_hybrid">Remote or Hybrid</option>
          <option value="onsite_ok">Onsite OK</option>
        </select>
      </div>
      
      <div class="field">
        <label>Minimum Salary (USD)</label>
        <input type="number" id="salaryMin" placeholder="e.g. 80000">
      </div>
      
      <div class="field">
        <label>Preferred Locations</label>
        <input type="text" id="preferredLocations" placeholder="e.g. New York, Remote">
        <div class="hint">Comma-separated.</div>
      </div>
    </div>
    
    <button class="btn" id="createBtn" onclick="createProfile()">✨ Create Profile</button>
    
    <div class="status" id="status"></div>
    
    <div class="url-section" id="urlSection">
      <div class="url-label">Portal URL</div>
      <div class="url-box" id="urlBox"></div>
      <button class="copy-btn" onclick="copyUrl()">📋 Copy URL</button>
      <div class="next-step">
        <strong>Next:</strong> Use 🧬 Build Skill Profile to parse their resume.
      </div>
    </div>
    
    <script>
      function $(id) { return document.getElementById(id); }
      
      function showStatus(msg, type) {
        var el = $('status');
        el.textContent = msg;
        el.className = 'status visible ' + (type || '');
      }
      
      function createProfile() {
        var profileId = $('profileId').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '_');
        var displayName = $('displayName').value.trim();
        
        if (!profileId || profileId.length < 2) {
          return showStatus('Profile ID must be at least 2 characters.', 'error');
        }
        if (!displayName) {
          return showStatus('Display Name is required.', 'error');
        }
        
        $('createBtn').disabled = true;
        showStatus('Creating profile...', '');
        
        google.script.run
          .withSuccessHandler(function(res) {
            $('createBtn').disabled = false;
            if (res && res.ok) {
              showStatus('✅ Profile created!', 'success');
              if (res.portalUrl) {
                $('urlBox').textContent = res.portalUrl;
                $('urlSection').classList.add('visible');
              }
            } else {
              showStatus('❌ ' + (res && res.error ? res.error : 'Creation failed'), 'error');
            }
          })
          .withFailureHandler(function(err) {
            $('createBtn').disabled = false;
            showStatus('❌ ' + (err && err.message ? err.message : String(err)), 'error');
          })
          .createProfileFromSidebar_({
            profileId: profileId,
            displayName: displayName,
            email: $('email').value.trim(),
            remotePreference: $('remotePreference').value,
            salaryMin: parseInt($('salaryMin').value) || 0,
            preferredLocations: $('preferredLocations').value.trim()
          });
      }
      
      function copyUrl() {
        var url = $('urlBox').textContent;
        navigator.clipboard.writeText(url).then(function() {
          $('status').textContent = '✅ Copied!';
        });
      }
    </script>
  </body>
</html>

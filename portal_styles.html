<style>
  /* ═══════════════════════════════════════════════════════════════════════════
     SYGNALIST — DESIGN SYSTEM v2.0
     Following Blueprint Brand Guidelines
     ═══════════════════════════════════════════════════════════════════════════ */

  /* ─────────────────────────────────────────────────────────────────────────────
     DESIGN TOKENS (from Blueprint 3.2)
     ───────────────────────────────────────────────────────────────────────────── */
  :root {
    /* Background / Base — depth layers: 1=main, 2=panel/bay, 3=card */
    --color-bg-main: #0C1016;
    --color-bg-elevated: #151C24;
    --color-bg-glass: rgba(21,28,36,0.60);
    --color-bg-bay: #151C24;
    --color-bg-card: #171F28;
    --color-bg-hover: #222D3D;
    /* Main app surface (Plane 1) — slightly lighter than body so the interface reads as a mounted plane */
    --color-bg-surface: #11181F;
    
    /* Radar Green Gradient */
    --color-radar-light: #A9F2C4;
    --color-radar-mid: #6AD7A3;
    --color-radar-dark: #2F8A63;
    
    /* Signal Gold */
    --color-signal-gold: #FAD76A;
    
    /* Neutrals & Text */
    --color-text-main: #FFFFFF;
    --color-text-muted: #B8BFC8;
    --color-text-dim: #9CA3AF;
    --color-divider: #2A3544;
    --color-border: rgba(255, 255, 255, 0.12);
    
    /* Tier Colors */
    --color-tier-s: #FAD76A;
    --color-tier-a: #6AD7A3;
    --color-tier-b: #38BDF8;
    --color-tier-c: #9CA3AF;
    --color-tier-f: #4B5563;
    --color-tier-x: #DC2626;

    /* Tracker pipeline status (high-contrast; from statusConfig) */
    --status-prospect: #1DD3B0;
    --status-applied: #3B82F6;
    --status-interviewed: #8B5CF6;
    --status-final: #F59E0B;
    --status-offer: #22C55E;
    --status-prospect-bg: rgba(29, 211, 176, 0.12);
    --status-applied-bg: rgba(59, 130, 246, 0.14);
    --status-interviewed-bg: rgba(139, 92, 246, 0.14);
    --status-final-bg: rgba(245, 158, 11, 0.14);
    --status-offer-bg: rgba(34, 197, 94, 0.16);
    /* Inactive pill faint outline (stage color ~35%) */
    --status-prospect-outline: rgba(29, 211, 176, 0.35);
    --status-applied-outline: rgba(59, 130, 246, 0.35);
    --status-interviewed-outline: rgba(139, 92, 246, 0.35);
    --status-final-outline: rgba(245, 158, 11, 0.35);
    --status-offer-outline: rgba(34, 197, 94, 0.35);
    /* Closed status (unchanged) */
    --color-status-rejected: #DC2626;
    --color-status-ghosted: #4B5563;
    --color-status-withdrawn: #6B7280;
    --color-status-closed: #6B7280;

    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-card: 0px 4px 8px rgba(0, 0, 0, 0.15);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
    --shadow-glow-green: 0 0 60px rgba(106, 215, 163, 0.15);
    --shadow-glow-gold: 0 0 40px rgba(250, 215, 106, 0.2);
    --surface-tier1-shadow: 0 1px 3px rgba(0, 0, 0, 0.25);
    
    /* Spacing Scale */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;
    
    /* Border Radius */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --radius-pill: 9999px;
    
    /* Transitions */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --transition-fast: 150ms var(--ease-out);
    --transition-base: 250ms var(--ease-out);

    /* Card typography (global readability) */
    --card-title-size: 1.3125rem;
    --card-body-size: 1rem;
    --card-meta-size: 0.9375rem;
    --card-line-height: 1.6;
  }

  /* Status chip system: modifiers set --status-color and --status-bg; chip/pill use them */
  .stage-prospect { --status-color: var(--status-prospect); --status-bg: var(--status-prospect-bg); }
  .stage-applied { --status-color: var(--status-applied); --status-bg: var(--status-applied-bg); }
  .stage-interviewed { --status-color: var(--status-interviewed); --status-bg: var(--status-interviewed-bg); }
  .stage-final { --status-color: var(--status-final); --status-bg: var(--status-final-bg); }
  .stage-offer { --status-color: var(--status-offer); --status-bg: var(--status-offer-bg); }
  .stage-rejected { --status-color: var(--color-status-rejected); --status-bg: rgba(220, 38, 38, 0.1); }
  .stage-ghosted { --status-color: var(--color-status-ghosted); --status-bg: rgba(75, 85, 99, 0.12); }
  .stage-withdrawn { --status-color: var(--color-status-withdrawn); --status-bg: rgba(107, 114, 128, 0.12); }
  .status-chip,
  .tracker-table .status-pill,
  .tracker-card-main .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: var(--space-1) var(--space-3);
    min-height: 28px;
    white-space: nowrap;
    border-radius: var(--radius-pill);
    border: 1px solid var(--status-color);
    color: var(--status-color);
    background: var(--status-bg);
    font-size: var(--card-meta-size);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tracker-card-main .status-pill {
    margin-top: var(--space-2);
  }

  /* Meta-pill: shared base for salary + status pills on tracker cards (symmetry) */
  .meta-pill {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 0 12px;
    border-radius: var(--radius-pill);
    font-size: 0.6875rem;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
    vertical-align: middle;
  }
  .meta-pill--salary {
    background: rgba(0, 245, 212, 0.08);
    border: 1px solid rgba(0, 245, 212, 0.2);
    color: var(--color-text-main);
  }
  .meta-pill--status {
    border: 1px solid var(--status-color);
    color: var(--status-color);
    background: var(--status-bg);
  }
  .tracker-meta-pill-row {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-top: var(--space-2);
  }
  .tracker-meta-pill-row .meta-pill,
  .tracker-meta-pill-row .status-pill {
    margin-top: 0;
  }
  .tracker-meta-pill-row .status-pill {
    min-height: 26px;
    padding: 0 12px;
    font-size: 0.6875rem;
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     RESET & BASE
     ───────────────────────────────────────────────────────────────────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--color-bg-main);
    color: var(--color-text-main);
    line-height: 1.5;
    min-height: 100vh;
  }

  .app-background {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .app-background svg {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  a {
    color: var(--color-radar-mid);
    text-decoration: none;
    transition: color var(--transition-fast);
  }

  a:hover {
    color: var(--color-radar-light);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     LAYOUT — Single governing layout: .app container + .main-content 2-col grid.
     ───────────────────────────────────────────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 1520px;
    margin: 0 auto;
    padding: var(--space-6);
    background: var(--color-bg-surface);
  }

  .nav-admin-link {
    font-size: 0.75rem;
    color: var(--color-text-muted);
    margin-right: var(--space-2);
    transition: color var(--transition-fast);
  }
  .nav-admin-link:hover {
    color: var(--color-radar-mid);
  }

  .navbar {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: var(--space-4) var(--space-6);
    overflow: hidden;
  }

  .text-muted {
    color: var(--color-text-muted);
  }

  /* App header: 3 zones — brand | active context | controls. */
  /* Critical layout (width, flex, margin-left) is enforced inline in client_portal.html so it cannot be overridden by cache. */
  .app-header {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-4);
    padding: var(--space-4) var(--space-3);
    height: 88px;
    min-height: 88px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(14, 18, 24, 0.97) 0%, var(--color-bg-elevated) 100%);
    border: none;
    border-bottom: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--surface-tier1-shadow);
  }

  .app-header .navbar-backdrop {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .app-header .header-zone-a,
  .app-header .header-zone-b,
  .app-header .header-zone-c {
    position: relative;
    z-index: 1;
  }

  header.app-header .header-right {
    margin-left: auto !important;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-shrink: 0;
    flex-grow: 0;
    min-width: 0;
    gap: var(--space-6);
  }

  .header-rule {
    width: 1px;
    height: 1em;
    background: rgba(255, 255, 255, 0.12);
    margin: 0 var(--space-2);
    flex-shrink: 0;
  }

  /* Header status cluster: typography-first, premium dashboard (no outer capsule) */
  header.app-header .header-status-cluster {
    display: inline-flex;
    align-items: center;
    gap: var(--space-4);
    white-space: nowrap;
  }

  header.app-header .header-status-cluster .header-username {
    font-size: 0.875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-radar-mid);
    line-height: 1.25;
    text-shadow: 0 0 20px rgba(106, 215, 163, 0.25);
  }

  header.app-header .header-status-cluster .header-rule {
    width: 1px;
    height: 0.875em;
    background: rgba(169, 255, 181, 0.3);
    margin: 0 var(--space-2);
    flex-shrink: 0;
  }

  header.app-header .header-status-cluster .header-active-chip {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    padding: 4px var(--space-3);
    background: rgba(18, 28, 36, 0.85);
    border: 1px solid rgba(169, 255, 181, 0.35);
    border-radius: var(--radius-pill);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-main);
    line-height: 1.25;
  }

  header.app-header .header-status-cluster .header-active-chip .header-meta-dot {
    font-size: 0.6rem;
  }

  header.app-header .header-status-cluster .header-active-chip .header-meta-dot.active {
    color: var(--color-radar-mid);
  }

  @media (prefers-reduced-motion: no-preference) {
    header.app-header .header-status-cluster .header-active-chip .header-meta-dot.active {
      animation: dotPulse 2.5s ease-in-out infinite;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    header.app-header .header-status-cluster .header-active-chip .header-meta-dot.active {
      animation: none;
    }
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.65; }
  }

  @media (prefers-reduced-motion: no-preference) {
    .banner-seam {
      animation: banner-seam-pulse 28s ease-in-out infinite;
      animation-delay: -25s;
    }
  }

  @keyframes banner-seam-pulse {
    0%, 90%, 100% { opacity: 1; }
    95% { opacity: 1.18; }
  }

  @media (prefers-reduced-motion: reduce) {
    .banner-seam { animation: none; }
  }

  header.app-header .header-status-cluster .header-last-fetch-readout {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
  }

  header.app-header .header-status-cluster .header-last-fetch-label {
    font-size: 0.625rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-dim);
    font-weight: 500;
  }

  header.app-header .header-status-cluster .header-last-fetch-label::after {
    display: none;
  }

  header.app-header .header-status-cluster .header-last-fetch-value {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--color-radar-mid);
    font-size: 0.75rem;
  }

  .header-zone-a {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    flex: 1 1 0;
    min-width: 0;
  }

  .header-zone-b {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--space-2);
    font-size: 0.8125rem;
    opacity: 0.92;
  }

  .header-zone-b .header-username {
    font-size: 0.8125rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    color: var(--color-text-main);
    line-height: 1.25;
    text-shadow: 0 0 10px rgba(94, 242, 199, 0.18), 0 0 1px rgba(169, 255, 181, 0.25);
  }

  .header-active-chip {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    padding: 2px var(--space-2);
    background: rgba(12, 18, 24, 0.6);
    border: 1px solid rgba(169, 255, 181, 0.25);
    border-radius: var(--radius-pill);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 12px rgba(94, 242, 199, 0.08);
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-dim);
    opacity: 0.92;
    line-height: 1.25;
  }

  .header-active-chip .header-meta-dot {
    font-size: 0.5rem;
    line-height: 1;
  }

  .header-active-chip .header-meta-dot.active {
    color: var(--color-radar-mid);
  }

  .header-active-chip .header-meta-dot.locked {
    color: var(--color-text-dim);
  }

  .header-last-fetch-readout {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    font-size: 0.6875rem;
    line-height: 1.25;
    white-space: nowrap;
  }

  .header-last-fetch-label {
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-text-dim);
    font-weight: 600;
  }

  .header-last-fetch-label::after {
    content: '';
    display: inline-block;
    width: 1px;
    height: 0.75em;
    margin-left: var(--space-2);
    margin-right: var(--space-1);
    background: rgba(255, 255, 255, 0.12);
    vertical-align: middle;
  }

  .header-last-fetch-value {
    color: var(--color-text-muted);
    font-weight: 500;
  }

  .header-zone-b .nav-admin-link.header-admin-badge {
    display: inline-block;
    padding: 2px var(--space-2);
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-muted);
    background: rgba(14, 18, 24, 0.6);
    border: 1px solid rgba(124, 92, 255, 0.25);
    border-radius: var(--radius-pill);
    text-decoration: none;
    transition: border-color var(--transition-fast), color var(--transition-fast);
  }

  .header-zone-b .nav-admin-link.header-admin-badge:hover {
    color: var(--color-text-main);
    border-color: rgba(124, 92, 255, 0.4);
  }

  .header-zone-c {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  .header-zone-c .profile-switcher-wrap {
    display: inline-flex;
    align-items: center;
    gap: var(--space-3);
  }

  .header-zone-c .profile-switcher-label {
    font-size: 0.75rem;
    color: var(--color-text-muted);
    white-space: nowrap;
  }

  .header-zone-c .profile-switcher-select {
    font-size: 0.8125rem;
    height: 28px;
    padding: 0 var(--space-2);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.04);
    color: var(--color-text-main);
    min-width: 120px;
    transition: border-color var(--transition-fast), background var(--transition-fast);
  }

  .header-zone-c .profile-switcher-select:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.18);
  }

  .header-zone-c .profile-switcher-select:focus {
    outline: none;
    border-color: rgba(94, 242, 199, 0.4);
    box-shadow: 0 0 0 1px rgba(94, 242, 199, 0.2);
  }

  .app-header .brand {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  .app-header .brand-logo {
    width: 96px;
    height: 96px;
    align-self: center;
  }

  .app-header .brand-logo svg {
    height: 80px;
    width: auto;
  }

  .app-header .brand-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-1);
  }

  .app-header .brand-name {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--color-radar-mid);
  }

  .app-header .brand-tagline {
    font-size: 0.875rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--color-text-muted);
  }

  .header-meta-line {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 0.75rem;
    color: var(--color-text-dim);
  }

  .header-primary-action {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .header-primary-meta {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--color-text-dim);
    line-height: 1.25;
  }

  .header-secondary-meta {
    font-size: 0.75rem;
    color: var(--color-text-dim);
    line-height: 1.25;
  }

  .command-bar-left {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  .command-meta {
    font-size: 0.8125rem;
    font-weight: 700;
    color: var(--color-text-dim);
    line-height: 1.25;
  }

  .app-header .command-meta {
    white-space: nowrap;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--color-text-dim);
    opacity: 0.9;
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     MAIN CONTENT (two columns: primary left, secondary right)
     ───────────────────────────────────────────────────────────────────────────── */
  .main-content {
    display: grid;
    grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
    gap: var(--space-8);
    margin-top: var(--space-6);
    flex: 1;
    min-height: 0;
  }

  .main-content-left {
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  /* Card surface: shared baseline for .content-bay, .metrics-column, .job-card, .tracker-card, .metric-card — background, 1px border, --radius-lg, --shadow-card */
  .content-bay {
    min-width: 0;
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    padding: var(--space-4);
    box-shadow: var(--shadow-card);
  }

  .content-bay::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    border-radius: inherit;
    background-image:
      linear-gradient(to bottom, rgba(169, 255, 181, 0.055) 2px, transparent 2px),
      linear-gradient(to right, rgba(169, 255, 181, 0.055) 2px, transparent 2px),
      linear-gradient(to bottom, rgba(169, 255, 181, 0.055) 2px, transparent 2px),
      linear-gradient(to left, rgba(169, 255, 181, 0.055) 2px, transparent 2px),
      linear-gradient(to top, rgba(169, 255, 181, 0.055) 2px, transparent 2px),
      linear-gradient(to left, rgba(169, 255, 181, 0.055) 2px, transparent 2px),
      linear-gradient(to top, rgba(169, 255, 181, 0.055) 2px, transparent 2px),
      linear-gradient(to right, rgba(169, 255, 181, 0.055) 2px, transparent 2px);
    background-size: 12px 2px, 2px 12px, 12px 2px, 2px 12px, 12px 2px, 2px 12px, 12px 2px, 2px 12px;
    background-position: 0 0, 0 0, 100% 0, 100% 0, 100% 100%, 100% 100%, 0 100%, 0 100%;
    background-repeat: no-repeat;
  }

  .content-bay::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 30%, transparent 100%);
  }

  .metrics-column {
    position: sticky;
    top: 80px;
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-5);
    padding: var(--space-4);
    background: var(--color-bg-bay);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    align-self: flex-start;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    z-index: 100;
  }

  .metric-card {
    position: relative;
    z-index: 1;
    background: var(--color-bg-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
    box-shadow: var(--shadow-card);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  }
  button.metric-card {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-align: left;
    cursor: pointer;
    font: inherit;
    color: inherit;
  }
  .metric-card:hover {
    border-color: rgba(255, 255, 255, 0.1);
    box-shadow: var(--shadow-md);
  }
  .metric-card:focus-within {
    outline: 2px solid var(--color-radar-mid);
    outline-offset: 2px;
  }

  .metric-card-label {
    font-size: var(--card-meta-size);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-muted);
    margin-bottom: var(--space-1);
  }

  .metric-card-value {
    font-size: 2.25rem;
    font-weight: 800;
    line-height: 1.2;
    color: var(--color-text-main);
  }

  .metric-card-icon {
    width: 24px;
    height: 24px;
    min-width: 24px;
    min-height: 24px;
    flex-shrink: 0;
    margin-bottom: var(--space-2);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }
  .metric-card-icon svg {
    width: 24px;
    height: 24px;
    stroke-width: 1.5;
  }

  .metric-card.metric-open-signals .metric-card-icon { background: rgba(106, 215, 163, 0.12); color: var(--color-radar-mid); border-left: 2px solid var(--color-radar-mid); box-shadow: 0 0 12px rgba(106, 215, 163, 0.25); }
  .metric-card.metric-in-tracker .metric-card-icon { background: var(--status-prospect-bg); color: var(--status-prospect); border-left: 2px solid var(--status-prospect); }
  .metric-card.metric-applied .metric-card-icon { background: var(--status-applied-bg); color: var(--status-applied); border-left: 2px solid var(--status-applied); }
  .metric-card.metric-interviewing .metric-card-icon { background: var(--status-interviewed-bg); color: var(--status-interviewed); border-left: 2px solid var(--status-interviewed); }
  .metric-card.metric-added-week .metric-card-icon { background: rgba(255, 255, 255, 0.06); color: var(--color-text-muted); }
  .metric-card.metric-jobs-need-info .metric-card-icon { background: rgba(245, 158, 11, 0.14); color: var(--status-final); border-left: 2px solid var(--status-final); }
  .metric-card.metric-profiles .metric-card-icon { background: rgba(255, 255, 255, 0.06); color: var(--color-text-muted); border-left: 2px solid var(--color-border); }
  .metric-card.metric-errors .metric-card-icon { background: rgba(220, 38, 38, 0.12); color: var(--color-tier-x); border-left: 2px solid rgba(220, 38, 38, 0.4); }

  .icon-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-right: 6px;
    vertical-align: middle;
  }
  .icon-wrap svg {
    width: 1em;
    height: 1em;
    color: currentColor;
  }
  .icon-wrap svg use { color: inherit; }
  .icon-inline {
    display: inline-block;
    width: 1.125em;
    height: 1.125em;
    vertical-align: -0.2em;
    color: currentColor;
  }
  .btn .icon-inline {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    vertical-align: 0;
  }
  .icon-inline use { color: inherit; }
  .metric-card-icon .icon-inline {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }
  .empty-icon {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .empty-icon .icon-inline {
    width: 48px;
    height: 48px;
    opacity: 0.4;
  }

  @media (max-width: 900px) {
    .main-content {
      grid-template-columns: 1fr;
    }
    .metrics-column {
      position: relative;
      width: 100%;
      max-width: none;
      max-height: none;
      flex-direction: row;
      flex-wrap: wrap;
    }
    .metric-card {
      flex: 1;
      min-width: 140px;
    }
    .panel-body.panel-body-full {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tracker-table {
      min-width: 600px;
    }
  }

  @media (max-width: 640px) {
    .app {
      padding: var(--space-4);
    }
    .tabs-row {
      overflow-x: auto;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      flex-shrink: 0;
      min-height: 44px;
    }
    .tracker-header.pipeline-layout .pipeline-row {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }
    .tracker-header.pipeline-layout .pipeline-bar {
      flex-wrap: nowrap;
      min-width: min-content;
    }
    .tracker-header.pipeline-layout .pipeline-segment-wrap {
      flex-shrink: 0;
    }
    .tracker-header.pipeline-layout .pipeline-closed-wrap,
    .tracker-header.pipeline-layout .pipeline-view-toggle {
      flex-shrink: 0;
    }
    button.metric-card {
      min-height: 44px;
    }
    .tracker-table .icon-btn {
      min-width: 44px;
      min-height: 44px;
    }
    .control-deck,
    .control-deck-panel {
      padding: var(--space-3);
    }
    .inbox-filters-row {
      padding: var(--space-3);
    }
    .inbox-filters-row .form-select {
      flex: 1 1 100%;
      min-width: 0;
    }
    .tracker-filters-row {
      padding: var(--space-3);
    }
    .tracker-filters-row .form-input.tracker-search,
    .tracker-filters-row .form-select {
      flex: 1 1 100%;
      min-width: 0;
    }
    .form-input,
    .form-select,
    .form-textarea {
      font-size: 1rem;
    }
  }

  @media (max-width: 480px) {
    .app {
      padding: var(--space-3);
      padding-top: calc(var(--space-3) + env(safe-area-inset-top));
      padding-bottom: calc(var(--space-3) + env(safe-area-inset-bottom));
      padding-left: calc(var(--space-3) + env(safe-area-inset-left));
      padding-right: calc(var(--space-3) + env(safe-area-inset-right));
    }
    .app-header {
      flex-wrap: wrap;
      gap: var(--space-3);
      height: auto;
      min-height: 0;
      padding: var(--space-3);
    }
    .header-right {
      flex-wrap: wrap;
      gap: var(--space-3);
    }
    .header-zone-c {
      flex-shrink: 0;
    }
    header.app-header .header-status-cluster .header-last-fetch-readout {
      display: none;
    }
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     TABS + CONTENT BAY ACTIONS (Control Deck)
     ───────────────────────────────────────────────────────────────────────────── */
  .control-deck {
    background: linear-gradient(180deg, var(--color-bg-elevated) 0%, var(--color-bg-surface) 100%);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), var(--surface-tier1-shadow);
    margin-bottom: var(--space-4);
  }

  .control-deck-panel {
    background: linear-gradient(180deg, var(--color-bg-elevated) 0%, var(--color-bg-surface) 100%);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), var(--surface-tier1-shadow);
  }

  .control-deck .tabs-container {
    background: transparent;
    border: none;
    margin-bottom: 0;
    padding: 0;
  }

  .tabs-and-actions-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    flex-wrap: wrap;
  }

  .content-bay-actions {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .tabs-container {
    background: var(--color-bg-elevated);
    border-radius: var(--radius-md);
    padding: var(--space-2) var(--space-3);
    margin-bottom: var(--space-4);
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .tabs-row {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    margin: 0;
    padding: 0;
    border: none;
  }

  .tab-btn {
    min-height: 32px;
    padding: var(--space-2) var(--space-5);
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
  }

  .tab-btn:hover {
    color: var(--color-text-main);
    border-color: var(--color-border);
    background: rgba(255, 255, 255, 0.03);
  }

  .tab-btn.active {
    color: var(--color-radar-light);
    font-weight: 700;
    border-color: rgba(106, 215, 163, 0.4);
    background: rgba(106, 215, 163, 0.1);
    box-shadow: 0 -2px 0 0 var(--color-radar-dark) inset;
  }

  .tab-content {
    margin-top: var(--space-4);
    min-height: 50vh;
  }

  .tab-content.hidden {
    display: none;
  }

  .panel-body-full {
    max-height: 65vh;
    overflow-y: auto;
  }

  .inbox-filters-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-4) var(--space-5);
    background: var(--color-bg-elevated);
    border: none;
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-4);
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: var(--surface-tier1-shadow);
  }

  .inbox-filters-row .form-select {
    min-height: 40px;
    align-self: center;
  }

  .tracker-header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-4);
    margin-bottom: var(--space-4);
  }

  .tracker-filters-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-4) var(--space-5);
    margin-bottom: var(--space-4);
  }

  .tracker-filters-row.control-deck-panel {
    background: linear-gradient(180deg, var(--color-bg-elevated) 0%, var(--color-bg-surface) 100%);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), var(--surface-tier1-shadow);
  }

  .tracker-filters-row .form-input.tracker-search,
  .tracker-filters-row .form-select {
    min-height: 40px;
    align-self: center;
  }

  .tracker-filters-row:empty,
  .tracker-filters-row[style*="display: none"] {
    margin-bottom: 0;
  }

  .tracker-header.pipeline-layout .pipeline-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--space-4);
    width: 100%;
  }

  .pipeline-chip.pipeline-all {
    min-height: 32px;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-pill);
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--color-border);
    color: var(--color-text-muted);
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .pipeline-chip.pipeline-all:hover {
    background: rgba(255, 255, 255, 0.08);
    color: var(--color-text-muted);
  }

  .pipeline-chip.pipeline-all.active {
    background: rgba(255, 255, 255, 0.06);
    border-color: var(--color-border);
    border-bottom: 2px solid var(--status-prospect);
    color: var(--color-text-main);
  }

  .pipeline-chip.pipeline-all.active::after {
    content: '';
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--status-prospect);
    margin-left: 6px;
    vertical-align: middle;
  }

  .pipeline-bar {
    display: flex;
    align-items: center;
  }

  .pipeline-segment {
    flex: 0 0 auto;
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: var(--space-2) var(--space-4);
    border-radius: var(--radius-pill);
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: rgba(0, 0, 0, 0.08);
    border: 1px solid transparent;
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
  }
  /* Inactive: faint outline in stage color (per-segment) */
  .pipeline-segment-prospect { border-color: var(--status-prospect-outline); color: rgba(29, 211, 176, 0.7); }
  .pipeline-segment-applied { border-color: var(--status-applied-outline); color: rgba(59, 130, 246, 0.7); }
  .pipeline-segment-interviewed { border-color: var(--status-interviewed-outline); color: rgba(139, 92, 246, 0.7); }
  .pipeline-segment-final { border-color: var(--status-final-outline); color: rgba(245, 158, 11, 0.7); }
  .pipeline-segment-offer { border-color: var(--status-offer-outline); color: rgba(34, 197, 94, 0.7); }
  .pipeline-segment-wrap {
    display: inline-flex;
    align-items: center;
    flex: 0 0 auto;
  }
  .pipeline-segment-wrap:not(:last-child)::after {
    content: '';
    display: inline-block;
    width: 1px;
    height: 18px;
    background: var(--color-divider);
    margin-left: var(--space-4);
    margin-right: var(--space-3);
    pointer-events: none;
    vertical-align: middle;
  }
  /* Phase 7 performance: No backdrop-filter/blur. Transitions narrowed to color, border, background, box-shadow, transform, opacity (no width/height/top/left). Separators via wrapper ::after (no extra DOM). Icons via sprite+iconHtml (reused). */

  .pipeline-segment:hover {
    background: rgba(0, 0, 0, 0.12);
  }
  .pipeline-segment-prospect:hover { border-color: var(--status-prospect); color: var(--status-prospect); }
  .pipeline-segment-applied:hover { border-color: var(--status-applied); color: var(--status-applied); }
  .pipeline-segment-interviewed:hover { border-color: var(--status-interviewed); color: var(--status-interviewed); }
  .pipeline-segment-final:hover { border-color: var(--status-final); color: var(--status-final); }
  .pipeline-segment-offer:hover { border-color: var(--status-offer); color: var(--status-offer); }

  .pipeline-segment .icon-inline {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    opacity: 0.65;
    color: currentColor;
  }
  .pipeline-segment.active .icon-inline {
    opacity: 1;
  }

  /* Active: full pill — colored border + tinted background */
  .pipeline-segment-prospect { --status-bg: var(--status-prospect-bg); }
  .pipeline-segment-applied { --status-bg: var(--status-applied-bg); }
  .pipeline-segment-interviewed { --status-bg: var(--status-interviewed-bg); }
  .pipeline-segment-final { --status-bg: var(--status-final-bg); }
  .pipeline-segment-offer { --status-bg: var(--status-offer-bg); }
  .pipeline-segment.active {
    background: var(--status-bg);
    border: 1px solid var(--color-border);
  }
  .pipeline-segment-prospect.active { border-color: var(--status-prospect); color: var(--status-prospect); }
  .pipeline-segment-applied.active { border-color: var(--status-applied); color: var(--status-applied); }
  .pipeline-segment-interviewed.active { border-color: var(--status-interviewed); color: var(--status-interviewed); }
  .pipeline-segment-final.active { border-color: var(--status-final); color: var(--status-final); }
  .pipeline-segment-offer.active { border-color: var(--status-offer); color: var(--status-offer); }

  .pipeline-segment-closed { border-color: rgba(107, 114, 128, 0.4); color: rgba(107, 114, 128, 0.8); }
  .pipeline-segment-closed:hover { border-color: var(--color-status-closed); color: var(--color-status-closed); }
  .pipeline-segment-closed { --status-bg: rgba(107, 114, 128, 0.12); }
  .pipeline-segment-closed.active { border-color: var(--color-status-closed); color: var(--color-status-closed); }

  .pipeline-count {
    opacity: 0.9;
  }

  .pipeline-closed-wrap {
    position: relative;
  }

  .pipeline-closed-trigger {
    padding: var(--space-1) var(--space-3);
    border-radius: var(--radius-pill);
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--color-border);
    border-left: 2px solid rgba(107, 114, 128, 0.4);
    color: var(--color-text-muted);
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
  }

  .pipeline-closed-trigger:hover,
  .pipeline-closed-trigger.active {
    background: rgba(75, 85, 99, 0.2);
    border-color: var(--color-status-closed);
    border-left-color: var(--color-status-closed);
    color: var(--color-text-muted);
  }

  .pipeline-closed-trigger.active::after {
    content: '';
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--color-status-closed);
    margin-left: 6px;
    vertical-align: middle;
  }

  .pipeline-closed-panel {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: var(--space-1);
    min-width: 140px;
    padding: var(--space-2);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    z-index: 20;
  }

  .pipeline-closed-panel.open {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .pipeline-closed-item,
  .pipeline-closed-clear {
    padding: var(--space-2) var(--space-3);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 0.8125rem;
    text-align: left;
    background: transparent;
    color: var(--color-text-muted);
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .pipeline-closed-item:hover,
  .pipeline-closed-clear:hover {
    background: rgba(255, 255, 255, 0.06);
    color: var(--color-text-main);
  }

  .pipeline-closed-item.active.closed-rejected { background: rgba(220, 38, 38, 0.1); color: var(--color-status-rejected); }
  .pipeline-closed-item.active.closed-ghosted { background: rgba(75, 85, 99, 0.2); color: var(--color-status-ghosted); }
  .pipeline-closed-item.active.closed-withdrawn { background: rgba(107, 114, 128, 0.2); color: var(--color-status-withdrawn); }

  .pipeline-view-toggle {
    display: inline-flex;
    align-items: center;
    gap: var(--space-4);
    margin-left: auto;
  }

  .insights-body,
  .settings-body {
    padding: var(--space-6);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
  }

  .insights-section {
    margin-bottom: var(--space-6);
  }

  .insights-section:last-child {
    margin-bottom: 0;
  }

  .insights-heading {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-dim);
    margin-bottom: var(--space-2);
  }

  .settings-section {
    margin-bottom: var(--space-4);
  }

  /* Pill filter (Tracker / Inbox) */
  .filter-pill {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-pill);
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--color-border);
    color: var(--color-text-muted);
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
  }

  .filter-pill:hover {
    background: rgba(255, 255, 255, 0.08);
    color: var(--color-text-muted);
  }

  .filter-pill.active {
    background: rgba(255, 255, 255, 0.06);
    border-color: var(--color-border);
    border-bottom: 2px solid var(--status-prospect);
    color: var(--color-text-main);
  }

  .filter-pill.active::after {
    content: '';
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--status-prospect);
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     APP HEADER (backdrop reused from navbar)
     ───────────────────────────────────────────────────────────────────────────── */
  .navbar-backdrop {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    border-radius: inherit;
    overflow: hidden;
  }

  .navbar-backdrop svg {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .brand-logo {
    position: relative;
    width: 118px;
    height: 118px;
    background: transparent;
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    animation: greenpulse 2.5s ease-in-out infinite;
  }

  @keyframes greenpulse {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(106, 215, 163, 0.15)); }
    50% { filter: drop-shadow(0 0 12px rgba(106, 215, 163, 0.35)); }
  }

  .brand-logo svg {
    height: 100px;
    width: auto;
    display: block;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
  }

  .brand-name {
    font-size: 1.375rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--color-radar-mid);
    text-shadow: 0 0 24px rgba(106, 215, 163, 0.25);
    position: relative;
  }

  .brand-name::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, rgba(106, 215, 163, 0.5), transparent 70%);
    border-radius: 1px;
  }

  .brand-tagline {
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--color-text-muted);
    margin-top: -2px;
  }

  .profile-section {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .profile-switcher-wrap {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
  }
  .profile-switcher-label {
    font-size: 0.75rem;
    color: var(--color-text-muted);
    white-space: nowrap;
  }
  .profile-switcher-select {
    font-size: 0.8125rem;
    padding: 4px 8px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border);
    background: var(--color-bg-card);
    color: var(--color-text-main);
    min-width: 120px;
  }

  .profile-info {
    text-align: right;
  }

  .profile-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--color-text-main);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: var(--space-1);
    padding: 4px 14px;
    border-radius: var(--radius-pill);
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .status-badge.active {
    background: rgba(106, 215, 163, 0.14);
    border: 1px solid rgba(106, 215, 163, 0.3);
    color: var(--color-radar-light);
    font-weight: 800;
  }

  .status-badge.locked {
    background: rgba(220, 38, 38, 0.12);
    border: 1px solid rgba(220, 38, 38, 0.25);
    color: var(--color-tier-x);
  }

  .status-dot {
    flex-shrink: 0;
    width: 8px;
    height: 8px;
    display: block;
    color: inherit;
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     ACTION BAR
     ───────────────────────────────────────────────────────────────────────────── */
  .action-bar {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin-top: var(--space-6);
    padding: var(--space-4) var(--space-5);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    min-height: 44px;
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    background: var(--color-bg-card);
    color: var(--color-text-main);
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: color var(--transition-base), border-color var(--transition-base), background var(--transition-base), box-shadow var(--transition-base), transform var(--transition-base);
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--color-bg-hover);
    border-color: rgba(255, 255, 255, 0.15);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn:focus-visible,
  .tab-btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--color-bg-main), 0 0 0 4px var(--color-radar-mid);
  }

  .btn-primary {
    background: linear-gradient(180deg, rgba(14, 18, 24, 0.6) 0%, var(--color-bg-glass) 100%);
    border: 1px solid rgba(169, 255, 181, 0.35);
    color: var(--color-text-main);
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 0 1px rgba(169, 255, 181, 0.28), 0 0 18px rgba(94, 242, 199, 0.12), var(--shadow-card);
  }

  .btn-primary:hover {
    background: linear-gradient(180deg, rgba(18, 24, 32, 0.65) 0%, rgba(13, 17, 23, 0.7) 100%);
    border-color: rgba(169, 255, 181, 0.45);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 0 1px rgba(169, 255, 181, 0.4), 0 0 24px rgba(94, 242, 199, 0.15), var(--shadow-md);
    transform: translateY(-2px) scale(1.02);
  }

  .btn-primary:active {
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 0 1px rgba(169, 255, 181, 0.3), 0 0 12px rgba(94, 242, 199, 0.08), var(--shadow-card);
    transform: translateY(0);
  }

  .btn-ghost {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--color-text-dim);
    font-weight: 600;
  }
  .btn-ghost:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.15);
    color: var(--color-text-main);
  }

  .btn-with-icon {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
  }
  .btn-with-icon .btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-with-icon .btn-icon .icon-inline {
    display: block;
  }
  .admin-card-actions {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    align-items: center;
  }
  .admin-card-actions .btn-with-icon {
    font-size: 0.8125rem;
  }
  .btn-with-icon .btn-icon,
  .btn-icon {
    width: 1.125rem;
    height: 1.125rem;
    flex-shrink: 0;
  }

  .btn-action {
    background: linear-gradient(180deg, rgba(14, 18, 24, 0.55) 0%, var(--color-bg-glass) 100%);
    border: 1px solid rgba(169, 255, 181, 0.22);
    color: var(--color-text-main);
    font-weight: 600;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 0 1px rgba(169, 255, 181, 0.18), 0 0 18px rgba(94, 242, 199, 0.08), var(--shadow-card);
  }

  .btn-action:hover {
    background: linear-gradient(180deg, rgba(18, 24, 32, 0.6) 0%, rgba(13, 17, 23, 0.65) 100%);
    border-color: rgba(169, 255, 181, 0.3);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 0 1px rgba(169, 255, 181, 0.28), 0 0 20px rgba(94, 242, 199, 0.1), var(--shadow-md);
    transform: translateY(-1px);
  }

  .btn-action:active {
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 0 1px rgba(169, 255, 181, 0.2), 0 0 12px rgba(94, 242, 199, 0.06), var(--shadow-card);
    transform: translateY(0);
  }

  .btn-icon-only {
    padding: var(--space-2) var(--space-2);
    min-width: 0;
  }
  .btn-icon-only .icon-wrap {
    margin-right: 0;
  }

  .btn-action.tracker-save-btn {
    height: 36px;
    padding: 0 14px;
    border-radius: 12px;
    font-size: 0.8125rem;
    width: fit-content;
    transition: background var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-fast);
  }
  .btn-action.tracker-save-btn:hover {
    transform: translateY(-1px);
  }
  .btn-action.tracker-save-btn:active {
    transform: translateY(0);
  }
  .btn-action.tracker-save-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-sm {
    padding: var(--space-1) var(--space-3);
    font-size: 0.8125rem;
  }

  .btn-icon {
    min-width: 32px;
    padding: var(--space-2);
  }
  .btn-icon.btn-sm {
    min-width: 28px;
    padding: var(--space-1) var(--space-2);
  }

  .last-fetch-time {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--color-text-dim);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     PANELS
     ───────────────────────────────────────────────────────────────────────────── */
  .panel {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-5) var(--space-6);
    background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
    border-bottom: 1px solid var(--color-border);
  }

  .panel-title {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .panel-title-icon {
    font-size: 1.25rem;
  }

  .panel-count {
    padding: var(--space-1) var(--space-3);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--color-text-muted);
  }

  .panel-body {
    padding: var(--space-4);
    max-height: 68vh;
    overflow-y: auto;
  }

  .panel-body::-webkit-scrollbar {
    width: 6px;
  }

  .panel-body::-webkit-scrollbar-track {
    background: transparent;
  }

  .panel-body::-webkit-scrollbar-thumb {
    background: var(--color-divider);
    border-radius: 3px;
  }

  .panel-body::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.15);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     JOB CARDS (Inbox)
     ───────────────────────────────────────────────────────────────────────────── */
  .job-card {
    position: relative;
    max-width: 960px;
    background: var(--color-bg-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    margin-bottom: var(--space-4);
    transition: border-color var(--transition-base), box-shadow var(--transition-base), transform var(--transition-base), opacity var(--transition-fast);
    border-top: 2px solid rgba(106, 215, 163, 0.15);
    box-shadow: var(--shadow-card);
  }
  .job-card:hover {
    border-color: rgba(106, 215, 163, 0.3);
    box-shadow: var(--shadow-glow-green);
    transform: translateY(-2px);
  }
  .job-card:focus-within {
    outline: 2px solid var(--color-radar-mid);
    outline-offset: 2px;
  }

  .job-card.tier-s {
    border-color: rgba(250, 215, 106, 0.3);
    background: linear-gradient(135deg, var(--color-bg-card) 0%, rgba(250, 215, 106, 0.03) 100%);
    box-shadow: 0 0 24px rgba(250, 215, 106, 0.12);
  }

  .job-card.tier-s:hover {
    border-color: rgba(250, 215, 106, 0.5);
    box-shadow: var(--shadow-glow-gold);
  }

  .job-card.tier-s::before {
    content: '★';
    position: absolute;
    top: var(--space-3);
    right: var(--space-3);
    font-size: 1rem;
    color: var(--color-signal-gold);
    text-shadow: 0 0 10px rgba(250, 215, 106, 0.5);
  }

  .job-card.tier-a {
    border-left: 3px solid var(--color-tier-a);
  }

  .job-card.tier-b,
  .job-card.tier-c {
    border-top-color: rgba(255, 255, 255, 0.08);
  }

  .job-card.tier-d,
  .job-card.tier-f {
    border-color: rgba(255, 255, 255, 0.06);
    border-top-color: rgba(255, 255, 255, 0.06);
  }
  .job-card.tier-d .chip-tier-d,
  .job-card.tier-f .chip-tier-f {
    opacity: 0.85;
  }

  /* GoodFit (Tracker cards): three statements */
  .good-fit-block {
    margin-top: var(--space-4);
    padding-top: var(--space-4);
    border-top: 1px solid var(--color-border);
  }

  .good-fit-heading {
    font-size: 1rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-radar-mid);
    margin: 0 0 var(--space-3) 0;
  }

  .good-fit-statements {
    font-size: var(--card-body-size);
    line-height: var(--card-line-height);
    color: var(--color-text-main);
  }

  .good-fit-statement {
    margin: 0 0 var(--space-4) 0;
  }

  .good-fit-statement:last-of-type {
    margin-bottom: var(--space-2);
  }

  .job-header {
    margin-bottom: var(--space-4);
  }

  .job-title {
    font-size: var(--card-title-size);
    font-weight: 700;
    color: var(--color-text-main);
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .job-company {
    font-size: var(--card-meta-size);
    line-height: var(--card-line-height);
    color: var(--color-text-muted);
    font-weight: 500;
  }

  .job-meta {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    margin-bottom: var(--space-4);
  }

  /* Chips */
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 0.6875rem;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--color-border);
    color: var(--color-text-muted);
  }

  .chip-tier {
    font-weight: 800;
    letter-spacing: 0.04em;
  }

  .chip-tier-s { background: rgba(250, 215, 106, 0.1); border-color: rgba(250, 215, 106, 0.25); color: var(--color-tier-s); }
  .chip-tier-a { background: rgba(106, 215, 163, 0.1); border-color: rgba(106, 215, 163, 0.25); color: var(--color-tier-a); }
  .chip-tier-b { background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.25); color: var(--color-tier-b); }
  .chip-tier-c { background: rgba(156, 163, 175, 0.08); border-color: rgba(156, 163, 175, 0.2); color: var(--color-tier-c); }
  .chip-tier-f { background: rgba(75, 85, 99, 0.1); border-color: rgba(75, 85, 99, 0.25); color: var(--color-tier-f); }
  .chip-tier-x { background: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.25); color: var(--color-tier-x); }

  .chip-role {
    background: rgba(106, 215, 163, 0.08);
    border-color: rgba(106, 215, 163, 0.2);
    color: var(--color-radar-mid);
  }

  .job-salary {
    font-size: 0.75rem;
    padding: 5px 11px;
    background: rgba(106, 215, 163, 0.08);
    border: 1px solid rgba(106, 215, 163, 0.25);
    color: var(--color-radar-mid);
  }

  .job-salary-inferred {
    border-style: dashed;
    background: rgba(250, 215, 106, 0.06);
    border-color: rgba(250, 215, 106, 0.25);
    color: var(--color-signal-gold);
  }

  .job-salary-missing {
    opacity: 0.85;
    background: rgba(255, 255, 255, 0.03);
    border-color: var(--color-border);
    color: var(--color-text-muted);
  }

  .job-summary-preview {
    font-size: var(--card-body-size);
    line-height: 1.6;
    color: var(--color-text-muted);
    margin-bottom: var(--space-3);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Job Summary Block */
  .job-summary {
    font-size: var(--card-body-size);
    line-height: var(--card-line-height);
    color: var(--color-text-muted);
    padding: var(--space-3) var(--space-4);
    background: rgba(0, 0, 0, 0.3);
    border-left: 3px solid var(--color-radar-dark);
    border-radius: var(--radius-sm);
    margin-bottom: var(--space-4);
  }

  /* Why Fit Section */
  .why-fit {
    margin-bottom: var(--space-4);
  }

  .why-fit-toggle {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: linear-gradient(135deg, rgba(106, 215, 163, 0.08) 0%, rgba(47, 138, 99, 0.08) 100%);
    border: 1px solid rgba(106, 215, 163, 0.2);
    border-radius: var(--radius-sm);
    color: var(--color-radar-mid);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .why-fit-toggle:hover {
    background: linear-gradient(135deg, rgba(106, 215, 163, 0.12) 0%, rgba(47, 138, 99, 0.12) 100%);
    border-color: rgba(106, 215, 163, 0.35);
  }

  .why-fit-toggle .arrow {
    font-size: 0.625rem;
    transition: transform var(--transition-base);
  }

  .why-fit-toggle.open .arrow {
    transform: rotate(90deg);
  }

  .why-fit-content {
    display: none;
    margin-top: var(--space-3);
    padding: var(--space-4);
    background: linear-gradient(135deg, rgba(106, 215, 163, 0.05) 0%, rgba(47, 138, 99, 0.02) 100%);
    border: 1px solid rgba(106, 215, 163, 0.12);
    border-radius: var(--radius-md);
  }

  .why-fit-content.open {
    display: block;
    animation: slideDown 0.25s var(--ease-out);
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .why-fit-label {
    font-size: 0.625rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--color-radar-mid);
    margin-bottom: var(--space-2);
  }

  .why-fit-text {
    font-size: 0.8125rem;
    line-height: 1.7;
    color: var(--color-text-main);
    white-space: pre-wrap;
  }

  /* Job Actions — compact, not full-width */
  .job-actions {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    padding-top: var(--space-2);
    margin-top: var(--space-2);
    border-top: 1px solid var(--color-border);
    justify-content: flex-start;
    flex-wrap: wrap;
  }

  .job-actions .btn,
  .job-actions .btn-card {
    flex: none;
    padding: var(--space-1) var(--space-3);
    font-size: 0.75rem;
    font-weight: 600;
    min-height: 0;
  }

  .job-actions .btn-card {
    border-radius: var(--radius-sm);
    box-shadow: none;
  }

  .job-actions .btn-primary.btn-card,
  .job-actions .btn-action.btn-card {
    padding: var(--space-1) var(--space-3);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     TRACKER CARDS
     ───────────────────────────────────────────────────────────────────────────── */
  .tracker-card {
    position: relative;
    z-index: 1;
    max-width: 960px;
    background: var(--color-bg-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    margin-bottom: var(--space-4);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-base);
    border-top: 2px solid var(--status-prospect);
    box-shadow: var(--shadow-card);
  }

  .tracker-card.flipped {
    z-index: 10;
    box-shadow: var(--shadow-lg);
    max-height: min(90vh, 720px);
  }

  .tracker-card.flipped .tracker-card-inner {
    height: 100%;
  }

  .tracker-card.flipped .tracker-card-back {
    height: 100%;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .tracker-card.flipped .tracker-card-back .good-fit-back-content {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
  }

  /* Backdrop when GoodFit card is flipped — hole at card, dim everywhere else */
  .tracker-flip-backdrop {
    position: fixed;
    z-index: 1;
    pointer-events: auto;
    cursor: pointer;
    border: none;
    padding: 0;
    margin: 0;
    background: transparent;
  }

  #trackerList.has-flipped-card {
    position: relative;
    z-index: 5;
  }

  .tracker-card-focus-placeholder {
    width: 100%;
    min-height: 120px;
    flex-shrink: 0;
  }

  .tracker-card.stage-prospect { border-top-color: var(--status-prospect); }
  .tracker-card.stage-applied { border-top-color: var(--status-applied); }
  .tracker-card.stage-interviewed { border-top-color: var(--status-interviewed); }
  .tracker-card.stage-final { border-top-color: var(--status-final); }
  .tracker-card.stage-offer { border-top-color: var(--status-offer); }
  .tracker-card.stage-rejected { border-top-color: var(--color-status-rejected); }
  .tracker-card.stage-ghosted { border-top-color: var(--color-status-ghosted); }
  .tracker-card.stage-withdrawn { border-top-color: var(--color-status-withdrawn); }

  .tracker-card.stage-prospect,
  .tracker-card.stage-applied,
  .tracker-card.stage-interviewed,
  .tracker-card.stage-final,
  .tracker-card.stage-offer,
  .tracker-card.stage-rejected,
  .tracker-card.stage-ghosted,
  .tracker-card.stage-withdrawn {
    background: linear-gradient(135deg, var(--color-bg-card) 0%, var(--status-bg) 100%);
    box-shadow: var(--shadow-card), 0 0 24px var(--status-bg);
  }

  /* Jobs Intake (admin) — pipeline-style cards */
  .jobs-intake-pipeline-header {
    margin-bottom: var(--space-3);
  }
  .jobs-intake-pipeline-header.pipeline-layout .pipeline-row {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    min-height: 40px;
    overflow-x: auto;
    gap: var(--space-3);
  }
  .jobs-intake-pipeline-header.pipeline-layout .pipeline-bar {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: var(--space-2);
  }
  .jobs-intake-pipeline-header .pipeline-segment-wrap:not(:last-child)::after {
    margin-left: var(--space-2);
    margin-right: var(--space-2);
  }
  .jobs-intake-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: var(--space-4);
    max-height: 65vh;
    overflow-y: auto;
  }
  .jobs-intake-dim-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 6, 10, 0.5);
    z-index: 4;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .jobs-intake-dim-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  /* Job intake spotlight: card forward + isolated + dimmed (same pattern as GoodFit) */
  .jobs-intake-spotlight-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 6, 10, 0.38);
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .jobs-intake-spotlight-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .jobs-intake-spotlight-slot {
    position: fixed;
    inset: 0;
    z-index: 2100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: var(--space-4);
    pointer-events: none;
  }
  .jobs-intake-spotlight-slot.visible {
    display: flex;
    pointer-events: none;
  }
  .jobs-intake-spotlight-slot .jobs-intake-card {
    pointer-events: auto;
    width: min(92vw, 900px);
    max-width: min(92vw, 900px);
    max-height: min(85vh, 90vh);
    overflow: auto;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(106, 215, 163, 0.25);
  }
  #jobsIntakeList.has-editing-card {
    position: relative;
    z-index: 5;
  }
  .jobs-intake-card-form .form-group {
    margin-bottom: var(--space-3);
    margin-top: 0;
  }
  .jobs-intake-card-form .form-group label {
    display: block;
    margin-bottom: var(--space-2);
  }
  .jobs-intake-card {
    position: relative;
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border);
    border-top: 3px solid var(--status-prospect);
    padding: var(--space-4);
    background: var(--color-bg-card);
    cursor: pointer;
    transition: box-shadow var(--transition-fast), border-color var(--transition-fast);
  }
  .jobs-intake-card.is-editing {
    z-index: 10;
    box-shadow: var(--shadow-lg);
  }
  .jobs-intake-url-readonly {
    font-size: 0.875rem;
    color: var(--color-text-muted);
  }
  .jobs-intake-url-readonly a {
    color: var(--color-radar-mid);
    text-decoration: none;
  }
  .jobs-intake-url-readonly a:hover {
    text-decoration: underline;
  }
  .jobs-intake-why-fit-readonly {
    padding: var(--space-2);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    font-size: 0.875rem;
    color: var(--color-text-dim);
    white-space: pre-wrap;
    min-height: 2.5em;
  }
  .jobs-intake-card.stage-prospect { border-top-color: var(--status-prospect); --status-bg: var(--status-prospect-bg); }
  .jobs-intake-card.stage-applied { border-top-color: var(--status-applied); --status-bg: var(--status-applied-bg); }
  .jobs-intake-card.stage-offer { border-top-color: var(--status-offer); --status-bg: var(--status-offer-bg); }
  .jobs-intake-card.stage-closed { border-top-color: var(--color-status-closed); --status-bg: rgba(107, 114, 128, 0.12); }
  .jobs-intake-card.stage-prospect,
  .jobs-intake-card.stage-applied,
  .jobs-intake-card.stage-offer,
  .jobs-intake-card.stage-closed {
    background: linear-gradient(135deg, var(--color-bg-card) 0%, var(--status-bg) 100%);
  }
  .jobs-intake-card:hover {
    border-color: rgba(255, 255, 255, 0.14);
    box-shadow: var(--shadow-md);
  }
  .jobs-intake-card .job-card-front .job-header .job-title { font-size: var(--card-title-size); margin-bottom: var(--space-1); }
  .jobs-intake-card .job-meta { display: flex; flex-wrap: wrap; gap: var(--space-2); margin: var(--space-2) 0; align-items: center; }
  .jobs-intake-card .chip-missing { color: var(--color-tier-x); background: rgba(220, 38, 38, 0.1); }
  .jobs-intake-card .chip-muted { color: var(--color-text-dim); font-size: 0.8125rem; }

  .tracker-card:hover {
    border-color: rgba(255, 255, 255, 0.14);
    box-shadow: var(--shadow-md);
  }
  .tracker-card:focus-within {
    outline: 2px solid var(--color-radar-mid);
    outline-offset: 2px;
  }

  .tracker-card-inner {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.35s ease;
  }

  .tracker-card.flipped .tracker-card-inner {
    transform: rotateY(180deg);
  }

  .tracker-card-front,
  .tracker-card-back {
    backface-visibility: hidden;
  }

  .tracker-card-back {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    min-height: 100%;
    padding: var(--space-3);
    transform: rotateY(180deg);
    background: var(--color-bg-card);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .tracker-card-back .good-fit-heading {
    margin: 0 0 var(--space-1) 0;
  }

  .tracker-card-back .good-fit-back-content {
    flex: 1;
    font-size: var(--card-body-size);
    line-height: var(--card-line-height);
    color: var(--color-text-main);
  }

  .tracker-card-back .good-fit-statements .good-fit-statement {
    margin: 0 0 var(--space-2) 0;
  }

  .tracker-card-back .good-fit-statements .good-fit-statement:last-of-type {
    margin-bottom: 0;
  }

  .tracker-card-back .tracker-card-back-notes {
    flex-shrink: 0;
    margin-top: var(--space-2);
  }

  .tracker-card-back .tracker-card-back-notes .form-label {
    margin-bottom: var(--space-1);
  }

  .tracker-card-back .tracker-card-back-notes-input {
    min-height: 60px;
    resize: vertical;
    background: var(--color-bg-bay);
  }

  .tracker-card-back .tracker-card-back-section-heading,
  .tracker-card-back .tracker-card-back-saved-notes-heading {
    margin: 0 0 var(--space-2) 0;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-dim);
  }
  .tracker-card-back .tracker-card-back-job-summary {
    flex-shrink: 0;
  }
  .tracker-card-back .tracker-card-back-job-meta {
    margin-bottom: var(--space-2);
  }
  .tracker-card-back .tracker-card-back-company {
    font-size: var(--card-meta-size);
    color: var(--color-text-muted);
  }
  .tracker-card-back .tracker-card-back-pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    margin: var(--space-1) 0;
  }
  .tracker-card-back .tracker-card-back-summary {
    font-size: var(--card-body-size);
    line-height: var(--card-line-height);
    color: var(--color-text-main);
    margin-top: var(--space-2);
  }
  .tracker-card-back .tracker-card-back-saved-notes {
    font-size: var(--card-body-size);
    line-height: var(--card-line-height);
    color: var(--color-text-muted);
    margin-top: var(--space-1);
    margin-bottom: var(--space-3);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .tracker-card .job-title {
    font-size: var(--card-title-size);
    font-weight: 600;
    line-height: 1.4;
    color: var(--color-text-main);
  }

  .tracker-card .job-company {
    font-size: var(--card-meta-size);
    line-height: var(--card-line-height);
    color: var(--color-text-muted);
  }

  .tracker-salary-pill {
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }
  .tracker-salary-pill.meta-pill {
    font-weight: 500;
  }

  .tracker-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-3);
    margin-bottom: var(--space-5);
  }

  .tracker-card-header .job-title {
    margin-bottom: var(--space-1);
  }

  .tracker-card-actions-top {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    flex-shrink: 0;
  }

  .tracker-card-main {
    flex: 1;
    min-width: 0;
  }

  .tracker-card-summary {
    font-size: var(--card-body-size);
    color: var(--color-text-muted);
    line-height: var(--card-line-height);
    margin-bottom: var(--space-5);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .tracker-card-cta {
    margin-bottom: var(--space-3);
    text-align: center;
  }

  .tracker-view-job-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    width: auto;
    max-width: 100%;
    padding: var(--space-2) var(--space-4);
    font-size: var(--card-body-size);
    font-weight: 600;
    text-align: center;
    border-radius: var(--radius-md);
    text-decoration: none;
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  }

  /* Tracker ALL: match Inbox sizing (slightly larger) */
  .tracker-list-context-all .tracker-view-job-btn {
    padding: var(--space-3) var(--space-4);
    font-size: var(--card-body-size);
  }

  .tracker-view-job-btn.tracker-view-job-btn-disabled {
    opacity: 0.6;
    cursor: not-allowed;
    pointer-events: none;
  }

  .tracker-card-footer {
    display: flex;
    justify-content: flex-start;
    margin-top: var(--space-2);
  }

  .tracker-card-details {
    display: none;
    margin-top: var(--space-4);
    padding-top: var(--space-4);
    border-top: 1px solid var(--color-border);
  }

  .tracker-card.expanded .tracker-card-details {
    display: block;
  }

  .tracker-card-details-actions {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin-top: var(--space-4);
  }
  .tracker-remove-btn {
    color: var(--color-text-muted);
  }
  .tracker-remove-btn:hover {
    color: var(--color-tier-x);
  }

  .form-group {
    margin-top: var(--space-3);
  }

  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-dim);
    margin-bottom: var(--space-1);
  }

  .form-input,
  .form-select,
  .form-textarea {
    width: 100%;
    padding: var(--space-2) var(--space-3);
    background: var(--color-bg-main);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    color: var(--color-text-main);
    font-family: inherit;
    font-size: var(--card-body-size);
    transition: border-color var(--transition-fast);
  }

  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    outline: none;
    border-color: var(--color-radar-dark);
  }

  .form-textarea {
    min-height: 60px;
    resize: vertical;
  }

  .tracker-card .btn {
    margin-top: var(--space-3);
    padding: var(--space-1) var(--space-3);
    font-size: var(--card-meta-size);
    font-weight: 600;
  }

  .tracker-card-actions-top .btn,
  .tracker-card-actions-top .btn-sm {
    padding: var(--space-1) var(--space-3);
    font-size: var(--card-meta-size);
  }

  .tracker-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  .tracker-table th,
  .tracker-table td {
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid var(--color-border);
    text-align: left;
    vertical-align: middle;
  }
  .tracker-table td {
    min-height: 44px;
  }
  .tracker-table th:nth-child(4),
  .tracker-table td:nth-child(4) {
    min-width: 120px;
  }

  .tracker-table th {
    font-weight: 600;
    color: var(--color-text-dim);
    text-transform: uppercase;
    font-size: 0.6875rem;
    letter-spacing: 0.08em;
  }

  /* Ops Mode: status pill not larger than text; consistent with cell font */
  .tracker-table .status-pill {
    min-height: 24px;
    padding: 4px 10px;
    font-size: 0.8125rem;
    gap: 4px;
  }

  .tracker-table-days {
    font-variant-numeric: tabular-nums;
    color: var(--color-text-muted);
  }
  .tracker-table-row-actions {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  /* Ops Mode: action icons consistent size, baseline-aligned */
  .tracker-table .icon-btn {
    min-width: 32px;
    min-height: 32px;
  }
  .tracker-table .icon-btn.tracker-eye-btn svg,
  .tracker-table .icon-btn.tracker-eye-btn .icon-inline,
  .tracker-table .tracker-save-btn .icon-inline,
  .tracker-table .tracker-save-btn svg {
    width: 16px;
    height: 16px;
  }
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    min-height: 36px;
    padding: 0;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-bg-card);
    color: var(--color-text-muted);
    text-decoration: none;
    transition: color var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
  }
  .icon-btn:hover {
    color: var(--color-accent);
    border-color: rgba(106, 215, 163, 0.35);
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 0 0 1px rgba(106, 215, 163, 0.2);
  }
  .icon-btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--color-bg-main), 0 0 0 4px var(--color-radar-mid);
  }
  .icon-btn.tracker-eye-btn svg,
  .icon-btn.tracker-eye-btn .icon-inline {
    width: 18px;
    height: 18px;
    color: currentColor;
  }
  .tracker-eye-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-muted);
    text-decoration: none;
  }
  .tracker-eye-btn:hover {
    color: var(--color-accent);
  }
  .tracker-eye-btn-disabled,
  .icon-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }
  .tracker-table .form-input-sm,
  .tracker-table .form-select-sm {
    padding: var(--space-1) var(--space-2);
    font-size: 0.75rem;
    min-width: 0;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--color-bg-card) 25%, var(--color-bg-hover) 50%, var(--color-bg-card) 75%);
    background-size: 200% 100%;
    animation: skeleton 1.2s ease-in-out infinite;
    border-radius: var(--radius-sm);
  }

  @keyframes skeleton {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     EMPTY STATES
     ───────────────────────────────────────────────────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-12) var(--space-6);
    text-align: center;
  }

  .empty-icon {
    font-size: 3.5rem;
    margin-bottom: var(--space-5);
    opacity: 0.25;
    animation: empty-pulse 3s ease-in-out infinite;
  }

  @keyframes empty-pulse {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.05); }
  }

  .empty-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--color-text-muted);
    margin-bottom: var(--space-2);
  }

  .empty-subtitle {
    font-size: 0.8125rem;
    color: var(--color-text-dim);
    max-width: 240px;
  }

  .empty-desc {
    font-size: 0.8125rem;
    color: var(--color-text-dim);
    margin-bottom: var(--space-4);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     TOAST NOTIFICATIONS
     ───────────────────────────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: calc(var(--space-8) + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: var(--space-3) var(--space-6);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    font-size: 0.875rem;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: opacity 0.4s var(--ease-out), transform 0.4s var(--ease-out);
    z-index: 1000;
  }

  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast.success {
    border-color: rgba(106, 215, 163, 0.4);
    color: var(--color-radar-mid);
  }

  .toast.error {
    border-color: rgba(220, 38, 38, 0.4);
    color: var(--color-tier-x);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     LOADING OVERLAY
     ───────────────────────────────────────────────────────────────────────────── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background: rgba(5, 6, 10, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 17px;
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition-base);
  }

  .loading-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .loading-overlay.visible .loader {
    animation: loader-scale-in 0.2s var(--ease-out);
  }

  @keyframes loader-scale-in {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
  }

  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 101px;
    height: 101px;
  }

  .loader svg {
    width: 101px;
    height: 101px;
    display: block;
  }

  .loading-text {
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--color-text-muted);
  }

  .btn-loading {
    opacity: 0.85;
  }

  @media (prefers-reduced-motion: reduce) {
    .command-bar-left .btn-primary,
    .command-bar-left .btn-action,
    .empty-icon,
    .status-dot {
      animation: none;
    }
    .loading-overlay .loader svg {
      animation: none;
    }
    .loading-overlay.visible .loader {
      animation: none;
    }
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     SPOTLIGHT CARD DETAIL (overlay + elevated card, no full reload)
     ───────────────────────────────────────────────────────────────────────────── */
  body.spotlight-active {
    overflow: hidden;
  }

  .spotlight-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 6, 10, 0.38);
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .spotlight-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .spotlight-slot {
    position: fixed;
    inset: 0;
    z-index: 2100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: var(--space-4);
    pointer-events: none;
  }
  .spotlight-slot.visible {
    display: flex;
    pointer-events: none;
  }
  .spotlight-slot .spotlight-panel-container {
    pointer-events: auto;
  }
  .spotlight-slot .tracker-card {
    width: 100%;
    max-width: 520px;
  }

  .spotlight-slot .tracker-card.is-focus-mode {
    pointer-events: auto;
    width: min(92vw, 900px);
    max-width: min(92vw, 900px);
    max-height: min(85vh, 90vh);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(106, 215, 163, 0.25);
  }
  /* Readable line length for long text inside focus mode card */
  .spotlight-slot .tracker-card.is-focus-mode .tracker-card-back-summary,
  .spotlight-slot .tracker-card.is-focus-mode .good-fit-back-content {
    max-width: 65ch;
  }
  .spotlight-slot .tracker-card.is-focus-mode .tracker-card-inner {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;

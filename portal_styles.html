<style>
  /* ═══════════════════════════════════════════════════════════════════════
     SYGNALIST PORTAL — STYLE SYSTEM
     ═══════════════════════════════════════════════════════════════════════ */

  /* ─────────────────────────────────────────────────────────────────────────
     DESIGN TOKENS
     ───────────────────────────────────────────────────────────────────────── */
  :root {
    /* Backgrounds */
    --bg-base: #030712;
    --bg-surface: #0a0f1a;
    --bg-elevated: #111827;
    --bg-card: #0d1424;
    --bg-hover: #1a2332;
    
    /* Borders */
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-default: rgba(255, 255, 255, 0.1);
    --border-strong: rgba(255, 255, 255, 0.15);
    
    /* Text */
    --text-primary: #f9fafb;
    --text-secondary: #d1d5db;
    --text-tertiary: #9ca3af;
    --text-muted: #6b7280;
    
    /* Brand — Radar Green */
    --brand-50: #ecfdf5;
    --brand-100: #d1fae5;
    --brand-200: #a7f3d0;
    --brand-300: #6ee7b7;
    --brand-400: #34d399;
    --brand-500: #10b981;
    --brand-600: #059669;
    --brand-700: #047857;
    --brand-800: #065f46;
    --brand-900: #064e3b;
    
    /* Signal Gold */
    --gold-400: #fbbf24;
    --gold-500: #f59e0b;
    --gold-600: #d97706;
    
    /* Tiers */
    --tier-s: #fbbf24;
    --tier-a: #34d399;
    --tier-b: #60a5fa;
    --tier-c: #9ca3af;
    --tier-f: #6b7280;
    --tier-x: #f87171;
    
    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
    --shadow-glow-brand: 0 0 40px rgba(16, 185, 129, 0.15);
    --shadow-glow-gold: 0 0 40px rgba(251, 191, 36, 0.15);
    
    /* Spacing */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    
    /* Radius */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;
    
    /* Transitions */
    --transition-fast: 150ms ease;
    --transition-base: 200ms ease;
    --transition-slow: 300ms ease;
  }

  /* ─────────────────────────────────────────────────────────────────────────
     RESET & BASE
     ───────────────────────────────────────────────────────────────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Ambient background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(16, 185, 129, 0.08), transparent),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 50px,
        rgba(16, 185, 129, 0.02) 50px,
        rgba(16, 185, 129, 0.02) 51px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 50px,
        rgba(16, 185, 129, 0.02) 50px,
        rgba(16, 185, 129, 0.02) 51px
      );
    pointer-events: none;
    z-index: 0;
  }

  a {
    color: var(--brand-400);
    text-decoration: none;
    transition: color var(--transition-fast);
  }

  a:hover {
    color: var(--brand-300);
  }

  /* ─────────────────────────────────────────────────────────────────────────
     LAYOUT
     ───────────────────────────────────────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: var(--space-6);
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: var(--space-6);
    margin-top: var(--space-6);
  }

  /* ─────────────────────────────────────────────────────────────────────────
     NAVBAR
     ───────────────────────────────────────────────────────────────────────── */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-5) var(--space-6);
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .brand-logo {
    position: relative;
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--brand-500) 0%, var(--brand-700) 100%);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-glow-brand);
  }

  .brand-logo::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: calc(var(--radius-lg) - 3px);
  }

  .brand-logo svg {
    width: 28px;
    height: 28px;
    fill: white;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand-name {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--text-primary);
  }

  .brand-tagline {
    font-size: 0.625rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .profile-info {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: var(--space-2);
  }

  .profile-name {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: var(--radius-full);
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .status-badge.active {
    background: rgba(16, 185, 129, 0.15);
    border: 1px solid rgba(16, 185, 129, 0.3);
    color: var(--brand-400);
  }

  .status-badge.locked {
    background: rgba(248, 113, 113, 0.15);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: var(--tier-x);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: currentColor;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.9); }
  }

  /* ─────────────────────────────────────────────────────────────────────────
     ACTION BAR
     ───────────────────────────────────────────────────────────────────────── */
  .action-bar {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin-top: var(--space-5);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-full);
    background: var(--bg-elevated);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-base);
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--bg-hover);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--brand-500) 0%, var(--brand-700) 100%);
    border: none;
    color: white;
    font-weight: 700;
    box-shadow: var(--shadow-glow-brand), var(--shadow-md);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, var(--brand-400) 0%, var(--brand-600) 100%);
    box-shadow: 0 0 50px rgba(16, 185, 129, 0.25), var(--shadow-lg);
  }

  .last-fetch-time {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* ─────────────────────────────────────────────────────────────────────────
     PANELS
     ───────────────────────────────────────────────────────────────────────── */
  .panel {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-5) var(--space-6);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-subtle);
  }

  .panel-title {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    font-size: 1.0625rem;
    font-weight: 700;
  }

  .panel-title-icon {
    font-size: 1.25rem;
  }

  .panel-count {
    padding: var(--space-1) var(--space-3);
    background: rgba(255, 255, 255, 0.06);
    border-radius: var(--radius-full);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-tertiary);
  }

  .panel-body {
    padding: var(--space-4);
    max-height: 65vh;
    overflow-y: auto;
  }

  .panel-body::-webkit-scrollbar {
    width: 6px;
  }

  .panel-body::-webkit-scrollbar-track {
    background: transparent;
  }

  .panel-body::-webkit-scrollbar-thumb {
    background: var(--border-default);
    border-radius: 3px;
  }

  .panel-body::-webkit-scrollbar-thumb:hover {
    background: var(--border-strong);
  }

  /* ─────────────────────────────────────────────────────────────────────────
     JOB CARDS
     ───────────────────────────────────────────────────────────────────────── */
  .job-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    margin-bottom: var(--space-3);
    transition: all var(--transition-base);
  }

  .job-card:hover {
    border-color: var(--brand-700);
    box-shadow: var(--shadow-glow-brand);
    transform: translateY(-2px);
  }

  .job-card.tier-s {
    border-color: rgba(251, 191, 36, 0.3);
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(251, 191, 36, 0.03) 100%);
  }

  .job-card.tier-s:hover {
    border-color: rgba(251, 191, 36, 0.5);
    box-shadow: var(--shadow-glow-gold);
  }

  .job-header {
    margin-bottom: var(--space-3);
  }

  .job-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .job-company {
    font-size: 0.875rem;
    color: var(--text-tertiary);
  }

  .job-meta {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    margin-bottom: var(--space-4);
  }

  /* Chips */
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 0.6875rem;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border-subtle);
    color: var(--text-tertiary);
  }

  .chip-tier {
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .chip-tier-s { background: rgba(251, 191, 36, 0.12); border-color: rgba(251, 191, 36, 0.3); color: var(--tier-s); }
  .chip-tier-a { background: rgba(52, 211, 153, 0.12); border-color: rgba(52, 211, 153, 0.3); color: var(--tier-a); }
  .chip-tier-b { background: rgba(96, 165, 250, 0.12); border-color: rgba(96, 165, 250, 0.3); color: var(--tier-b); }
  .chip-tier-c { background: rgba(156, 163, 175, 0.1); border-color: rgba(156, 163, 175, 0.25); color: var(--tier-c); }
  .chip-tier-f { background: rgba(107, 114, 128, 0.1); border-color: rgba(107, 114, 128, 0.25); color: var(--tier-f); }
  .chip-tier-x { background: rgba(248, 113, 113, 0.12); border-color: rgba(248, 113, 113, 0.3); color: var(--tier-x); }

  .chip-lane {
    border-color: var(--brand-700);
    color: var(--brand-400);
  }

  /* Job Summary */
  .job-summary {
    font-size: 0.8125rem;
    line-height: 1.6;
    color: var(--text-secondary);
    padding: var(--space-3) var(--space-4);
    background: rgba(0, 0, 0, 0.25);
    border-left: 3px solid var(--brand-700);
    border-radius: var(--radius-sm);
    margin-bottom: var(--space-4);
  }

  /* Why Fit */
  .why-fit {
    margin-bottom: var(--space-4);
  }

  .why-fit-toggle {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: rgba(16, 185, 129, 0.08);
    border: 1px solid rgba(16, 185, 129, 0.2);
    border-radius: var(--radius-sm);
    color: var(--brand-400);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .why-fit-toggle:hover {
    background: rgba(16, 185, 129, 0.12);
    border-color: rgba(16, 185, 129, 0.35);
  }

  .why-fit-toggle .arrow {
    font-size: 0.625rem;
    transition: transform var(--transition-base);
  }

  .why-fit-toggle.open .arrow {
    transform: rotate(90deg);
  }

  .why-fit-content {
    display: none;
    margin-top: var(--space-3);
    padding: var(--space-4);
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.06) 0%, rgba(16, 185, 129, 0.02) 100%);
    border: 1px solid rgba(16, 185, 129, 0.15);
    border-radius: var(--radius-md);
  }

  .why-fit-content.open {
    display: block;
  }

  .why-fit-label {
    font-size: 0.625rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--brand-500);
    margin-bottom: var(--space-2);
  }

  .why-fit-text {
    font-size: 0.8125rem;
    line-height: 1.7;
    color: var(--text-primary);
    white-space: pre-wrap;
  }

  /* Job Actions */
  .job-actions {
    display: flex;
    gap: var(--space-2);
    padding-top: var(--space-4);
    border-top: 1px solid var(--border-subtle);
  }

  .job-actions .btn {
    flex: 1;
    padding: var(--space-2) var(--space-4);
    font-size: 0.8125rem;
  }

  /* ─────────────────────────────────────────────────────────────────────────
     TRACKER CARDS
     ───────────────────────────────────────────────────────────────────────── */
  .tracker-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
    margin-bottom: var(--space-3);
  }

  .tracker-card .job-title {
    font-size: 0.9375rem;
  }

  .tracker-card .job-company {
    font-size: 0.8125rem;
  }

  .form-group {
    margin-top: var(--space-3);
  }

  .form-label {
    display: block;
    font-size: 0.625rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: var(--space-1);
  }

  .form-input,
  .form-select,
  .form-textarea {
    width: 100%;
    padding: var(--space-2) var(--space-3);
    background: var(--bg-base);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.8125rem;
    transition: border-color var(--transition-fast);
  }

  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    outline: none;
    border-color: var(--brand-600);
  }

  .form-textarea {
    min-height: 60px;
    resize: vertical;
  }

  .tracker-card .btn {
    margin-top: var(--space-3);
    width: 100%;
  }

  /* ─────────────────────────────────────────────────────────────────────────
     EMPTY STATES
     ───────────────────────────────────────────────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-10) var(--space-6);
    text-align: center;
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: var(--space-4);
    opacity: 0.3;
  }

  .empty-title {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: var(--space-2);
  }

  .empty-subtitle {
    font-size: 0.8125rem;
    color: var(--text-muted);
  }

  /* ─────────────────────────────────────────────────────────────────────────
     TOAST
     ───────────────────────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: var(--space-6);
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: var(--space-3) var(--space-6);
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-full);
    font-size: 0.875rem;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: all var(--transition-slow);
    z-index: 1000;
  }

  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast.success {
    border-color: var(--brand-600);
    color: var(--brand-400);
  }

  .toast.error {
    border-color: rgba(248, 113, 113, 0.5);
    color: var(--tier-x);
  }

  /* ─────────────────────────────────────────────────────────────────────────
     LOADING OVERLAY
     ───────────────────────────────────────────────────────────────────────── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(3, 7, 18, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition-base);
  }

  .loading-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .loader {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border-default);
    border-top-color: var(--brand-500);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

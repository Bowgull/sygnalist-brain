<style>
  /* ═══════════════════════════════════════════════════════════════════════════
     SYGNALIST — DESIGN SYSTEM v2.0
     Following Blueprint Brand Guidelines
     ═══════════════════════════════════════════════════════════════════════════ */

  /* ─────────────────────────────────────────────────────────────────────────────
     DESIGN TOKENS (from Blueprint 3.2)
     ───────────────────────────────────────────────────────────────────────────── */
  :root {
    /* Background / Base */
    --color-bg-main: #05060A;
    --color-bg-elevated: #0D1117;
    --color-bg-card: #111827;
    --color-bg-hover: #1a2332;
    
    /* Radar Green Gradient */
    --color-radar-light: #A9F2C4;
    --color-radar-mid: #6AD7A3;
    --color-radar-dark: #2F8A63;
    
    /* Signal Gold */
    --color-signal-gold: #FAD76A;
    
    /* Neutrals & Text */
    --color-text-main: #F9FAFB;
    --color-text-muted: #9CA3AF;
    --color-text-dim: #6B7280;
    --color-divider: #1F2933;
    --color-border: rgba(255, 255, 255, 0.08);
    
    /* Tier Colors */
    --color-tier-s: #FAD76A;
    --color-tier-a: #6AD7A3;
    --color-tier-b: #38BDF8;
    --color-tier-c: #9CA3AF;
    --color-tier-f: #4B5563;
    --color-tier-x: #DC2626;
    
    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
    --shadow-glow-green: 0 0 60px rgba(106, 215, 163, 0.15);
    --shadow-glow-gold: 0 0 40px rgba(250, 215, 106, 0.2);
    
    /* Spacing Scale */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;
    
    /* Border Radius */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --radius-pill: 9999px;
    
    /* Transitions */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --transition-fast: 150ms var(--ease-out);
    --transition-base: 250ms var(--ease-out);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     RESET & BASE
     ───────────────────────────────────────────────────────────────────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--color-bg-main);
    color: var(--color-text-main);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Subtle grid texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 100% 60% at 50% -10%, rgba(106, 215, 163, 0.06), transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(106, 215, 163, 0.015) 60px, rgba(106, 215, 163, 0.015) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(106, 215, 163, 0.015) 60px, rgba(106, 215, 163, 0.015) 61px);
    pointer-events: none;
    z-index: 0;
  }

  a {
    color: var(--color-radar-mid);
    text-decoration: none;
    transition: color var(--transition-fast);
  }

  a:hover {
    color: var(--color-radar-light);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     LAYOUT
     ───────────────────────────────────────────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: var(--space-8);
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: var(--space-6);
    margin-top: var(--space-6);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     NAVIGATION BAR
     ───────────────────────────────────────────────────────────────────────────── */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-5) var(--space-6);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg), var(--shadow-glow-green);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .brand-logo {
    position: relative;
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--color-radar-mid) 0%, var(--color-radar-dark) 100%);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-glow-green);
  }

  .brand-logo::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: calc(var(--radius-lg) - 3px);
  }

  .brand-logo svg {
    width: 32px;
    height: 32px;
    fill: white;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
  }

  .brand-name {
    font-size: 1.625rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--color-radar-mid);
  }

  .brand-tagline {
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--color-text-muted);
    margin-top: -2px;
  }

  .profile-section {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .profile-info {
    text-align: right;
  }

  .profile-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--color-text-main);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: var(--space-1);
    padding: 4px 14px;
    border-radius: var(--radius-pill);
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .status-badge.active {
    background: rgba(106, 215, 163, 0.12);
    border: 1px solid rgba(106, 215, 163, 0.25);
    color: var(--color-radar-mid);
  }

  .status-badge.locked {
    background: rgba(220, 38, 38, 0.12);
    border: 1px solid rgba(220, 38, 38, 0.25);
    color: var(--color-tier-x);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: currentColor;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     ACTION BAR
     ───────────────────────────────────────────────────────────────────────────── */
  .action-bar {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin-top: var(--space-6);
    padding: var(--space-4) var(--space-5);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-5);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    background: var(--color-bg-card);
    color: var(--color-text-main);
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-base);
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--color-bg-hover);
    border-color: rgba(255, 255, 255, 0.15);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--color-radar-mid) 0%, var(--color-radar-dark) 100%);
    border: none;
    color: #000;
    font-weight: 700;
    box-shadow: var(--shadow-glow-green), var(--shadow-md);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, var(--color-radar-light) 0%, var(--color-radar-mid) 100%);
    box-shadow: 0 0 70px rgba(106, 215, 163, 0.25), var(--shadow-lg);
    transform: translateY(-2px) scale(1.02);
  }

  .last-fetch-time {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--color-text-dim);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     PANELS
     ───────────────────────────────────────────────────────────────────────────── */
  .panel {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-5) var(--space-6);
    background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
    border-bottom: 1px solid var(--color-border);
  }

  .panel-title {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .panel-title-icon {
    font-size: 1.25rem;
  }

  .panel-count {
    padding: var(--space-1) var(--space-3);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--color-text-muted);
  }

  .panel-body {
    padding: var(--space-4);
    max-height: 68vh;
    overflow-y: auto;
  }

  .panel-body::-webkit-scrollbar {
    width: 6px;
  }

  .panel-body::-webkit-scrollbar-track {
    background: transparent;
  }

  .panel-body::-webkit-scrollbar-thumb {
    background: var(--color-divider);
    border-radius: 3px;
  }

  .panel-body::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.15);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     JOB CARDS (Inbox)
     ───────────────────────────────────────────────────────────────────────────── */
  .job-card {
    position: relative;
    background: var(--color-bg-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    margin-bottom: var(--space-3);
    transition: all var(--transition-base);
  }

  .job-card:hover {
    border-color: rgba(106, 215, 163, 0.3);
    box-shadow: var(--shadow-glow-green);
    transform: translateY(-2px);
  }

  .job-card.tier-s {
    border-color: rgba(250, 215, 106, 0.3);
    background: linear-gradient(135deg, var(--color-bg-card) 0%, rgba(250, 215, 106, 0.03) 100%);
  }

  .job-card.tier-s:hover {
    border-color: rgba(250, 215, 106, 0.5);
    box-shadow: var(--shadow-glow-gold);
  }

  .job-card.tier-s::before {
    content: '★';
    position: absolute;
    top: var(--space-3);
    right: var(--space-3);
    font-size: 1rem;
    color: var(--color-signal-gold);
    text-shadow: 0 0 10px rgba(250, 215, 106, 0.5);
  }

  .job-header {
    margin-bottom: var(--space-3);
  }

  .job-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--color-text-main);
    line-height: 1.35;
    margin-bottom: 2px;
  }

  .job-company {
    font-size: 0.875rem;
    color: var(--color-text-muted);
    font-weight: 500;
  }

  .job-meta {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    margin-bottom: var(--space-4);
  }

  /* Chips */
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 0.6875rem;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--color-border);
    color: var(--color-text-muted);
  }

  .chip-tier {
    font-weight: 800;
    letter-spacing: 0.04em;
  }

  .chip-tier-s { background: rgba(250, 215, 106, 0.1); border-color: rgba(250, 215, 106, 0.25); color: var(--color-tier-s); }
  .chip-tier-a { background: rgba(106, 215, 163, 0.1); border-color: rgba(106, 215, 163, 0.25); color: var(--color-tier-a); }
  .chip-tier-b { background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.25); color: var(--color-tier-b); }
  .chip-tier-c { background: rgba(156, 163, 175, 0.08); border-color: rgba(156, 163, 175, 0.2); color: var(--color-tier-c); }
  .chip-tier-f { background: rgba(75, 85, 99, 0.1); border-color: rgba(75, 85, 99, 0.25); color: var(--color-tier-f); }
  .chip-tier-x { background: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.25); color: var(--color-tier-x); }

  .chip-lane {
    background: rgba(106, 215, 163, 0.08);
    border-color: rgba(106, 215, 163, 0.2);
    color: var(--color-radar-mid);
  }

  /* Job Summary Block */
  .job-summary {
    font-size: 0.8125rem;
    line-height: 1.65;
    color: var(--color-text-muted);
    padding: var(--space-3) var(--space-4);
    background: rgba(0, 0, 0, 0.3);
    border-left: 3px solid var(--color-radar-dark);
    border-radius: var(--radius-sm);
    margin-bottom: var(--space-4);
  }

  /* Why Fit Section */
  .why-fit {
    margin-bottom: var(--space-4);
  }

  .why-fit-toggle {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: linear-gradient(135deg, rgba(106, 215, 163, 0.08) 0%, rgba(47, 138, 99, 0.08) 100%);
    border: 1px solid rgba(106, 215, 163, 0.2);
    border-radius: var(--radius-sm);
    color: var(--color-radar-mid);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .why-fit-toggle:hover {
    background: linear-gradient(135deg, rgba(106, 215, 163, 0.12) 0%, rgba(47, 138, 99, 0.12) 100%);
    border-color: rgba(106, 215, 163, 0.35);
  }

  .why-fit-toggle .arrow {
    font-size: 0.625rem;
    transition: transform var(--transition-base);
  }

  .why-fit-toggle.open .arrow {
    transform: rotate(90deg);
  }

  .why-fit-content {
    display: none;
    margin-top: var(--space-3);
    padding: var(--space-4);
    background: linear-gradient(135deg, rgba(106, 215, 163, 0.05) 0%, rgba(47, 138, 99, 0.02) 100%);
    border: 1px solid rgba(106, 215, 163, 0.12);
    border-radius: var(--radius-md);
  }

  .why-fit-content.open {
    display: block;
    animation: slideDown 0.25s var(--ease-out);
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .why-fit-label {
    font-size: 0.625rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--color-radar-mid);
    margin-bottom: var(--space-2);
  }

  .why-fit-text {
    font-size: 0.8125rem;
    line-height: 1.7;
    color: var(--color-text-main);
    white-space: pre-wrap;
  }

  /* Job Actions */
  .job-actions {
    display: flex;
    gap: var(--space-2);
    padding-top: var(--space-4);
    border-top: 1px solid var(--color-border);
  }

  .job-actions .btn {
    flex: 1;
    padding: var(--space-2) var(--space-4);
    font-size: 0.8125rem;
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     TRACKER CARDS
     ───────────────────────────────────────────────────────────────────────────── */
  .tracker-card {
    background: var(--color-bg-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
    margin-bottom: var(--space-3);
    transition: border-color var(--transition-fast);
  }

  .tracker-card:hover {
    border-color: rgba(255, 255, 255, 0.12);
  }

  .tracker-card .job-title {
    font-size: 0.9375rem;
  }

  .tracker-card .job-company {
    font-size: 0.8125rem;
  }

  .form-group {
    margin-top: var(--space-3);
  }

  .form-label {
    display: block;
    font-size: 0.625rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-dim);
    margin-bottom: var(--space-1);
  }

  .form-input,
  .form-select,
  .form-textarea {
    width: 100%;
    padding: var(--space-2) var(--space-3);
    background: var(--color-bg-main);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    color: var(--color-text-main);
    font-family: inherit;
    font-size: 0.8125rem;
    transition: border-color var(--transition-fast);
  }

  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    outline: none;
    border-color: var(--color-radar-dark);
  }

  .form-textarea {
    min-height: 60px;
    resize: vertical;
  }

  .tracker-card .btn {
    margin-top: var(--space-3);
    width: 100%;
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     EMPTY STATES
     ───────────────────────────────────────────────────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-12) var(--space-6);
    text-align: center;
  }

  .empty-icon {
    font-size: 3.5rem;
    margin-bottom: var(--space-5);
    opacity: 0.25;
  }

  .empty-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--color-text-muted);
    margin-bottom: var(--space-2);
  }

  .empty-subtitle {
    font-size: 0.8125rem;
    color: var(--color-text-dim);
    max-width: 240px;
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     TOAST NOTIFICATIONS
     ───────────────────────────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: var(--space-8);
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: var(--space-3) var(--space-6);
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    font-size: 0.875rem;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: all 0.4s var(--ease-out);
    z-index: 1000;
  }

  .toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast.success {
    border-color: rgba(106, 215, 163, 0.4);
    color: var(--color-radar-mid);
  }

  .toast.error {
    border-color: rgba(220, 38, 38, 0.4);
    color: var(--color-tier-x);
  }

  /* ─────────────────────────────────────────────────────────────────────────────
     LOADING OVERLAY
     ───────────────────────────────────────────────────────────────────────────── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 6, 10, 0.85);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-4);
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition-base);
  }

  .loading-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .loader {
    width: 52px;
    height: 52px;
    border: 3px solid var(--color-divider);
    border-top-color: var(--color-radar-mid);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--color-text-muted);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
